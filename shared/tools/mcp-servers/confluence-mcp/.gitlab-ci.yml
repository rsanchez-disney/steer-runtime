image: node:20

stages:
  - lint
  - typecheck

cache:
  paths:
    - node_modules/

before_script:
  - npm ci

lint:
  stage: lint
  script:
    - npm run lint
  only:
    - merge_requests
    - main

typecheck:
  stage: typecheck
  script:
    - npm run typecheck
  only:
    - merge_requests
    - main
