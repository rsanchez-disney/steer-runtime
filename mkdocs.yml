site_name: steer-runtime
site_description: AI agents for your entire team — devs, BAs, QA, ops, and PMs — running in any IDE.
site_url: https://github.disney.com/pages/SANCR225/steer-runtime/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Overview: getting-started/GETTING_STARTED.md
      - Setup (macOS/Linux): getting-started/SETUP.md
      - Windows Setup: getting-started/WINDOWS_SETUP.md
      - Dev Quick Start: getting-started/DEV_QUICK_START.md
      - Daily Commands: getting-started/DAILY_COMMANDS.md
      - Mobile Agents: getting-started/MOBILE_AGENTS_SETUP.md
