# ============================================================================
# ADM Managed Services Catalog — Application Entry
# ============================================================================

# --- Identity ---
bapp_id: "BAPP0135882"
app_name: "wdpr-ant-man-schedules-kronos"
full_name: "WDPR Ant-Man Schedules (Kronos)"
description: "Schedule management service that generates and manages meal period XML and schedule XML files. Publishes schedule data to S3 for downstream consumption. Handles Facilities, Attractions, Entertainment, Events, MealPeriods, MerchandiseFacilities, FoodBeverageFacilities, GolfCourses, ActivityProducts, Products, Services, and Resorts (ToonFinder)."

# --- Ownership ---
support_studio: "Ant Man"
escalation_channel: "GCx Help | Ant-Man Help (@gcx_antman)"
escalation_contacts:
  - name: "On-Call Engineer"
    role: "primary"
    contact: "+1 5707 347 639 Option 1"
    rotation: "24x7 weekly: Alejandro Zapata, Hrushikesh Hood, Rodrigo Duarte, Lorenzo Gazzani, Juan Gallart"
  - name: "Rodrigo Duarte"
    role: "tech_lead"
    contact: "Rodrigo.A.Duarte.-ND@disney.com"
  - name: "Frank Kenes"
    role: "manager"
    contact: "708-712-8443"

# --- ServiceNow ---
servicenow:
  configuration_items:
    - "BAPP0135882 - WDPR Ant-Man Schedules (Kronos)"
  assignment_group: "app-global-ant-man"

# --- Documentation ---
documentation:
  wiki: "https://confluence.disney.com/spaces/ECM/pages/409398721/Kronos"

# --- Companion Docs (Markdown) ---
docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

# --- Components ---
components:

  - component_name: "d-scribe-schedules"
    component_type: "worker"
    description: "Java 17 Spring Boot ECS service for schedule generation and XML publishing to S3"

    # -- Source Code & CI/CD --
    repository:
      url: "https://github.disney.com/WDPR-ECM/EcmServices/tree/develop/d-tour-kronos"
      branch: "develop"
      path: "d-tour-kronos"

    cicd:
      platform: "harness"
      pipeline_url: "https://disney.harness.io/ng/account/1-wFe3qRQv2mUh1s9244Eg/all/orgs/Content_Management_System/projects/WDPR_AntMan_Schedules/pipelines"
      pipeline_name: "WDPR_AntMan_Schedules"
      pipeline_identifier: "dtourkronos"
      deploy_target: "ECS"
      rundeck_id: "ed22f8d8-b21e-4401-91ec-43e481cd436d"

    # -- Health Check --
    health_check:
      url: "https://d-scribe-schedules.wdprapps.disney.com/information"
      expected_status: 200
      environments:
        prod: "https://d-scribe-schedules.wdprapps.disney.com/information"
        prod-stage: "https://prod-stage.d-scribe-schedules.wdprapps.disney.com/information"
        prod-load: "https://prod-load.d-scribe-schedules.wdprapps.disney.com/information"
        prod-latest: "https://prod-latest.d-scribe-schedules.wdprapps.disney.com/information"
        stage: "https://stage.d-scribe-schedules.wdprapps.disney.com/information"
        latest: "https://latest.d-scribe-schedules.wdprapps.disney.com/information"


    # -- Splunk --
    splunk:
      index: "wdpr_d-scribe"
      source: "*schedules-prod/*"
      base_spl: >-
        index=wdpr_d-scribe source="*schedules-prod/*"
      error_spl: >-
        index=wdpr_d-scribe source="*schedules-prod/*" ERROR

    # -- Grafana --
    grafana:
      dashboard_uid: "ddsycmiacwwe8d"
      dashboard_url: "https://grafana.wdprapps.disney.com/d/ddsycmiacwwe8d/gcx-platform-status-dashboard?orgId=1&from=now-1h&to=now&timezone=browser&refresh=5m"

    # -- Cloud Infrastructure --
    cloud:
      provider: "AWS"
      region: "us-west-2"
      account_id: "876496569223"
      account_name: "wdpr-apps"
      infra_type: "ECS"
      cluster_id: "d-scribe-prod"
      service_name: "sched-d-scribe-prod-live"

      cloudwatch:
        namespace: "AWS/ECS"
        dashboard: "PACE-DLR-d-scribe-prod-Ver5"

      services:
        - type: "s3"
          name: "d-tour-kronos-prod, d-scribe-content-live"

    docker:
      ecr_repository: "https://github.disney.com/WDPR-ECM/d-tour-kronos"

    # -- Other Environments --
    other_environments:

      prod-stage:
        health_check:
          url: "https://prod-stage.d-scribe-schedules.wdprapps.disney.com/information"
        splunk:
          base_spl: >-
            index=wdpr_d-scribe source="*schedules-prod-stage/*"
        cloud:
          cluster_id: "d-scribe-prod-stage"
          cloudwatch:
            dashboard: "PACE-DLR-d-scribe-prod-stage-Ver5"
        services:
          - type: "s3"
            name: "d-scribe-content-stage, d-scribe-content-prod-stage"

      prod-load:
        health_check:
          url: "https://prod-load.d-scribe-schedules.wdprapps.disney.com/information"
        splunk:
          base_spl: >-
            index=wdpr_d-scribe source="*schedules-prod-load/*"
        cloud:
          cluster_id: "d-scribe-prod-load"
          cloudwatch:
            dashboard: "PACE-DLR-d-scribe-prod-load-Ver5"
        services:
          - type: "s3"
            name: "d-scribe-content-stage, d-scribe-content-prod-load"

      prod-latest:
        health_check:
          url: "https://prod-latest.d-scribe-schedules.wdprapps.disney.com/information"
        splunk:
          base_spl: >-
            index=wdpr_d-scribe source="*schedules-prod-latest/*"
        cloud:
          cluster_id: "d-scribe-prod-latest"
          cloudwatch:
            dashboard: "PACE-DLR-d-scribe-prod-latest-Ver5"
        services:
          - type: "s3"
            name: "d-scribe-content-stage, d-scribe-content-prod-latest"

      stage:
        health_check:
          url: "https://stage.d-scribe-schedules.wdprapps.disney.com/information"
        splunk:
          base_spl: >-
            index=wdpr_d-scribe source="*schedules-stage/*"
        cloud:
          cluster_id: "d-scribe-stage"
          cloudwatch:
            dashboard: "PACE-DLR-d-scribe-stage-Ver5"

      latest:
        health_check:
          url: "https://latest.d-scribe-schedules.wdprapps.disney.com/information"
        splunk:
          base_spl: >-
            index=wdpr_d-scribe source="*schedules-latest/*"
        cloud:
          cluster_id: "d-scribe-latest"
          cloudwatch:
            dashboard: "PACE-DLR-d-scribe-latest-Ver5"
