# --- Components ---
components:

  - component_name: "ant-man-watcher"
    component_type: "service"
    description: "Content watcher — monitors published D-Scribe content in S3 and serves content reads. Integrates with Goliath for combine data and gcx-tools-api for process combine operations."

    repository:
      url: "https://github.disney.com/WDPR-ECM/EcmServices/tree/develop/ant-man-watcher"
      branch: "develop"
      path: "ant-man-watcher"

    cicd:
      platform: "harness"
      pipeline_url: "https://disney.harness.io/ng/account/1-wFe3qRQv2mUh1s9244Eg/all/orgs/Content_Management_System/projects/WDPR_AntMan_Watcher/pipelines"
      harness_project: "WDPR_Ant_Man_Watcher"
      harness_identifier: "antmanwatcher"
      rundeck_id: "934e0b9c-3396-4ba3-8214-0374eaf504b8"
      deploy_target: "ECS ant-man-watcher-prod-live"

    health_check:
      url: "https://ant-man-watcher.wdprapps.disney.com/information"
      expected_status: 200
      environments:
        prod: "https://ant-man-watcher.wdprapps.disney.com/information"
        prod-stage: "https://prod-stage.ant-man-watcher.wdprapps.disney.com/information"
        prod-load: "https://prod-load.ant-man-watcher.wdprapps.disney.com/information"
        prod-latest: "https://prod-latest.ant-man-watcher.wdprapps.disney.com/information"
        stage: "https://stage.ant-man-watcher.wdprapps.disney.com/information"
        latest: "https://latest.ant-man-watcher.wdprapps.disney.com/information"

    splunk:
      index: "wdpr_d-scribe"
      source: "*watcher-prod/*"
      splunk_prod_url: "https://splunk.wdprapps.disney.com/en-US/app/launcher/search"
      splunk_lower_url: "https://stage.splunk.wdprapps.disney.com/en-US/app/launcher/search"
      splunk_dashboard: "https://splunk.wdprapps.disney.com/en-GB/app/launcher/watcher_prod"
      base_spl: >-
        index=wdpr_d-scribe source="*watcher-prod/*"
      error_spl: >-
        index=wdpr_d-scribe source="*watcher-prod/*" ERROR | rex "\"statusCode\":\"(?<errorCode>\d\d\d)\"" | rex "\"message\":\"(?<message>[^\"]+)\"" | stats count by errorCode, message | sort -count
      latency_spl: >-
        index=wdpr_d-scribe source="*watcher-prod/*" "*SUCCESS : PT*" | rex "SUCCESS : PT(?<responseTime>[0-9.]+)S" | stats avg(responseTime) as avg_RT p95(responseTime) as p95_RT

    cloud:
      provider: "AWS"
      region: "us-west-2"
      account_id: "211570175858"
      account_name: "wdpr-content-prod"
      infra_type: "ECS Fargate"
