# --- Components ---
components:

  - component_name: "d-tour-sentinel"
    component_type: "service"
    description: "Sentinel service is for Product Price/ Meal Period integration. It will take care of the store/retrieval of information in S3 QuickSilver bucket and Aurora D"

    repository:
      url: "https://github.disney.com/WDPR-ECM/EcmServices/tree/develop/d-tour-sentinel"
      branch: "develop"
      path: "d-tour-sentinel"

    cicd:
      platform: "harness"
      pipeline_url: ""
      harness_project: "WDPR_AntMan_Sentinel"
      harness_identifier: "dtoursentinel"
      rundeck_id: "a72e84c0-d36b-426b-b913-161dd714eccd"
      deploy_target: "ECS d-tour-sentinel-prod-live"

    health_check:
      url: "https://d-tour-sentinel.wdprapps.disney.com/information"
      expected_status: 200
      environments:
        prod: "https://d-tour-sentinel.wdprapps.disney.com/information"
        prod-stage: "https://prod-stage.d-tour-sentinel.wdprapps.disney.com/information"
        prod-load: "https://prod-load.d-tour-sentinel.wdprapps.disney.com/information"
        prod-latest: "https://prod-latest.d-tour-sentinel.wdprapps.disney.com/information"
        stage: "https://stage.d-tour-sentinel.wdprapps.disney.com/information"
        latest: "https://latest.d-tour-sentinel.wdprapps.disney.com/information"

    splunk:
      index: "wdpr_d-scribe"
      source: "*sentinel-prod*"
      base_spl: >-
        index="wdpr_d-scribe" source="*sentinel-prod*"
      error_spl: >-
        index="wdpr_d-scribe" source="*sentinel-prod*" level=ERROR
        | stats count by error_code, message
        | sort -count
      latency_spl: >-
        index="wdpr_d-scribe" source="*sentinel-prod*"
        | stats avg(response_time) as avg_rt p95(response_time) as p95_rt

    cloud:
      provider: "AWS"
      region: "us-west-2"
      account_id: "211570175858"
      account_name: "wdpr-content-prod"
      infra_type: "ECS Fargate"
      cluster_id: ""
      service_name: "d-tour-sentinel-prod-live"

      cloudwatch:
        log_group: "/ecs/d-tour-sentinel"
        dashboard: "PACE-DLR-wdpr-content-S0001431-usw2-prd-5Ver"
        namespace: ""
        alarm_prefix: "d-tour-sentinel-"

    other_environments:

      prod-stage:
        account_id: "716715798470"
        account_name: "wdpr-content-test"
        service_name: "d-tour-sentinel-prod-stage-live"
        health_check: "https://prod-stage.d-tour-sentinel.wdprapps.disney.com/information"
        cloudwatch_dashboard: "PACE-DLR-wdpr-content-S0001431-usw2-stg-Ver5"
        splunk:
          index: "wdpr_d-scribe"
          base_spl: >-
            index="wdpr_d-scribe" source="*sentinel-prod-stage*"

      prod-load:
