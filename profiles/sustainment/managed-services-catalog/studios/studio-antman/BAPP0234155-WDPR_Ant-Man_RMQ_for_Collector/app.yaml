# --- Components ---
components:

  - component_name: "collector-rmq"
    component_type: "messaging"
    description: "RabbitMQ broker — routes messages from SDM Courier to the D-Scribe Collector service for content processing and downstream delivery."

    repository:
      url: ""
      branch: ""
      path: ""

    cicd:
      platform: ""
      pipeline_url: ""
      deploy_target: ""

    health_check:
      url: "https://collector-rmq.wdprapps.disney.com/"
      expected_status: 200
      environments:
        prod: "https://collector-rmq.wdprapps.disney.com/"
        prod-stage: "https://prod-stage.collector-rmq.wdprapps.disney.com/"
        prod-load: "https://prod-load.collector-rmq.wdprapps.disney.com/"
        prod-latest: "https://prod-latest.collector-rmq.wdprapps.disney.com/"

    splunk:
      index: "wdpr_d-scribe"
      source: "*sdm-prd*"
      base_spl: >-
        index=wdpr_d-scribe source="*sdm-prd*" sendRabbitMQ OR RabbitMQ
      error_spl: >-
        index=wdpr_d-scribe source="*sdm-prd*" RabbitMQ level=ERROR
        | stats count by error_code, message
        | sort -count

    cloud:
      provider: "AWS"
      region: "us-west-2"
      account_id: ""
      infra_type: "Amazon MQ (RabbitMQ)"
      cluster_id: ""
      service_name: "collector-rmq"

    other_environments:

      prod-stage:
        health_check: "https://prod-stage.collector-rmq.wdprapps.disney.com/"
        splunk:
          index: "wdpr_d-scribe"
          base_spl: >-
            index=wdpr_d-scribe source="*sdm-prd-stg*" sendRabbitMQ OR RabbitMQ

      prod-load:
        health_check: "https://prod-load.collector-rmq.wdprapps.disney.com/"
        splunk:
          index: "wdpr_d-scribe"
          base_spl: >-
            index=wdpr_d-scribe source="*sdm-prd-lod*" sendRabbitMQ OR RabbitMQ

      prod-latest:
        health_check: "https://prod-latest.collector-rmq.wdprapps.disney.com/"
        splunk:
          index: "wdpr_d-scribe"
          base_spl: >-
            index=wdpr_d-scribe source="*sdm-prd-lst*" sendRabbitMQ OR RabbitMQ
