      branch: "main"
      path: ""

    cicd:
      platform: "none"
      pipeline_url: ""
      note: "One-time deployment — no CI/CD pipeline (confirmed by Chandra Achanta)"

    health_check:
      url: ""
      note: "No traditional health check — monitor via Grafana Lambda metrics"

    splunk:
      index: "wdpr_d-scribe"
      source: "*usw2-prd-hydra-pipeline-lambda*"
      base_spl: >-
        index=wdpr_d-scribe source="*usw2-prd-hydra-pipeline-lambda*"
      error_spl: >-
        index=wdpr_d-scribe source="*usw2-prd-hydra-pipeline-lambda*" level=ERROR
        | stats count by error_code, message
        | sort -count

    cloud:
      provider: "AWS"
