# --- Components ---
components:

  - component_name: "shuri-hulkling"
    component_type: "service"
    description: "Hulkling — content service for the D-Scribe/ECM platform. Part of the Shuri platform family."

    repository:
      url: "https://github.disney.com/WDPR-ECM/EcmServices/tree/develop/shuri-hulkling"
      branch: "develop"
      path: "shuri-hulkling"

    cicd:
      platform: "harness"
      pipeline_url: "https://disney.harness.io/ng/account/1-wFe3qRQv2mUh1s9244Eg/all/orgs/Content_Management_System/projects/WDPR_XP_Hulkling/overview"
      harness_project: "WDPR_XP_Hulkling"
      harness_identifier: "shurihulkling"
      rundeck_id: "f5fe0200-b086-4110-821c-e3f8a5f02737"
      deploy_target: "ECS shuri-hulkling-prod-live"

    health_check:
      url: "https://shuri-hulkling.wdprapps.disney.com/information"
      expected_status: 200
      environments:
        prod: "https://shuri-hulkling.wdprapps.disney.com/information"
        prod-stage: "https://prod-stage.shuri-hulkling.wdprapps.disney.com/information"
        prod-load: "https://prod-load.shuri-hulkling.wdprapps.disney.com/information"
        prod-latest: "https://prod-latest.shuri-hulkling.wdprapps.disney.com/information"
        stage: "https://stage.shuri-hulkling.wdprapps.disney.com/information"
        latest: "https://latest.shuri-hulkling.wdprapps.disney.com/information"

    splunk:
      index: "wdpr_d-scribe"
      source: "*hulkling-prod*"
      base_spl: >-
        index=wdpr_d-scribe source="*hulkling-prod*"
      error_spl: >-
        index=wdpr_d-scribe source="*hulkling-prod*" level=ERROR
        | stats count by error_code, message
        | sort -count
      latency_spl: >-
        index=wdpr_d-scribe source="*hulkling-prod*"
        | stats avg(response_time) as avg_rt p95(response_time) as p95_rt

    cloud:
      provider: "AWS"
      region: "us-west-2"
      account_id: "211570175858"
      account_name: "wdpr-content-prod"
      infra_type: "ECS Fargate"
