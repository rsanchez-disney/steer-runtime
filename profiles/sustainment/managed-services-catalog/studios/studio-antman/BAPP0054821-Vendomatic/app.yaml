# ============================================================================
# ADM Managed Services Catalog — Application Entry
# ============================================================================

# --- Identity ---
bapp_id: "BAPP0054821"
app_name: "vendomatic"
full_name: "Vendomatic (Vend-o-matic)"
description: "Content management system that manages toggles and configuration data across WDW, DLR and HKDL sites. Stores structured configuration data in MySQL with a purpose-built PHP UI. Also manages Glue Text (UI text: button labels, form fields, error messages). Not approved for use in WDPRT."

# --- Ownership ---
support_studio: "Ant Man"
escalation_channel: "GCx Help | Ant-Man Help (@gcx_antman)"
escalation_contacts:
  - name: "On-Call Engineer"
    role: "primary"
    contact: "+1 5707 347 639 Option 1"
    rotation: "24x7 weekly: Alejandro Zapata, Hrushikesh Hood, Rodrigo Duarte, Lorenzo Gazzani, Juan Gallart"
  - name: "Rodrigo Duarte"
    role: "tech_lead"
    contact: "Rodrigo.A.Duarte.-ND@disney.com"
  - name: "Frank Kenes"
    role: "manager"
    contact: "708-712-8443"

# --- ServiceNow ---
servicenow:
  configuration_item: "Vendomatic"
  assignment_group: "app-global-ant-man"

# --- Documentation ---
documentation:
  runbook: "https://docs.google.com/document/d/16hz3trg15hQmcTpFqvaTqJkF2vVu3WBzjTfuACQppWk/edit"
  wiki: "https://confluence.disney.com/pages/viewpage.action?spaceKey=wdprcloud&title=Vendomatic"
  architecture_diagram: "https://docs.google.com/drawings/d/1lIE2GpUdjk0Vxbsgi75GKqEskghxlyVK7IGJdAXoVyY/edit"

# --- Companion Docs (Markdown) ---
docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

# --- Components ---
components:

  - component_name: "vendomatic-php"
    component_type: "frontend"
    description: "PHP web UI for managing configuration data and glue text in MySQL. Chef-managed EC2."

    repository:
      url: "https://github.disney.com/wdprd-development/vendomatic"
      branch: "develop"

    cicd:
      platform: "jenkins"
      pipeline_url: "https://gam.cicd.wdprapps.disney.com/job/vendomatic/"
      deploy_target: "Chef-managed EC2"
      build_trigger: "Automatic after PR merge to develop"

    health_check:
      url: "https://vendomatic.wdprapps.disney.com"
      expected_status: 200

    splunk:
      index: "wdpr_vendomatic"
      base_spl: >-
        index=wdpr_vendomatic
      error_spl: >-
        index=wdpr_vendomatic ERROR

    appdynamics:
      dashboard_url: "https://disney-prod.saas.appdynamics.com/controller/#/location=APP_COMPONENT_MANAGER&timeRange=last_1_hour.BEFORE_NOW.-1.-1.60&application=6&component=907&dashboardMode=force"

    cloud:
      provider: "AWS"
      region: "us-west-2"
      infra_type: "EC2"
      configuration_management: "Chef"
      chef_cookbook: "wdpro_mdx_stack"
      chef_run_list: "recipe[wdpro_mdx_stack::vendomatic-service]"

      services:
        - type: "rds"
          name: "MySQL (configuration + glue text storage)"

    other_environments:

      stage:
        health_check:
          url: "https://stage.vendomatic.wdprapps.disney.com/login.php"
        splunk:
          base_spl: >-
            index=wdpr_vendomatic source=*stage*
        cloud:
          chef_environment: "mdx-aws-stage"

      load:
        health_check:
          url: "https://load.vendomatic.wdprapps.disney.com/login.php"
        splunk:
          base_spl: >-
            index=wdpr_vendomatic source=*lt*
        cloud:
          chef_environment: "mdx-aws-lt01"

      latest:
        health_check:
          url: "http://latest.vendomatic.wdprapps.disney.com/login.php"
        splunk:
          base_spl: >-
            index=wdpr_vendomatic source=*latest*
        cloud:
          chef_environment: "mdx-aws-latesta"
