# --- Components ---
components:

  - component_name: "korvac-scheduler"
    component_type: "lambda"
    description: "Korvac Lambda — cron-triggered function that processes scheduled content (MealPeriod currentWeek) from S3."

    repository:
      url: "https://github.disney.com/WDPR-ECM/d-tour-korvac"
      branch: "develop"
      path: ""

    cicd:
      platform: "harness"
      pipeline_url: ""
      deploy_target: "Lambda wdpr-content-S0001431-usw2-prd-korvac-scheduler"

    health_check:
      url: ""
      expected_status: 200
      note: "No traditional health check — monitor via Grafana Lambda metrics"

    splunk:
      index: ""
      source: ""
      note: "No Splunk available for this Lambda"

    cloud:
      provider: "AWS"
      region: "us-west-2"
      account_id: "876496569223"
      account_name: "wdpr-apps"
      infra_type: "Lambda"

      lambda_functions:
        prod: "wdpr-content-S0001431-usw2-prd-korvac-scheduler"
        prod-stage: "wdpr-content-S0001431-usw2-stg-korvac-scheduler"

      eventbridge_rules:
        prod: "wdpr-content-S0001431-usw2-prd-korvac-scheduler-mpg-currentWeek"
        prod-stage: "wdpr-content-S0001431-usw2-stg-korvac-scheduler-mpg-currentWeek"

      cloudwatch:
        log_group_prod: "/aws/lambda/wdpr-content-S0001431-usw2-prd-korvac-scheduler"
        log_group_stage: "/aws/lambda/wdpr-content-S0001431-usw2-stg-korvac-scheduler"

    s3_buckets:
      prod: "d-scribe-content-live"
      prod-load: "d-scribe-content-stage"
      prod-stage: "d-scribe-content-stage"
      prod-latest: "d-scribe-content-stage"
      s3_account_id: "876496569223"
      s3_account_name: "wdpr-apps"
