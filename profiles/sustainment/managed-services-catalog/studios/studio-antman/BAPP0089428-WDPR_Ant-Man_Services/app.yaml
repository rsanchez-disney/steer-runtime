# ============================================================================
# ADM Managed Services Catalog — Application Entry
# ============================================================================

# --- Identity ---
bapp_id: "BAPP0089428"
app_name: "wdpr-ant-man-services-longshot"
full_name: "WDPR Ant-Man Services (Longshot)"
description: "D-Scribe Longshot service - content delivery/transformation service that adjusts lanes on api-internal hosts and serves content across multiple environments. Part of the WDPR ECM platform."

# --- Ownership ---
support_studio: "Ant Man"
escalation_channel: "GCx Help | Ant-Man Help (@gcx_antman)"
escalation_contacts:
  - name: "On-Call Engineer"
    role: "primary"
    contact: "+1 5707 347 639 Option 1"
    rotation: "24x7 weekly: Alejandro Zapata, Hrushikesh Hood, Rodrigo Duarte, Lorenzo Gazzani, Juan Gallart"
  - name: "Rodrigo Duarte"
    role: "tech_lead"
    contact: "Rodrigo.A.Duarte.-ND@disney.com"
  - name: "Frank Kenes"
    role: "manager"
    contact: "708-712-8443"

# --- ServiceNow ---
servicenow:
  configuration_items:
    - "BAPP0089428 - WDPR Ant-Man Services (Longshot)"
  assignment_group: "app-global-ant-man"

# --- Documentation ---
documentation:
  wiki: "https://confluence.disney.com/spaces/ECM/pages/1891477981/Working+with+AIDs"

# --- Companion Docs (Markdown) ---
docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

# --- Components ---
components:

  - component_name: "d-scribe-longshot"
    component_type: "api"
    description: "Java 17 Spring Boot ECS service for content delivery with lane-override logic"

    # -- Source Code & CI/CD --
    repository:
      url: "https://github.disney.com/WDPR-ECM/EcmServices"
      branch: "develop"
      path: "d-scribe-longshot"

    cicd:
      platform: "harness"
      pipeline_name: "WDPR_Ant_Man_Services"
      pipeline_identifier: "dscribelongshot"
      deploy_target: "ECS"
      rundeck_id: "ab2d1a65-64c5-49be-8c8e-6ef4117383f1"

    # -- Health Check --
    health_check:
      url: "https://d-scribe-services.wdprapps.disney.com/information"
      expected_status: 200

    # -- Splunk --
    splunk:
      index: "wdpr_d-scribe"
      source: "*services-prod/*"
      base_spl: >-
        index="wdpr_d-scribe" source="*services-prod/*"
      error_spl: >-
        index="wdpr_d-scribe" source="*services-prod/*" ERROR

    # -- Grafana --
    grafana:
      dashboard_uid: "ddsycmiacwwe8d"
      dashboard_url: "https://grafana.wdprapps.disney.com/d/ddsycmiacwwe8d/gcx-platform-status-dashboard?orgId=1&from=now-1h&to=now&timezone=browser&refresh=5m"

    # -- Cloud Infrastructure --
    cloud:
      provider: "AWS"
      region: "us-west-2"
      account_id: "876496569223"
      infra_type: "ECS"
      cluster_id: "svc-d-scribe-prod-live"
      service_name: "d-scribe-longshot"

      cloudwatch:
        namespace: "AWS/ECS"
        dashboard: "svc-prod-live"

      services:
        - type: "s3"
          name: "d-scribe-content-live"

    docker:
      ecr_repository: "wdpr-ecm/d-scribe-services"

    # -- Other Environments --
    other_environments:

      prod-stage:
        health_check:
          url: "https://prod-stage.d-scribe-services.wdprapps.disney.com/information"
        splunk:
          base_spl: >-
            index=wdpr_d-scribe source="*services-prod-stage/*"
        cloud:
          cluster_id: "svc-d-scribe-prod-stage-live"
          cloudwatch:
            dashboard: "svc-prod-stage"
        services:
          - type: "s3"
            name: "d-scribe-content-prod-load"

      prod-load:
        health_check:
          url: "https://prod-load.d-scribe-services.wdprapps.disney.com/information"
        splunk:
          base_spl: >-
            index=wdpr_d-scribe source="*services-prod-load/*"
        cloud:
          cluster_id: "svc-d-scribe-prod-load-live"
          cloudwatch:
            dashboard: "svc-prod-load"
        services:
          - type: "s3"
            name: "d-scribe-content-prod-stage"

      prod-latest:
        health_check:
          url: "https://prod-latest.d-scribe-services.wdprapps.disney.com/information"
        splunk:
          base_spl: >-
            index=wdpr_d-scribe source="*services-prod-latest/*"
        cloud:
          cluster_id: "svc-d-scribe-prod-latest-live"
          cloudwatch:
            dashboard: "svc-prod-latest"
        services:
          - type: "s3"
            name: "d-scribe-content-prod-latest"

      stage:
        health_check:
          url: "https://stage.d-scribe-services.wdprapps.disney.com/information"
        splunk:
          base_spl: >-
            index=wdpr_d-scribe source="*services-stage/*"
        cloud:
          cluster_id: "svc-d-scribe-stage-live"
          cloudwatch:
            dashboard: "svc-stage"

      latest:
        health_check:
          url: "https://latest.d-scribe-services.wdprapps.disney.com/information"
        splunk:
          base_spl: >-
            index=wdpr_d-scribe source="*services-latest/*"
        cloud:
          cluster_id: "svc-d-scribe-latest-live"
          cloudwatch:
            dashboard: "svc-latest"
