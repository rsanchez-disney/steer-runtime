# --- Components ---
components:

  - component_name: "d-scribe-collector"
    component_type: "service"
    description: "Content collector — receives messages from D-Scribe via SDM Courier, enriches XML with schedule data, persists to S3, and sends downstream to MMA/Composite."

    repository:
      url: "https://github.disney.com/WDPR-ECM/EcmServices/tree/develop/d-tour-collector"
      branch: "develop"
      path: "d-tour-collector"

    cicd:
      platform: "harness"
      pipeline_url: "https://disney.harness.io/ng/account/1-wFe3qRQv2mUh1s9244Eg/all/orgs/Content_Management_System/projects/WDPR_AntMan_Collector/pipelines"
      harness_org: "Content_Management_System"
      harness_project: "WDPR_AntMan_Collector"
      harness_identifier: "dtourcollector"
      rundeck_id: "c96c1e94-3bcc-4d9e-a488-57e789689a38"
      deploy_target: "ECS d-scribe-prod/collector-d-scribe-prod-live"

    health_check:
      url: "https://d-scribe-collector.wdprapps.disney.com/information"
      expected_status: 200
      environments:
        prod: "https://d-scribe-collector.wdprapps.disney.com/information"
        prod-load: "https://prod-load.d-scribe-collector.wdprapps.disney.com/information"
        prod-stage: "Retired"
        prod-latest: "Retired"
        stage: "Retired"
        latest: "Retired"

    splunk:
      index: "wdpr_d-scribe"
      source: "*collector-prod/*"
      additional_index: "wdpr_product_content_mma"
      splunk_prod_url: "https://splunk.wdprapps.disney.com/en-US/app/launcher/search"
      base_spl: >-
        index="wdpr_d-scribe" source="*collector-prod/*"
      error_spl: >-
        index=wdpr_d-scribe source="*collector-prod/*" ERROR | rex "\"statusCode\":\"(?<errorCode>\d\d\d)\"" | rex "\"message\":\"(?<message>[^\"]+)\"" | stats count by errorCode, message | sort -count
      eid_trace_spl: >-
        index="wdpr_d-scribe" source="*collector-prod/*" AND ("Sdm*" OR "PublishEvent*" OR "*Builder*" OR "Schedule*" OR "ERROR" OR "*Exception*" OR "SUCCESS" OR "Connection") AND ( <ENTERPRISE_ID> ) AND NOT("CombineService" OR "BucketUtils")

    cloud:
      provider: "AWS"
      region: "us-west-2"
      account_id: "876496569223"
      account_name: "wdpr-apps"
      infra_type: "ECS EC2"
      cluster_id: "d-scribe-prod"
      service_name: "collector-d-scribe-prod-live"

      cloudwatch:
        log_group: "d-scribe-collector"
        dashboard: "PACE-DLR-d-scribe-prod-Ver5"
        namespace: ""
        alarm_prefix: "collector-"

    appdynamics:
      prod: "https://disney-prod.saas.appdynamics.com/controller/#/location=APP_DASHBOARD&timeRange=last_1_hour.BEFORE_NOW.-1.-1.60&application=653&dashboardMode=force"
      prod-load: "https://disney-preprod.saas.appdynamics.com/controller/#/location=APP_DASHBOARD&timeRange=last_2_weeks.BEFORE_NOW.-1.-1.20160&application=3370&dashboardMode=force"

    other_environments:

      prod-load:
        account_id: "876496569223"
        account_name: "wdpr-apps"
        cluster_id: "d-scribe-prod-load"
        service_name: "collector-d-scribe-prod-load-live"
        health_check: "https://prod-load.d-scribe-collector.wdprapps.disney.com/information"
        cloudwatch_dashboard: "PACE-DLR-d-scribe-prod-load-Ver5"
        splunk:
          index: "wdpr_d-scribe"
          base_spl: >-
            index=wdpr_d-scribe source="*collector-prod-load/*"

    s3_buckets:
      prod: "d-scribe-content-live"
      prod-load: "d-scribe-content-prod-stage"
      prod-stage: "d-scribe-content-prod-load"
      prod-latest: "d-scribe-content-prod-latest"
      s3_account_id: "876496569223"
      s3_account_name: "wdpr-apps"

    retired_environments:
      - "prod-stage"
      - "prod-latest"
      - "stage"
      - "latest"
