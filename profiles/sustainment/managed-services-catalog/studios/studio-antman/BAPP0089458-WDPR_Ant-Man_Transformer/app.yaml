      index: "wdpr_d-scribe"
      source: "*transformer-prod/*"
      splunk_prod_url: "https://splunk.wdprapps.disney.com/en-US/app/launcher/search"
      splunk_lower_url: "https://stage.splunk.wdprapps.disney.com/en-US/app/launcher/search"
      base_spl: >-
        index=wdpr_d-scribe source="*transformer-prod/*"
      error_spl: >-
        index=wdpr_d-scribe source="*transformer-prod/*" ERROR
        | stats count by error_code, message
        | sort -count
      latency_spl: >-
        index=wdpr_d-scribe source="*transformer-prod/*"
        | stats avg(response_time) as avg_rt p95(response_time) as p95_rt

