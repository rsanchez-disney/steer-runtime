    health_check:
      url: "https://antman-ragnarok.wdprapps.disney.com/information"
      expected_status: 200
      environments:
        prod: "https://antman-ragnarok.wdprapps.disney.com/information"
        prod-stage: "https://prod-stage.antman-ragnarok.wdprapps.disney.com/information"
        prod-load: "https://prod-load.antman-ragnarok.wdprapps.disney.com/information"
