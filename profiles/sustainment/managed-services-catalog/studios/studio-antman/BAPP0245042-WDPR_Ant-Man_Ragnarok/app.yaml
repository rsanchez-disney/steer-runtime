        stage: "https://stage.antman-ragnarok.wdprapps.disney.com/information"
        latest: "https://latest.antman-ragnarok.wdprapps.disney.com/information"

    splunk:
      index: "wdpr_d-scribe"
      source: "*ragnarok-prod/*"
      base_spl: >-
        index=wdpr_d-scribe source="*ragnarok-prod/*"
      error_spl: >-
        index=wdpr_d-scribe source="*ragnarok-prod/*" level=ERROR
        | stats count by error_code, message
        | sort -count
      latency_spl: >-
        index=wdpr_d-scribe source="*ragnarok-prod/*"
        | stats avg(response_time) as avg_rt p95(response_time) as p95_rt

