# --- Components ---
components:

  - component_name: "d-scribe-to-helix-lambda"
    component_type: "lambda"
    description: "THIS lambda can Trigger the WDPR Ant-Man Lambda Helix  lambda for any content under S3 COMBINE (i.e. all Legacy and Master)."

    repository:
      url: "https://github.disney.com/WDPR-ECM/ant-man-lambda-helix-loader"
      branch: "main"
      path: ""

    cicd:
      platform: "jenkins"
      pipeline_url: "https://gam.cicd.wdprapps.disney.com/job/ant-man-lambda-helix-loader/view/all/"
      deploy_url: "https://gam.cicd.wdprapps.disney.com/job/ant-man-lambda-helix-loader/view/Deploy/job/ant-man-lambda-helix-loader-aws-lambda-live/"
      deploy_target: "Lambda wdpr-content-S01431-usw2-prd-d-scribe-to-helix-lambda"

    health_check:
      url: ""
      note: "No traditional health check — monitor via Grafana Lambda metrics"

    splunk:
      index: "wdpr_d-scribe"
      source: "*usw2-prd-d-scribe-to-helix-lambda*"
      base_spl: >-
        index=wdpr_d-scribe source="*usw2-prd-d-scribe-to-helix-lambda*"
      error_spl: >-
        index=wdpr_d-scribe source="*usw2-prd-d-scribe-to-helix-lambda*" level=ERROR
        | stats count by error_code, message
        | sort -count

    cloud:
      provider: "AWS"
      region: "us-west-2"
      account_id: "211570175858"
      account_name: "wdpr-content-prod"
      infra_type: "Lambda"

      lambda_functions:
        prod: "wdpr-content-S01431-usw2-prd-d-scribe-to-helix-lambda"
        load: "wdpr-content-S01431-usw2-lod-d-scribe-to-helix-lambda"
        stage: "wdpr-content-S01431-usw2-stg-d-scribe-to-helix-lambda"
        latest: "wdpr-content-S01431-usw2-lst-d-scribe-to-helix-lambda"

      trigger: "Filter Lambda"

      cloudwatch:
        log_group_prod: "/aws/lambda/wdpr-content-S01431-usw2-prd-d-scribe-to-helix-lambda"
        log_group_stage: "/aws/lambda/wdpr-content-S01431-usw2-stg-d-scribe-to-helix-lambda"

    other_environments:
      load:
        account_id: "716715798470"
        account_name: "wdpr-content-test"
      stage:
        account_id: "716715798470"
        account_name: "wdpr-content-test"
      latest:
        account_id: "539934483486"
        account_name: "wdpr-content-dev"

    s3_buckets:
