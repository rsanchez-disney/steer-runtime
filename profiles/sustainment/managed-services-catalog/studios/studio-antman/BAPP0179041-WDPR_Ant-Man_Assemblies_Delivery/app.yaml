# --- Components ---
components:

  - component_name: "assemblies-delivery"
    component_type: "worker"
    description: "Python script that listens for SNS/SQS notifications and copies published content from S3 to local node filesystem. Runs as Chef-managed EC2 process and ECS sidecar container."

    repository:
      url: "https://github.disney.com/WDPR-ECM/assemblies-delivery"
      branch: "main"

    cicd:
      platform: "jenkins"
      pipeline_url: "https://disney.harness.io/ng/account/1-wFe3qRQv2mUh1s9244Eg/all/orgs/Content_Management_System/projects/WDPR_AntMan_Assemblies_Delivery/overview"
      ecs_pipeline_url: "https://pipeline.disney.network/job/WDPR-ECM/job/assemblies-delivery/"
      deploy_target: "Chef EC2 + ECS sidecar"
      artifact_repo: "https://nexus3.disney.com/repository/WDPRT-master/"
      chef_cookbook: "wdpr_assemblies_delivery"
      chef_cookbook_repo: "https://github.disney.com/se-wdpro-cookbooks/wdpr_assemblies_delivery"

    splunk:
      index: "*assemblies*"
      base_spl: >-
        index="*assemblies*" "main: listening for messages... env: prod app: pepcom"
      startup_check_spl: >-
        index="*assemblies*" "main: listening for messages... env: prod app: pepcom" | timechart count by host

    cloud:
      provider: "AWS"
      region: "us-west-2"
      account_id: "876496569223"
      infra_type: "EC2"
      deployment_models:
        - "Python script on Chef-managed EC2 (PEP, COM, Lodging, DCL)"
        - "Docker sidecar in ECS tasks (Profile UI, Checkout UI)"

      services:
        - type: "s3"
          name: "prod.integrator"
          purpose: "Front end files storage - production"
        - type: "s3"
          name: "prodc.integrator"
          purpose: "Front end files storage - production C"
        - type: "s3"
          name: "stage.integrator"
          purpose: "Front end files storage - stage"
        - type: "s3"
          name: "lt.integrator"
          purpose: "Front end files storage - load test"
        - type: "s3"
          name: "latest.integrator"
          purpose: "Front end files storage - latest"
        - type: "sns"
          name: "d-scribe-ragnarok-publish-prod"
          arn: "arn:aws:sns:us-west-2:876496569223:d-scribe-ragnarok-publish-prod"
        - type: "sns"
          name: "d-scribe-ragnarok-publish-prodc"
          arn: "arn:aws:sns:us-west-2:876496569223:d-scribe-ragnarok-publish-prodc"
        - type: "sns"
          name: "d-scribe-ragnarok-publish-stage"
          arn: "arn:aws:sns:us-west-2:876496569223:d-scribe-ragnarok-publish-stage"
        - type: "sns"
          name: "d-scribe-ragnarok-publish-load"
          arn: "arn:aws:sns:us-west-2:876496569223:d-scribe-ragnarok-publish-load"
        - type: "sns"
          name: "d-scribe-ragnarok-publish-latest"
          arn: "arn:aws:sns:us-west-2:876496569223:d-scribe-ragnarok-publish-latest"
        - type: "sqs"
          name: "Dynamic per-node queues"
          note: "SQS queues created dynamically per node, subscribed to SNS topics"

    docker:
      ecr_repository: "876496569223.dkr.ecr.us-west-2.amazonaws.com/wdpr-ecm/assemblies-delivery"
      ecr_console: "https://us-west-2.console.aws.amazon.com/ecr/repositories/private/876496569223/wdpr-ecm/assemblies-delivery"

    other_environments:

      stage:
        cloud:
          nodes:
            - "mdx-aws-stagea"
            - "mdx-aws-stageb"
            - "dcl-aws-stagea"
            - "dcl-aws-stagebb"

      load:
        cloud:
          nodes:
            - "mdx-aws-lt01"
            - "dcl-aws-lt01"

      latest:
        cloud:
          nodes:
            - "mdx-aws-latesta"
            - "mdx-aws-latestb"
            - "dcl-aws-latesta"
            - "dcl-aws-latestb"
