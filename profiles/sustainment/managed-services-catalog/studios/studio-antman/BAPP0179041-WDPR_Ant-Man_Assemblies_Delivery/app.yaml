app_name: "wdpr-ant-man-assemblies-delivery"
full_name: "WDPR Ant-Man Assemblies Delivery"
description: "Part of the Global Content Platform. Runs on Digital Platform UI servers and receives SNS notifications when D-Scribe Assembler publishes content to S3. Copies content from S3 to each server on which it runs. Replacement for old Integrator/Configulator rsync service."

