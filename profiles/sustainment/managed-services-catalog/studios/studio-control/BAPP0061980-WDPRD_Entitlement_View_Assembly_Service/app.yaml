bapp_id: "BAPP0061980"
app_name: "evas-wdw"
full_name: "Entitlement View Assembly Service (WDW)"
description: >
  Aggregates product instance information on top of TMS responses. Adds product instances, policies,
  and enriched entitlement data for guest-facing display.
  Flows: ticket-linking.
  Keywords: ticket not showing, can't see ticket, link ticket, claim ticket, LLMP not showing, ticket visibility,
  entitlement, evas, ticket-view, product-instance, policy, view-assembly, guest-entitlement, WDW.
support_studio: "Studio Control"
escalation_channel: "https://teams.microsoft.com/l/channel/19%3AN7ofY17C8fye-1cs5yLhUrSLaWsp4ggdGhUEBA24bIM1%40thread.tacv2/DX%20-%20Studio%20Control?groupId=35a13470-e675-44b7-810e-f062466cffb5&tenantId=56b731a8-a2ac-4c32-bf6b-616810e913c6&ngc=true&allowXTenantAccess=true"
escalation_contacts:
  - name: "Victor Ramirez"
    role: "primary"
    contact: "Victor.Ramirez.-ND@disney.com"
servicenow:
  configuration_items:
    - "WDPRD Entitlement-View-Assembly-Service"
    - "WDPRD Entitlement-View-Assembly-Service - AWS Latest"
    - "WDPRD Entitlement-View-Assembly-Service - AWS Load Test"
    - "WDPRD Entitlement-View-Assembly-Service - AWS Production"
    - "WDPRD Entitlement-View-Assembly-Service - AWS Stage"
