# --- Components ---
components:

  - component_name: "profile-wam"
    component_type: "gateway"
    description: "DEPRECATED Node.js 14 WAM - Orchestration/BFF layer with DynamoDB sessions and request routing. Replaced by Java WAM (BAPP0253435)."

    # -- Component-specific docs --
    docs:
      troubleshooting: ""
      runbook: ""

    # -- Component-specific documentation links --
    documentation:
      wiki: "https://disneyexperiences.atlassian.net/wiki/spaces/gamprofile/pages/1337066411"
      architecture_diagram: ""

    # -- Source Code & CI/CD --
    repository:
      url: ""
      branch: ""
      path: ""

    cicd:
      platform: ""
      pipeline_url: ""
      deploy_target: ""

    # -- Health Check --
    health_check:
      url: "https://origin.profile-wam.wdprapps.disney.com"
      expected_status: 200

    # -- Splunk --
    splunk:
      index: "wdpr-gam"
      source: ""
      base_spl: >-
        index=wdpr-gam ids.app=wdw-webapi
      error_spl: >-
        index=wdpr-gam ids.app=wdw-webapi level>=40
      latency_spl: >-
        index=wdpr-gam ids.app=wdw-webapi msg.path!=/status environment=prod
        | eval statusCode='msg.code'
        | timechart span=15m count as calls, count(eval(not like(statusCode,"2%"))) as Errors
        | eval pcErrors=round((Errors/calls)*100,0)

    # -- AppDynamics --
    appdynamics:
      app_name: ""
      app_id: ""
      tier: ""
      dashboard_url: ""

    # -- NewRelic --
    newrelic:
      app_id: ""
      account_id: ""
      dashboard_url: ""

    # -- Datadog --
    datadog:
      service: ""
      env: ""
      dashboard_url: ""

    # -- Grafana --
    grafana:
      dashboard_uid: ""
      dashboard_url: ""
      datasource: ""

    # -- Archer --
    archer:
      record_id: ""

    # -- Cloud Infrastructure & Native Observability --
    cloud:
      provider: "AWS"
      region: "us-east-1"
      account_id: "wdpr-gam-prod"
      infra_type: "ECS"
      cluster_id: "wdw-gam2-B0082601-use1-profile-wam-ha-wam-prd"
      service_name: "profile-wam-ha-prod"

      cloudwatch:
        log_group: ""
        namespace: ""
        alarm_prefix: ""

      loginsights:
        log_group: ""
        saved_query: ""

      gcp:
        project_id: ""
        log_filter: ""

      services:
        - type: "elasticache"
          name: "Redis"
        - type: "dynamodb"
          name: "DynamoDB Sessions"

    # -- Other Environments (only fields that differ from production) --
    other_environments:

      stage:
        health_check:
          url: "https://origin.stage.profile-wam.wdprapps.disney.com"
        splunk:
