  business_rules: "business-rules.md"
  runbook: "runbook.md"

# --- Components ---
components:

  - component_name: "profile-view-assembly-service"
    component_type: "api"
    description: "Java 17 data aggregation service. Assembles guest profile views from Profile data, Avatar selection, XBMS (orders/linked bands), FnF (friends with plans), DCL Reservation Service, and Facility Service."

    # -- Component-specific docs --
    docs:
      troubleshooting: "troubleshooting.md"
      runbook: "runbook.md"

    # -- Component-specific documentation links --
    documentation:
      wiki: "https://disneyexperiences.atlassian.net/wiki/spaces/gamprofile/pages/1331176583"
      architecture_diagram: ""

    # -- Source Code & CI/CD --
    repository:
      url: ""
      branch: ""
      path: ""

    cicd:
      platform: "harness"
      pipeline_url: ""
      deploy_target: "ECS Fargate"

    # -- Health Check --
    health_check:
      url: "https://use1.profile-vas-ha.gam-prod.wdprapps.disney.com/profile-view-assembly-service/v1/bb8/status/summary"
      expected_status: 200

    # -- Splunk --
    splunk:
      index: "wdpr-gam"
      source: ""
      base_spl: >-
        index=wdpr-gam "ids.app"="*profile-view-assembly-service"
      error_spl: >-
        index=wdpr-gam "ids.app"="*profile-view-assembly-service" level>=40
      latency_spl: >-
        index=wdpr-gam "ids.app"="*profile-view-assembly-service"
        | stats avg(response_time) as avg_rt p95(response_time) as p95_rt by endpoint

    # -- AppDynamics --
    appdynamics:
      app_name: "prod-gam-profile-svc-aws"
      app_id: ""
      tier: ""
      dashboard_url: ""

    # -- NewRelic --
    newrelic:
      app_id: ""
      account_id: ""
      dashboard_url: ""

    # -- Datadog --
    datadog:
      service: ""
      env: ""
      dashboard_url: ""

    # -- Grafana --
    grafana:
      dashboard_uid: ""
      dashboard_url: "Profile-Prod-Active-Active-Dashboard"
      datasource: ""

    # -- Archer --
    archer:
      record_id: ""

    # -- Cloud Infrastructure & Native Observability --
    cloud:
      provider: "AWS"
      region: "us-east-1"
      account_id: "wdpr-gam-prod"
      infra_type: "ECS"
      cluster_id: "wdw-gam-B0242566-use1-prd"
      service_name: "profile-vas-ha-prod-live"

      cloudwatch:
        log_group: "prod-gam-profile-svc"
        namespace: ""
        alarm_prefix: ""

      loginsights:
        log_group: ""
        saved_query: ""

      gcp:
        project_id: ""
        log_filter: ""

      services:
        - type: "elasticache"
          name: "Redis"

    # -- Other Environments (only fields that differ from production) --
    other_environments:

      stage:
        health_check:
          url: "https://stage.use1.profile-vas-ha.gam-test.wdprapps.disney.com/profile-view-assembly-service/v1/bb8/status/summary"
        splunk:
          index: "wdpr-gam"
          base_spl: >-
            index=wdpr-gam "ids.app"="*profile-view-assembly-service" environment=stage
