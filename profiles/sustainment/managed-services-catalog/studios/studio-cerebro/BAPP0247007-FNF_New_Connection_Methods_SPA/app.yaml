# --- Identity ---
bapp_id: "BAPP0247007"
app_name: "fnf-new-connection-methods-spa"
full_name: "FNF New Connection Methods SPA"
description: "Family and Friends web application built in Angular 18 with new connection methods. Replaces the previous FnF SPA (BAPP0180541). Manages guest social graph within the Disney ecosystem. Features: Account consolidation, Friend list management, Add guest/managed guest, GUID-based friend list retrieval, Hotel reservation import."

# --- Ownership ---
support_studio: "Cerebro"
escalation_channel: "#profile-active-active-engineers-only"
escalation_contacts:
  - name: "Cesar Munoz"
    role: "primary"
    contact: "Sustainment Tech Lead"
  - name: "Gerson Barrera"
    role: "secondary"
    contact: "Sustainment Web Dev"
  - name: "Glenn Raposo"
    role: "SME"
    contact: "Disney Manager and POC"

