# --- Identity ---
bapp_id: "BAPP0248309"
app_name: "wdpr-authenticatorjs"
full_name: "WDPR AuthenticatorJS"
description: "Stand-alone JavaScript bundle that handles OneID Lightbox events and persists the PEPCOM session. Manages OneID V5 Trust State transitions. Injects pep_jwt_token and pep_oauth_token cookies into the browser. Critical for ALL login/registration flows across the Profile ecosystem (WDW, DLR, DCL)."

# --- Ownership ---
support_studio: "Cerebro"
escalation_channel: "#profile-active-active-engineers-only"
escalation_contacts:
  - name: "Cesar Munoz"
    role: "primary"
    contact: "Tech Lead / Sustainment"
  - name: "Gerson Barrera"
    role: "secondary"
    contact: "Sustainment Web Dev"
  - name: "Glenn Raposo"
    role: "SME"
    contact: "Disney POC"

# --- ServiceNow ---
servicenow:
  configuration_items:
    - "WDPR AuthenticatorJS"
    - "WDPR AuthenticatorJS - AWS Latest"
    - "WDPR AuthenticatorJS - AWS Load Test"
    - "WDPR AuthenticatorJS - AWS Production"
    - "WDPR AuthenticatorJS - AWS Staging"
  assignment_group: "web-global-Digital Profile"
  business_service: ""

