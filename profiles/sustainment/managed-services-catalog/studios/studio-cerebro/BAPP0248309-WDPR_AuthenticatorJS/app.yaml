# --- Components ---
components:

  - component_name: "authenticatorjs"
    component_type: "sdk"               # api | worker | batch | frontend | database | queue | gateway | cache | mobile | sdk
    description: "JavaScript bundle (V4) - OneID Lightbox, PEPCOM session, cookie injection"

    # -- Component-specific docs --
    docs:
      troubleshooting: ""
      runbook: ""

    # -- Component-specific documentation links --
    documentation:
      wiki: "https://disneyexperiences.atlassian.net/wiki/spaces/gamprofile/pages/1335888476"
      architecture_diagram: ""

    # -- Source Code & CI/CD --
    repository:
      url: "https://github.disney.com/profile-vertical/authenticatorjs"
      branch: ""
      path: ""

    cicd:
      platform: "harness"                   # harness | github-actions | jenkins | spinnaker
      pipeline_url: "authenticatorbundlejs_build / authenticatorbundlejs_deploy"
      deploy_target: "S3 + Akamai CDN"

    # -- Health Check --
    health_check:
      url: "No healthcheck - static bundle on S3/Akamai (ALERT GAP)"
      expected_status: 200

    # -- Splunk --
    splunk:
      index: "wdpr-profile-ui"
      source: ""
      base_spl: >-
        index=wdpr-profile-ui Identifiers.App-Name="AuthenticatorJS"
      error_spl: >-
        index=wdpr-profile-ui Identifiers.App-Name="AuthenticatorJS" level>=40 | table _time, log.level, log.message
      latency_spl: >-
        index=wdpr-profile-ui Identifiers.App-Name="AuthenticatorJS"
        | stats avg(response_time) as avg_rt p95(response_time) as p95_rt by endpoint

