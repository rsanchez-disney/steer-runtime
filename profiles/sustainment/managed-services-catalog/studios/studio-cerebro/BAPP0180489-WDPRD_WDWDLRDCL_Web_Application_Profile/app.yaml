# --- Identity ---
bapp_id: "BAPP0180489"
app_name: "wdprd-wdwdlrdcl-web-application-profile"
full_name: "WDPRD WDWDLRDCL Web Application Profile"
description: "Profile SPA is the main guest-facing web application for profile management across WDW, DLR, and DCL brands. Serves profile pages on disneyworld.disney.go.com/profile/ and equivalent DLR/DCL URLs. Features include Profile, Affiliations, Terms & Conditions, MEP, Login, Registration, Payment Methods, and Florida Residency Validation."

# --- Ownership ---
support_studio: "Cerebro"
escalation_channel: "#profile-active-active-engineers-only"
escalation_contacts:
  - name: "Gino Caverzan"
    role: "primary"
    contact: "Disney POC / Tech Lead (SHIELD)"
  - name: "Gerson Barrera"
    role: "secondary"
    contact: "Sustainment Web Dev"
  - name: "Cesar Muñoz"
    role: "SME"
    contact: "Sustainment Tech Lead - AuthenticatorJS integration"

# --- ServiceNow ---
servicenow:
  configuration_items:
    - "WDPRD WDW/DLR/DCL Web Application (Profile) (profile-spa)"
  assignment_group: "web-global-Digital Profile"
  business_service: ""

# --- Documentation ---
documentation:
  runbook: ""
  wiki: "https://mywiki.disney.com/spaces/gamprofile/pages/1335887229"
  architecture_diagram: ""

# --- Companion Docs (Markdown) ---
docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

# --- Components ---
components:

  - component_name: "profile-spa-ha"
    component_type: "frontend"
    description: "Angular 18 / Node.js 20 SPA on ECS Fargate. Guest-facing profile management for WDW, DLR, DCL brands."

    # -- Component-specific docs --
    docs:
      troubleshooting: ""
      runbook: ""

    # -- Component-specific documentation links --
    documentation:
      wiki: "https://mywiki.disney.com/spaces/gamprofile/pages/1335887229"
      architecture_diagram: ""

    # -- Source Code & CI/CD --
    repository:
      url: "profile-vertical/profile-spa"
      branch: ""
      path: ""

    cicd:
      platform: "harness"
      pipeline_url: "disney.harness.io — profile-spa-ha pipeline"
      deploy_target: "ECS Fargate (US-EAST-1 & US-WEST-2)"

    # -- Health Check --
    health_check:
      url: "origin.use1.profile-spa.wdprapps.disney.com/healthcheck"
      expected_status: 200

    # -- Splunk --
    splunk:
      index: "wdpr-profile-ui"
      source: "*profile-spa-prd:profile-spa-prod/profile-spa*"
      base_spl: >-
        index=wdpr-profile-ui Identifiers.App-Name="profile-spa" source="*profile-spa-prd*"
      error_spl: >-
        index=wdpr-profile-ui Identifiers.App-Name="profile-spa" source="*profile-spa-prd*" level>=40
      latency_spl: >-
        index=wdpr-profile-ui Identifiers.App-Name="profile-spa" statusCode>=500 earliest="-1h"
        | timechart count span=5m

    # -- AppDynamics --
    appdynamics:
      app_name: "core-profile-spa-ha-east / core-profile-spa-ha-west"
      app_id: ""
      tier: ""
      dashboard_url: ""

    # -- NewRelic --
    newrelic:
      app_id: ""
      account_id: ""
      dashboard_url: ""

    # -- Datadog --
    datadog:
      service: ""
      env: ""
      dashboard_url: ""

    # -- Grafana --
    grafana:
      dashboard_uid: ""
      dashboard_url: ""
      datasource: ""

    # -- Archer --
    archer:
      record_id: ""

    # -- Cloud Infrastructure & Native Observability --
    cloud:
      provider: "AWS"
      region: "us-east-1"
      account_id: "wdpr-gam-prod"
      infra_type: "ECS Fargate"
      cluster_id: "wdw-gam2-B0180489-use1-profile-spa-ha-svc-prd"
      service_name: "profile-spa-ha-prod"

      cloudwatch:
        log_group: ""
        namespace: ""
        alarm_prefix: "gac-profile-prod-alerts"

      loginsights:
        log_group: ""
        saved_query: ""

      gcp:
        project_id: ""
        log_filter: ""

      services:
        - type: ""
          name: ""

    # -- Other Environments (only fields that differ from production) --
    other_environments:

      stage:
        health_check:
          url: "origin.stage.use1.profile-spa.wdprapps.disney.com/healthcheck"
        splunk:
          index: "wdpr-profile-ui"
          base_spl: >-
            index=wdpr-profile-ui Identifiers.App-Name="profile-spa" source="*profile-spa-stg*"
        cloud:
          region: "us-east-1"
          service_name: "profile-spa-ha-stage"

      load:
        health_check:
          url: "origin.load.use1.profile-spa.wdprapps.disney.com/healthcheck"
        splunk:
          index: "wdpr-profile-ui"
          base_spl: >-
            index=wdpr-profile-ui Identifiers.App-Name="profile-spa" source="*profile-spa-lod*"
        cloud:
          region: "us-east-1"
          service_name: "profile-spa-ha-load"

      latest:
        health_check:
          url: ""
        splunk:
          index: "wdpr-profile-ui"
          base_spl: >-
            index=wdpr-profile-ui source="*profile-spa-lst*" "req.url"="/profile/log/error" level=50
        cloud:
          region: "us-east-1"
          service_name: "profile-spa-latest"
