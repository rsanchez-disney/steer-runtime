# --- Components ---
components:

  - component_name: "profile-b2b"
    component_type: "api"
    description: "Java 21 service hosting B2B (service-to-service) endpoints, primarily the aggregated-profile endpoint. Internal-only access via ALB and API Gateway."

    # -- Component-specific docs --
    docs:
      troubleshooting: "troubleshooting.md"
      runbook: "runbook.md"

    # -- Component-specific documentation links --
    documentation:
      wiki: "https://mywiki.disney.com/spaces/gamprofile/pages/1331176581"
      architecture_diagram: ""

    # -- Source Code & CI/CD --
    repository:
      url: ""
      branch: ""
      path: ""

    cicd:
      platform: "jenkins"
      pipeline_url: ""
      deploy_target: "ECS Fargate"

    # -- Health Check --
    health_check:
      url: "https://use1.profile-b2b-ha.gam-prod.wdprapps.disney.com/profile-b2b/v1/bb8/status/summary"
      expected_status: 200

    # -- Splunk --
    splunk:
      index: "wdpr-gam"
      source: ""
      base_spl: >-
        index=wdpr-gam "ids.app"="us-east-1-profile-b2b-service"
      error_spl: >-
        index=wdpr-gam "ids.app"="us-east-1-profile-b2b-service" level>=40
      latency_spl: >-
        index=wdpr-gam "ids.app"="us-east-1-profile-b2b-service"
        | stats avg(response_time) as avg_rt p95(response_time) as p95_rt by endpoint

    # -- AppDynamics --
    appdynamics:
      app_name: "prod-gam-profile-svc-aws"
      app_id: ""
      tier: ""
      dashboard_url: ""

    # -- NewRelic --
    newrelic:
      app_id: ""
      account_id: ""
      dashboard_url: ""

    # -- Datadog --
    datadog:
      service: ""
      env: ""
      dashboard_url: ""

    # -- Grafana --
    grafana:
      dashboard_uid: ""
      dashboard_url: "profile-prod-active-active-dashboard"
      datasource: ""

    # -- Archer --
    archer:
      record_id: ""

    # -- Cloud Infrastructure & Native Observability --
    cloud:
      provider: "AWS"
      region: "us-east-1"
      account_id: "wdpr-gam-prod"
      infra_type: "ECS"
      cluster_id: "wdw-gam-S0246132-use1-profile-b2b-ha-svc-prd"
      service_name: "profile-b2b-ha-prod"

      cloudwatch:
        log_group: "prod-gam-profile-svc"
        namespace: ""
        alarm_prefix: ""

      loginsights:
        log_group: ""
        saved_query: ""

      gcp:
        project_id: ""
        log_filter: ""

      services: []

    # -- Other Environments (only fields that differ from production) --
    other_environments:

      stage:
        health_check:
          url: "https://stage.use1.profile-b2b-ha.gam-test.wdprapps.disney.com/profile-b2b/v1/bb8/status/summary"
        splunk:
          index: "wdpr-gam"
          base_spl: >-
            index=wdpr-gam "ids.app"="us-east-1-profile-b2b-service" environment=stage
        cloud:
          region: "us-east-1"
          service_name: "profile-b2b-stage"

      load:
        health_check:
          url: "https://load.use1.profile-b2b-ha.gam-test.wdprapps.disney.com/profile-b2b/v1/bb8/status/summary"
        splunk:
          index: "wdpr-gam"
          base_spl: >-
            index=wdpr-gam "ids.app"="us-east-1-profile-b2b-service" environment=load
        cloud:
          region: "us-east-1"
          service_name: "profile-b2b-ha-load"

      latest:
        health_check:
          url: "https://latest.use1.profile-b2b-ha.gam-dev.wdprapps.disney.com/profile-b2b/v1/bb8/status/summary"
        splunk:
          index: "wdpr-gam"
          base_spl: >-
            index=wdpr-gam "ids.app"="us-east-1-profile-b2b-service" environment=latest
        cloud:
          region: "us-east-1"
          service_name: "profile-b2b-latest"
