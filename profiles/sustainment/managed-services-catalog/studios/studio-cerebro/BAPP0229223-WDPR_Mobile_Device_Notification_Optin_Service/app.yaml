# --- Identity ---
bapp_id: "BAPP0229223"
app_name: "wdpr-mobile-device-notification-optin-service"
full_name: "WDPR Mobile Device Notification Optin Service"
description: "UM replacement service for Parks to record Guests' opt-ins to mobile push notification lists. The service does NOT perform actual push notifications — that is handled by mobile applications' services."

# --- Ownership ---
support_studio: "Cerebro"
escalation_channel: "#profile-active-active-engineers-only"
escalation_contacts:
  - name: "Andrew Southwick"
    role: "primary"
    contact: "Tech Lead"
  - name: "Zachary Boone"
    role: "secondary"
    contact: "Tech Lead"
  - name: "Glenn Raposo"
    role: "SME"
    contact: "Disney Manager and POC"

# --- ServiceNow ---
servicenow:
  configuration_items:
    - "WDPR Mobile Device Notification Optin Service"
    - "WDPR Mobile Device Notification Optin Service - AWS Latest"
    - "WDPR Mobile Device Notification Optin Service - AWS Load Test"
    - "WDPR Mobile Device Notification Optin Service - AWS Production"
    - "WDPR Mobile Device Notification Optin Service - AWS Staging"
  assignment_group: "web-global-Digital Profile"
  business_service: ""

# --- Documentation ---
documentation:
  runbook: ""
  wiki: "https://disneyexperiences.atlassian.net/wiki/spaces/gamprofile/pages/1332547810"
  architecture_diagram: ""

# --- Companion Docs (Markdown) ---
docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

# --- Components ---
components:

  - component_name: "mobile-notification-svc-ha"
    component_type: "api"               # api | worker | batch | frontend | database | queue | gateway | cache | mobile | sdk
    description: "Java 17 service that records guest opt-ins to mobile push notification lists. Active-active across US-EAST-1 and US-WEST-2."

    # -- Component-specific docs --
    docs:
      troubleshooting: ""
      runbook: ""

    # -- Component-specific documentation links --
    documentation:
      wiki: "https://disneyexperiences.atlassian.net/wiki/spaces/gamprofile/pages/1332547810"
      architecture_diagram: ""

    # -- Source Code & CI/CD --
    repository:
      url: ""
      branch: ""
      path: ""

    cicd:
      platform: "harness"                   # harness | github-actions | jenkins | spinnaker
      pipeline_url: "mobile-notification-svc"
      deploy_target: "ECS Fargate"

    # -- Health Check --
    health_check:
      url: "https://use1.mobile-notification-ha.gam-prod.wdprapps.disney.com/mobile-notification-svc/healthcheck"
      expected_status: 200

    # -- Splunk --
    splunk:
      index: "wdpr-gam"
      source: ""
      base_spl: >-
        index=wdpr-gam "ids.app"="*mobile-notification*" environment=prod
      error_spl: >-
        index=wdpr-gam "ids.app"="*mobile-notification*" environment=prod level>=40
      latency_spl: >-
        index=wdpr-gam "ids.app"="*mobile-notification*" environment=prod
        | stats avg(response_time) as avg_rt p95(response_time) as p95_rt by endpoint

    # -- AppDynamics --
    appdynamics:
      app_name: "prod-gam-profile-svc-aws"
      app_id: ""
      tier: ""
      dashboard_url: ""

    # -- NewRelic --
    newrelic:
      app_id: ""
      account_id: ""
      dashboard_url: ""

    # -- Datadog --
    datadog:
      service: ""
      env: ""
      dashboard_url: ""

    # -- Grafana --
    grafana:
      dashboard_uid: ""
      dashboard_url: "Profile-Prod-Active-Active-Dashboard"
      datasource: ""

    # -- Archer --
    archer:
      record_id: ""

    # -- Cloud Infrastructure & Native Observability --
    cloud:
      provider: "AWS"                   # AWS | GCP | Azure | on-prem
      region: "us-east-1"
      account_id: "wdpr-gam-prod"
      infra_type: "Fargate"                 # ECS | EKS | Lambda | GKE | EC2 | VM | Fargate | CloudRun | AppEngine
      cluster_id: "wdw-gam2-B0229223-use1-prd"
      service_name: "mobile-notification-svc-ha-prod"

      cloudwatch:
        log_group: ""
        namespace: ""
        alarm_prefix: ""

      loginsights:
        log_group: ""
        saved_query: ""

      gcp:
        project_id: ""
        log_filter: ""

      services:
        - type: "dynamodb"                   # sqs | sns | s3 | dynamodb | rds | elasticache | pubsub | firestore | bucket | cloud-sql | redis
          name: "Not documented in Confluence Cloud"

    # -- Other Environments (only fields that differ from production) --
    other_environments:

      stage:
        health_check:
          url: "https://stage.use1.mobile-notification-ha.gam-test.wdprapps.disney.com/mobile-notification-svc/healthcheck"
