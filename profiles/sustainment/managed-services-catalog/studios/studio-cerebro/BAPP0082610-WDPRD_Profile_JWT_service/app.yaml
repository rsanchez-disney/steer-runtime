# --- Identity ---
bapp_id: "BAPP0082610"
app_name: "wdprd-profile-jwt-service"
full_name: "WDPRD Profile JWT service"
description: "Profile JWT Service provides client-side token management using JSON Web Tokens. Called by AuthenticatorJS after OneID login to generate session tokens."

# --- Ownership ---
support_studio: "Cerebro"
escalation_channel: "#profile-active-active-engineers-only"
escalation_contacts:
  - name: "Andrew Southwick"
    role: "primary"
    contact: "Tech Lead"
  - name: "Cesar Munoz"
    role: "secondary"
    contact: "Sustainment Tech Lead"
  - name: "Andrew Southwick"
    role: "SME"
    contact: "Tech Lead - JWT architecture"

# --- ServiceNow ---
servicenow:
  configuration_items:
    - "WDPRD Profile JWT service"
    - "WDPRD Profile JWT service - AWS Latest"
    - "WDPRD Profile JWT service - AWS Load Test"
    - "WDPRD Profile JWT service - AWS Production"
    - "WDPRD Profile JWT service - AWS Stage"
  assignment_group: "web-global-Digital Profile"
  business_service: ""

# --- Documentation ---
documentation:
  runbook: ""
  wiki: "https://mywiki.disney.com/spaces/gamprofile/pages/1335887230"
  architecture_diagram: ""

# --- Companion Docs (Markdown) ---
docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

# --- Components ---
components:

  - component_name: "jwt-service-gam-ha"
    component_type: "api"
    description: "JWT token generation and validation service. Node.js 16 on ECS Fargate with ALB and API Gateway."

    # -- Component-specific docs --
    docs:
      troubleshooting: ""
      runbook: ""

    # -- Component-specific documentation links --
    documentation:
      wiki: "https://mywiki.disney.com/spaces/gamprofile/pages/1335887230"
      architecture_diagram: ""

    # -- Source Code & CI/CD --
    repository:
      url: ""
      branch: ""
      path: ""

    cicd:
      platform: "jenkins"
      pipeline_url: "jwt-service-gam-ha-single-repo [jwt-service-gam-ha]"
      deploy_target: "ECS Fargate"

    # -- Health Check --
    health_check:
      url: "use1.profile-jwt-ha.gam-prod.wdprapps.disney.com/jwt-service/api/v1/healthcheck"
      expected_status: 200

    # -- Splunk --
    splunk:
      index: "wdpr-gam"
      source: ""
      base_spl: >-
        index=wdpr-gam ids.app="*profile-jwt*" environment=prod
      error_spl: >-
        index=wdpr-gam ids.app="*profile-jwt*" environment=prod level>=40
      latency_spl: >-
        index=wdpr-gam ids.app="*profile-jwt*" environment=prod
        | stats avg(response_time) as avg_rt p95(response_time) as p95_rt by endpoint

    # -- AppDynamics --
    appdynamics:
      app_name: "core_profile-jwt-ha-east / core_profile-jwt-ha-west"
      app_id: ""
      tier: ""
      dashboard_url: ""

    # -- NewRelic --
    newrelic:
      app_id: ""
      account_id: ""
      dashboard_url: ""

    # -- Datadog --
    datadog:
      service: ""
      env: ""
      dashboard_url: ""

    # -- Grafana --
    grafana:
      dashboard_uid: ""
      dashboard_url: ""
      datasource: ""

    # -- Archer --
    archer:
      record_id: ""

    # -- Cloud Infrastructure & Native Observability --
    cloud:
      provider: "AWS"
      region: "us-east-1"
      account_id: "wdpr-gam-prod"
      infra_type: "ECS Fargate"
      cluster_id: "wdw-gam-B0082610-use1-profile-jwt-ha-jwt-prd"
      service_name: "jwt-ha-prod"

      cloudwatch:
        log_group: ""
        namespace: ""
        alarm_prefix: ""

      loginsights:
        log_group: ""
        saved_query: ""

      gcp:
        project_id: ""
        log_filter: ""

      services:
        - type: "dynamodb"
          name: "token storage"

    # -- Other Environments (only fields that differ from production) --
    other_environments:

      stage:
        health_check:
          url: "stage.use1.profile-jwt-ha.gam-test.wdprapps.disney.com/jwt-service/api/v1/healthcheck"
        splunk:
          index: "wdpr-gam"
          base_spl: >-
            index=wdpr-gam ids.app="*profile-jwt*" environment=stage
        cloud:
          region: "us-east-1"
          service_name: "jwt-stage"

      load:
        health_check:
          url: "load.use1.profile-jwt-ha.gam-test.wdprapps.disney.com/jwt-service/api/v1/healthcheck"
        splunk:
          index: "wdpr-gam"
          base_spl: >-
            index=wdpr-gam ids.app="*profile-jwt*" environment=load
        cloud:
          region: "us-east-1"
          service_name: "jwt-ha-load"

      latest:
        health_check:
          url: "latest.use1.profile-jwt-ha.gam-dev.wdprapps.disney.com/jwt-service/api/v1/healthcheck"
        splunk:
          index: "wdpr-gam"
          base_spl: >-
            index=wdpr-gam ids.app="*profile-jwt*" environment=latest
        cloud:
          region: "us-east-1"
          service_name: "jwt-latest"
