# --- Identity ---
bapp_id: "BAPP0253435"
app_name: "wdprt-gam-profile-web-api-service"
full_name: "WDPRT GAM Profile Web API Service"
description: "Profile Java WAM (Web API Manager) is the orchestration/BFF layer migrated from Node.js to Java 17. Routes requests from SPAs to backend services (GAM, B2C, VAS). Handles authentication, session management, and request routing. ~85% of requests routed to GAM CORE APIGW."

# --- Ownership ---
support_studio: "Cerebro"
escalation_channel: "#profile-active-active-engineers-only"
escalation_contacts:
  - name: "Andrew Southwick"
    role: "primary"
    contact: "Tech Lead - Architecture, Node→Java migration"
  - name: "Cesar Munoz"
    role: "secondary"
    contact: "Sustainment Tech Lead"
  - name: "Yash Sugandh"
    role: "SME"
    contact: "Sustainment Backend (with Nerio Baez, Julian Martinez)"

# --- ServiceNow ---
servicenow:
  configuration_items:
    - "WDPRT GAM Profile Web API Service"
    - "WDPRT GAM Profile Web API Service - AWS Latest"
    - "WDPRT GAM Profile Web API Service - AWS Load Test"
    - "WDPRT GAM Profile Web API Service - AWS Production"
    - "WDPRT GAM Profile Web API Service - AWS Staging"
  assignment_group: "web-global-Digital Profile"
  business_service: ""

# --- Documentation ---
documentation:
  runbook: ""
  wiki: "https://disneyexperiences.atlassian.net/wiki/spaces/gamprofile/pages/1332547811"
  architecture_diagram: ""

# --- Companion Docs (Markdown) ---
docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

# --- Components ---
components:

  - component_name: "profile-wam-ha"
    component_type: "gateway"
    description: "Java 17 / Spring Boot BFF/orchestration layer. Routes all SPA traffic to backend services. Manages DynamoDB sessions. Critical endpoint: /profile-api/authentication/session"

    # -- Component-specific docs --
    docs:
      troubleshooting: ""
      runbook: ""

    # -- Component-specific documentation links --
    documentation:
      wiki: "https://disneyexperiences.atlassian.net/wiki/spaces/gamprofile/pages/1332547811"
      architecture_diagram: ""

    # -- Source Code & CI/CD --
    repository:
      url: ""
      branch: ""
      path: ""

    cicd:
      platform: "harness"
      pipeline_url: "disney.harness.io"
      deploy_target: "ECS Fargate (US-EAST-1 & US-WEST-2)"

    # -- Health Check --
    health_check:
      url: "origin.profile-wam.wdprapps.disney.com/profile-api/healthcheck"
      expected_status: 200

    # -- Splunk --
    splunk:
      index: "wdpr-gam"
      source: "*profile-wam-ha-wam-prd:profile-wam-ha-prod/profile-wam/*"
      base_spl: >-
        index=wdpr-gam ids.app=wdw-webapi msg.path!=/status environment=prod
      error_spl: >-
        index=wdpr-gam ids.app=wdw-webapi environment=prod msg.code>=500
        | timechart span=5m count
      latency_spl: >-
        index=wdpr-gam ids.app=wdw-webapi msg.path!=/status environment=prod
        | eval statusCode='msg.code'
        | timechart span=15m count as calls, count(eval(not like(statusCode,"2%"))) as Errors
        | eval pcErrors=round((Errors/calls)*100,0)

    # -- AppDynamics --
    appdynamics:
      app_name: "core-profile-wam-ha-east / core-profile-wam-ha-west"
      app_id: ""
      tier: ""
      dashboard_url: ""

    # -- NewRelic --
    newrelic:
      app_id: ""
      account_id: ""
      dashboard_url: ""

    # -- Datadog --
    datadog:
      service: ""
      env: ""
      dashboard_url: ""

    # -- Grafana --
    grafana:
      dashboard_uid: ""
      dashboard_url: "Profile GAM WEBAPI dashboard"
      datasource: ""

    # -- Archer --
    archer:
      record_id: ""

    # -- Cloud Infrastructure & Native Observability --
    cloud:
      provider: "AWS"
      region: "us-east-1"
      account_id: "wdpr-gam-prod"
      infra_type: "ECS Fargate"
      cluster_id: "wdw-gam2-B0082601-use1-profile-wam-ha-wam-prd"
      service_name: "profile-wam-ha-prod"

      cloudwatch:
        log_group: ""
        namespace: ""
        alarm_prefix: "CPU > 30% | Memory > 50%"

      loginsights:
        log_group: ""
        saved_query: ""

      gcp:
        project_id: ""
        log_filter: ""

      services:
        - type: "dynamodb"
          name: "wdpr-gam-b0253435-prd-webapi"

    # -- Other Environments (only fields that differ from production) --
    other_environments:

      stage:
        health_check:
          url: "origin.stage.profile-wam.wdprapps.disney.com/profile-api/healthcheck"
        splunk:
          index: "wdpr-gam"
          base_spl: >-
            index=wdpr-gam ids.app=wdw-webapi environment=stage
        cloud:
          region: "us-east-1"
          service_name: "profile-wam-ha-stage"

      load:
        health_check:
          url: "origin.load.profile-wam.wdprapps.disney.com/profile-api/healthcheck"
        splunk:
          index: "wdpr-gam"
          base_spl: >-
            index=wdpr-gam ids.app=wdw-webapi environment=load
        cloud:
          region: "us-east-1"
          service_name: "profile-wam-ha-load"

      latest:
        health_check:
          url: ""
        splunk:
          index: "wdpr-gam"
          base_spl: >-
            index=wdpr-gam ids.app=wdw-webapi environment=latest
        cloud:
          region: "us-east-1"
          service_name: "profile-wam-latest"
