# --- Identity ---
bapp_id: "BAPP0225663"
app_name: "wdpr-child-authorization-service"
full_name: "WDPR Child Authorization Service"
description: "Handles COPPA (Children's Online Privacy Protection Act) compliance via PRIVO integration. Manages child account authorization, parental consent, and child profile retrieval."

# --- Ownership ---
support_studio: "Cerebro"
escalation_channel: "#profile-active-active-engineers-only"
escalation_contacts:
  - name: "Andrew Southwick"
    role: "primary"
    contact: "Tech Lead"
  - name: "Glenn Raposo"
    role: "secondary"
    contact: "Manager"
  - name: "Martin Uribe"
    role: "SME"
    contact: "Tech Lead"

# --- ServiceNow ---
servicenow:
  configuration_items:
    - "WDPR Child Authorization Service"
  assignment_group: "web-global-Digital Profile"
  business_service: "WDPR Child Authorization Service"

# --- Documentation ---
documentation:
  runbook: ""
  wiki: "https://mywiki.disney.com/spaces/gamprofile/pages/1331176582"
  architecture_diagram: ""

# --- Companion Docs (Markdown) ---
docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

# --- Components ---
components:

  - component_name: "child-auth-svc"
    component_type: "api"
    description: "Java 17 service for COPPA compliance via PRIVO. Key functions: Initiate authorization for child account, Retrieve child account details, Retrieve child account profile, PRIVO consent management. Internal accessibility."

    # -- Component-specific docs --
    docs:
      troubleshooting: "troubleshooting.md"
      runbook: "runbook.md"

    # -- Component-specific documentation links --
    documentation:
      wiki: "https://mywiki.disney.com/spaces/gamprofile/pages/1331176582"
      architecture_diagram: ""

    # -- Source Code & CI/CD --
    repository:
      url: ""
      branch: ""
      path: ""

    cicd:
      platform: "jenkins"
      pipeline_url: ""
      deploy_target: "ECS Fargate"

    # -- Health Check --
    health_check:
      url: "https://use1.child-auth-svc-ha.gam-prod.wdprapps.disney.com/child-auth-svc/healthcheck"
      expected_status: 200

    # -- Splunk --
    splunk:
      index: "wdpr-gam"
      source: ""
      base_spl: >-
        index=wdpr-gam "ids.app"="*child-auth*"
      error_spl: >-
        index=wdpr-gam "ids.app"="*child-auth*" level>=40
      latency_spl: >-
        index=wdpr-gam "ids.app"="*child-auth*"
        | stats avg(response_time) as avg_rt p95(response_time) as p95_rt by endpoint

    # -- AppDynamics --
    appdynamics:
      app_name: "core-child-auth-svc-ha-east"
      app_id: ""
      tier: ""
      dashboard_url: ""

    # -- NewRelic --
    newrelic:
      app_id: ""
      account_id: ""
      dashboard_url: ""

    # -- Datadog --
    datadog:
      service: ""
      env: ""
      dashboard_url: ""

    # -- Grafana --
    grafana:
      dashboard_uid: ""
      dashboard_url: ""
      datasource: ""

    # -- Archer --
    archer:
      record_id: ""

    # -- Cloud Infrastructure & Native Observability --
    cloud:
      provider: "AWS"
      region: "us-east-1"
      account_id: "wdpr-gam-prod"
      infra_type: "ECS"
      cluster_id: "wdw-gam2-B0225663-use1-child-auth-svc-ha-svc-prd"
      service_name: "child-auth-svc-ha-prod"

      cloudwatch:
        log_group: ""
        namespace: ""
        alarm_prefix: ""

      loginsights:
        log_group: ""
        saved_query: ""

      gcp:
        project_id: ""
        log_filter: ""

      services: []

    # -- Other Environments (only fields that differ from production) --
    other_environments:

      stage:
        health_check:
          url: "https://stage.use1.child-auth-svc-ha.gam-test.wdprapps.disney.com/child-auth-svc/healthcheck"
        splunk:
          index: "wdpr-gam"
          base_spl: >-
            index=wdpr-gam "ids.app"="*child-auth*" environment=stage
