          region: "us-east-1"
          service_name: "child-auth-svc-ha-stage"

      load:
        health_check:
          url: "https://load.use1.child-auth-svc-ha.gam-test.wdprapps.disney.com/child-auth-svc/healthcheck"
        splunk:
          index: "wdpr-gam"
          base_spl: >-
            index=wdpr-gam "ids.app"="*child-auth*" environment=load
        cloud:
