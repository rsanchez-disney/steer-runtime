# --- Components ---
components:

  - component_name: "profile-mb-spa-ha"
    component_type: "frontend"
    description: "Angular 18 / Node.js 20 SPA on ECS Fargate. Guest-facing MagicBand/DisneyBand management. Features: List MB/DB orders, Manage MB/DB, Reservation data, Band customization."

    # -- Component-specific docs --
    docs:
      troubleshooting: ""
      runbook: ""

    # -- Component-specific documentation links --
    documentation:
      wiki: "https://mywiki.disney.com/spaces/gamprofile/pages/1335887272"
      architecture_diagram: ""

    # -- Source Code & CI/CD --
    repository:
      url: ""
      branch: ""
      path: ""

    cicd:
      platform: "harness"
      pipeline_url: "profile-mb-spa-ha pipeline"
      deploy_target: "ECS Fargate (US-EAST-1 & US-WEST-2)"

    # -- Health Check --
    health_check:
      url: "https://origin.profilembspa.wdprapps.disney.com/healthcheck"
      expected_status: 200

    # -- Splunk --
    splunk:
      index: "wdpr-profile-ui"
      source: "*profile-mb-spa-ha-prod/profile-mb-spa*"
      base_spl: >-
        index=wdpr-profile-ui Identifiers.App-Name="mbc-spa" level>=40
        | stats count by log.message | sort -count
      error_spl: >-
        index=wdpr-profile-ui Identifiers.App-Name="mbc-spa" statusCode>=500 earliest="-1h"
        | timechart count span=5m
      latency_spl: >-
        index=wdpr-profile-ui Identifiers.App-Name="mbc-spa"
        | stats avg(response_time) as avg_rt p95(response_time) as p95_rt

    # -- AppDynamics --
    appdynamics:
      app_name: "core-profile-mb-spa-ha-east / core-profile-mb-spa-ha-west"
      app_id: ""
      tier: ""
      dashboard_url: ""

    # -- NewRelic --
    newrelic:
      app_id: ""
      account_id: ""
      dashboard_url: ""

    # -- Datadog --
    datadog:
      service: ""
      env: ""
      dashboard_url: ""

    # -- Grafana --
    grafana:
      dashboard_uid: ""
      dashboard_url: ""
      datasource: ""

    # -- Archer --
    archer:
      record_id: ""

    # -- Cloud Infrastructure & Native Observability --
    cloud:
      provider: "AWS"
      region: "us-east-1"
      account_id: "wdpr-gam-prod"
      infra_type: "ECS Fargate"
      cluster_id: "wdw-gam2-B0180565-use1-profile-mb-spa-ha-svc-prd"
      service_name: "profile-mb-spa-ha-prod"

      cloudwatch:
        log_group: ""
        namespace: ""
        alarm_prefix: "Error > 3% | ART East > 5s | West > 6s | CPU > 30% | Memory > 50%"

      loginsights:
        log_group: ""
        saved_query: ""

      gcp:
        project_id: ""
        log_filter: ""

      services:
        - type: ""
          name: ""

    # -- Other Environments (only fields that differ from production) --
    other_environments:

      stage:
        health_check:
          url: "https://origin.stage.profilembspa.wdprapps.disney.com/healthcheck"
        splunk:
          index: "wdpr-profile-ui"
          base_spl: >-
            index=wdpr-profile-ui source="*profile-mb-spa-svc-stg:profile-mb-spa-ha-stage/profile-mb-spa/*"
        cloud:
          region: "us-east-1"
          service_name: "profile-mb-spa-ha-stage"

      load:
        health_check:
          url: "https://origin.load.profilembspa.wdprapps.disney.com/healthcheck"
        splunk:
          index: "wdpr-profile-ui"
          base_spl: >-
            index=wdpr-profile-ui source="*profile-mb-spa-svc-lod:profile-mb-spa-ha-load/profile-mb-spa/*"
        cloud:
          region: "us-east-1"
          service_name: "profile-mb-spa-ha-load"

      latest:
        health_check:
          url: "https://latest.use1.profile-mb-spa-ha.gam-dev.wdprapps.disney.com/healthcheck"
        splunk:
          index: "wdpr-profile-ui"
          base_spl: >-
            index=wdpr-profile-ui source="*profile-mb-spa-latest/profile-mb-spa/*"
        cloud:
          region: "us-east-1"
          service_name: "profile-mb-spa-latest-live"
