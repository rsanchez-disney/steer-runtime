# --- Identity ---
bapp_id: "BAPP0245892"
app_name: "wdpr-profile-b2c"
full_name: "WDPR Profile B2C"
description: "Main Java backend service handling guest profile operations for the B2C channel. All endpoints are GUEST (GUEST tokens only) for: affiliations, avatar selection, catalog favorites, communication preferences, get/set profile (to OneID GuestController). Replacement for BAPP0054836."

# --- Ownership ---
support_studio: "Cerebro"
escalation_channel: "#profile-active-active-engineers-only"
escalation_contacts:
  - name: "Andrew Southwick"
    role: "primary"
    contact: "Tech Lead"
  - name: "Zachary Boone"
    role: "secondary"
    contact: "Tech Lead"
  - name: "Glenn Raposo"
    role: "SME"
    contact: "Manager"

# --- ServiceNow ---
servicenow:
  configuration_items:
    - "WDPR Profile B2C"
  assignment_group: "web-global-Digital Profile"
  business_service: "WDPR Profile B2C"

# --- Documentation ---
documentation:
  runbook: ""
  wiki: "https://mywiki.disney.com/spaces/gamprofile/pages/1332547808"
  architecture_diagram: ""

# --- Companion Docs (Markdown) ---
docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

# --- Components ---
components:

  - component_name: "profile-b2c"
    component_type: "api"
    description: "Java 21 / Spring Boot service. Guest-facing APIs for affiliations, avatar selection, catalog favorites, communication preferences, get/set profile via OneID GuestController. External accessibility."

    # -- Component-specific docs --
    docs:
      troubleshooting: "troubleshooting.md"
      runbook: "runbook.md"

    # -- Component-specific documentation links --
    documentation:
      wiki: "https://mywiki.disney.com/spaces/gamprofile/pages/1332547808"
      architecture_diagram: ""

    # -- Source Code & CI/CD --
    repository:
      url: "https://github.disney.com/se-wdpr-infrastructure/nimbus_deploy/blob/master/profile-b2c-ha"
      branch: "master"
      path: "profile-b2c-ha"

    cicd:
      platform: "jenkins"
      pipeline_url: ""
      deploy_target: "ECS Fargate"

    # -- Health Check --
    health_check:
      url: "https://use1.profile-b2c-ha.gam-prod.wdprapps.disney.com/profile-b2c/v1/bb8/status/summary"
      expected_status: 200

    # -- Splunk --
    splunk:
      index: "wdpr-gam"
      source: ""
      base_spl: >-
        index=wdpr-gam "ids.app"="us-east-1-profile-b2c-service"
      error_spl: >-
        index=wdpr-gam "ids.app"="us-east-1-profile-b2c-service" level>=40
      latency_spl: >-
        index=wdpr-gam "ids.app"="us-east-1-profile-b2c-service"
        | stats avg(response_time) as avg_rt p95(response_time) as p95_rt by endpoint

    # -- AppDynamics --
    appdynamics:
      app_name: "prod-gam-profile-svc-aws"
      app_id: ""
      tier: ""
      dashboard_url: ""

    # -- NewRelic --
    newrelic:
      app_id: ""
      account_id: ""
      dashboard_url: ""

    # -- Datadog --
    datadog:
      service: ""
      env: ""
      dashboard_url: ""

    # -- Grafana --
    grafana:
      dashboard_uid: ""
      dashboard_url: "profile-prod-active-active-dashboard"
      datasource: ""

    # -- Archer --
    archer:
      record_id: ""

    # -- Cloud Infrastructure & Native Observability --
    cloud:
      provider: "AWS"
      region: "us-east-1"
      account_id: "wdpr-gam-prod"
      infra_type: "ECS"
      cluster_id: "wdw-gam-B0245892-use1-profile-b2c-ha-svc-prd"
      service_name: "profile-b2c-ha-prod"

      cloudwatch:
        log_group: "prod-gam-profile-svc"
        namespace: ""
        alarm_prefix: ""

      loginsights:
        log_group: ""
        saved_query: ""

      gcp:
        project_id: ""
        log_filter: ""

      services: []

    # -- Other Environments (only fields that differ from production) --
    other_environments:

      stage:
        health_check:
          url: "https://stage.use1.profile-b2c-ha.gam-test.wdprapps.disney.com/profile-b2c/v1/bb8/status/summary"
        splunk:
          index: "wdpr-gam"
          base_spl: >-
            index=wdpr-gam "ids.app"="us-east-1-profile-b2c-service" environment=stage
        cloud:
          region: "us-east-1"
          service_name: "profile-b2c-stage"

      load:
        health_check:
          url: "https://load.use1.profile-b2c-ha.gam-test.wdprapps.disney.com/profile-b2c/v1/bb8/status/summary"
        splunk:
          index: "wdpr-gam"
          base_spl: >-
            index=wdpr-gam "ids.app"="us-east-1-profile-b2c-service" environment=load
        cloud:
          region: "us-east-1"
          service_name: "profile-b2c-ha-load"

      latest:
        health_check:
          url: "https://latest.use1.profile-b2c-ha.gam-dev.wdprapps.disney.com/profile-b2c/v1/bb8/status/summary"
        splunk:
          index: "wdpr-gam"
          base_spl: >-
            index=wdpr-gam "ids.app"="us-east-1-profile-b2c-service" environment=latest
        cloud:
          region: "us-east-1"
          service_name: "profile-b2c-latest"
