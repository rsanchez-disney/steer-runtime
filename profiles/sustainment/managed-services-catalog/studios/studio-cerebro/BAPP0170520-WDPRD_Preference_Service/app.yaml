# --- Identity ---
bapp_id: "BAPP0170520"
app_name: "wdprd-preference-service"
full_name: "WDPRD Preference Service"
description: "Service fronting DynamoDB tables which store guest preferences. Preferences are SWID-based data containing no PII nor PCI. Also serves as SOR for existing DynamoDB tables previously used by ProfileService (BAPP0054836)."

# --- Ownership ---
support_studio: "Cerebro"
escalation_channel: "#profile-active-active-engineers-only"
escalation_contacts:
  - name: "Andrew Southwick"
    role: "primary"
    contact: "Tech Lead"
  - name: "Zachary Boone"
    role: "secondary"
    contact: "Tech Lead"
  - name: "Glenn Raposo"
    role: "SME"
    contact: "Manager"

# --- ServiceNow ---
servicenow:
  configuration_items:
    - "WDPRD Preference Service"
    - "WDPRD Preference Service - AWS Latest"
    - "WDPRD Preference Service - AWS Load Test"
    - "WDPRD Preference Service - AWS Production"
    - "WDPRD Preference Service - AWS Staging"
  assignment_group: "web-global-Digital Profile"
  business_service: "WDPRD Preference Service"

# --- Documentation ---
documentation:
  runbook: "https://rundeck.wdprapps.disney.com/project/preference-service-ha_aws/jobs"
  wiki: "https://disneyexperiences.atlassian.net/wiki/spaces/gamprofile/pages/1332547809"
  architecture_diagram: ""

# --- Companion Docs (Markdown) ---
docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

# --- Components ---
components:

  - component_name: "preference-service"
    component_type: "api"
    description: "Java 17 service fronting DynamoDB tables for guest preferences. SWID-based data, no PII/PCI. Internal accessibility only."

    # -- Component-specific docs --
    docs:
      troubleshooting: "troubleshooting.md"
      runbook: "runbook.md"

    # -- Component-specific documentation links --
    documentation:
      wiki: "https://disneyexperiences.atlassian.net/wiki/spaces/gamprofile/pages/1332547809"
      architecture_diagram: ""

    # -- Source Code & CI/CD --
    repository:
      url: ""
      branch: ""
      path: ""

    cicd:
      platform: "harness"
      pipeline_url: ""
      deploy_target: "ECS Fargate"

    # -- Health Check --
    health_check:
      url: "https://use1.preference-svc-ha.gam-prod.wdprapps.disney.com/preference-service/v1/bb8/status/summary"
      expected_status: 200

    # -- Splunk --
    splunk:
      index: "wdpr-gam"
      source: ""
      base_spl: >-
        index=wdpr-gam "ids.app"="*preference-service*"
      error_spl: >-
        index=wdpr-gam "ids.app"="*preference-service*" level>=40
      latency_spl: >-
        index=wdpr-gam "ids.app"="*preference-service*"
        | stats avg(response_time) as avg_rt p95(response_time) as p95_rt by endpoint

    # -- AppDynamics --
    appdynamics:
      app_name: "prod-gam-profile-svc-aws"
      app_id: ""
      tier: ""
      dashboard_url: ""

    # -- NewRelic --
    newrelic:
      app_id: ""
      account_id: ""
      dashboard_url: ""

    # -- Datadog --
    datadog:
      service: ""
      env: ""
      dashboard_url: ""

    # -- Grafana --
    grafana:
      dashboard_uid: ""
      dashboard_url: "Profile-Prod-Active-Active-Dashboard"
      datasource: ""

    # -- Archer --
    archer:
      record_id: ""

    # -- Cloud Infrastructure & Native Observability --
    cloud:
      provider: "AWS"
      region: "us-east-1"
      account_id: "wdpr-gam-prod"
      infra_type: "ECS"
      cluster_id: "wdw-gam2-B0170520-use1-prd"
      service_name: "preference-svc-prod-live"

      cloudwatch:
        log_group: "prod-gam-profile-svc"
        namespace: ""
        alarm_prefix: ""

      loginsights:
        log_group: ""
        saved_query: ""

      gcp:
        project_id: ""
        log_filter: ""

      services:
        - type: "dynamodb"
          name: "Guest Preferences DynamoDB Tables"

    # -- Other Environments (only fields that differ from production) --
    other_environments:

      stage:
        health_check:
          url: "https://stage.use1.preference-svc-ha.gam-test.wdprapps.disney.com/preference-service/v1/bb8/status/summary"
        splunk:
          index: "wdpr-gam"
          base_spl: >-
            index=wdpr-gam "ids.app"="*preference-service*" environment=stage
        cloud:
          region: "us-east-1"
          service_name: "preference-svc-stage-live"

      load:
        health_check:
          url: "https://load.use1.preference-svc-ha.gam-test.wdprapps.disney.com/preference-service/v1/bb8/status/summary"
        splunk:
          index: "wdpr-gam"
          base_spl: >-
            index=wdpr-gam "ids.app"="*preference-service*" environment=load
        cloud:
          region: "us-east-1"
          service_name: "preference-svc-load-live"

      latest:
        health_check:
          url: "https://latest.use1.preference-svc-ha.gam-dev.wdprapps.disney.com/preference-service/v1/bb8/status/summary"
        splunk:
          index: "wdpr-gam"
          base_spl: >-
            index=wdpr-gam "ids.app"="*preference-service*" environment=latest
        cloud:
          region: "us-east-1"
          service_name: "preference-svc-latest-live"
