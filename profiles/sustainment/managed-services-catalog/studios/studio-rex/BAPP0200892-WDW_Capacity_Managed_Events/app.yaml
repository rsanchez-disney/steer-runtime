  # ── Eligibility ──────────────────────────────────────────────────────────────
  - component_name: "cme-elig-wdw"
    component_type: "api"
    description: "Checks guest entitlements and reservation rules per VID/SWID. First service called in park reservation flow."
    docs:
      troubleshooting: ""
      runbook: ""
    health_check:
      url: "https://cme-wdw.wdprapps.disney.com/eligibility/healthcheck"
      expected_status: 200
    splunk:
      index: "wdpr-ecommerce"
      source: ""
      base_spl: >-
        index=wdpr-ecommerce ecs_cluster="wdw-ecommerce-S00892-use1*" ecs_task_definition="cme-elig*"
      error_spl: >-
        index=wdpr-ecommerce ecs_cluster="wdw-ecommerce-S00892-use1*" ecs_task_definition="cme-elig*" ("*error*" OR "*exception*")
      latency_spl: >-
        index=wdpr-ecommerce ecs_cluster="wdw-ecommerce-S00892-use1*" ecs_task_definition="cme-elig*" RESP_OUT | spath input=Msg path=timeTakenInMillis | stats avg(timeTakenInMillis) as avg_ms, p95(timeTakenInMillis) as p95_ms
    appdynamics:
      app_name: "prod_ecommerce_S0001479_cme-wdw_aws"
      app_id: "1116"
