# CME — Capacity Managed Events (Park Reservations) — WDW
# ============================================================================

# --- Identity ---
bapp_id: "BAPP0200892"
app_name: "wdw-capacity-managed-events"
full_name: "WDW Capacity Managed Events"
description: >
  Park reservation eligibility, availability, booking, and retrieval for WDW.
  Flows: park-reservation, mk-renewal, ticket-upgrade-dlr, ticket-upgrade-wdw.
  Keywords: park reservation, calendar, blockout, no-show, CME, park pass, reserve a date, can't reserve,
  no current reservations, shared ticket reservation, MK renewal, Magic Key renewal, WDW AP upgrade,
  upgrade annual pass, WDW ticket upgrade.

# --- Ownership ---
support_studio: "Studio Rex"
escalation_channel: "https://teams.microsoft.com/l/channel/19%3Ar1Ir7jxgaNVFrUeszRxb372cgun0M4r9JtlZxvcXh3c1%40thread.tacv2/DX%20-%20Studio%20Rex?groupId=35a13470-e675-44b7-810e-f062466cffb5&tenantId=56b731a8-a2ac-4c32-bf6b-616810e913c6&ngc=true&allowXTenantAccess=true"
escalation_contacts:
  - name: "Julio Beverido"
    role: "Team Leader"
    contact: "Julio.Beverido.-ND@disney.com"

# --- ServiceNow ---
servicenow:
  configuration_items:
    - "WDW Capacity Managed Events"
  assignment_group: "app-global-cme"
  business_service: ""

# --- Documentation ---
documentation:
  runbook: "https://mywiki.disney.com/spaces/studiorex/pages/724511941/CME+Runbook"
  wiki: "https://confluence.disney.com/spaces/WDPROS/pages/1937270326/WDPRD+Entitlement-View-Assembly-Service+-+CTASK+Management"
  architecture_diagram: ""

# --- Companion Docs (Markdown) ---
docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

# --- Components ---
