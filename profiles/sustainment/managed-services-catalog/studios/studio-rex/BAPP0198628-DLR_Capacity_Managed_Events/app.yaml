# CME — Capacity Managed Events (Park Reservations) — DLR
# ============================================================================

# --- Identity ---
bapp_id: "BAPP0198628"
app_name: "dlr-capacity-managed-events"
full_name: "DLR Capacity Managed Events"
description: >
  Park reservation eligibility, availability, booking, and retrieval for DLR.
  Flows: park-reservation, mk-renewal, ticket-upgrade-dlr, ticket-upgrade-wdw.
  Keywords: park reservation, calendar, blockout, no-show, CME, park pass, reserve a date, can't reserve,
  no current reservations, shared ticket reservation, MK renewal, Magic Key renewal, ticket to pass,
  ticket to MK, DLR upgrade, upgrade to Magic Key.

# --- Ownership ---
support_studio: "Studio Rex"
escalation_channel: "https://teams.microsoft.com/l/channel/19%3Ar1Ir7jxgaNVFrUeszRxb372cgun0M4r9JtlZxvcXh3c1%40thread.tacv2/DX%20-%20Studio%20Rex?groupId=35a13470-e675-44b7-810e-f062466cffb5&tenantId=56b731a8-a2ac-4c32-bf6b-616810e913c6&ngc=true&allowXTenantAccess=true"
escalation_contacts:
  - name: "Julio Beverido"
    role: "Team Leader"
    contact: "Julio.Beverido.-ND@disney.com"

# --- ServiceNow ---
servicenow:
  configuration_item: "DLR Capacity Managed Events"
  assignment_group: "app-global-cme"
  business_service: ""

# --- Documentation ---
