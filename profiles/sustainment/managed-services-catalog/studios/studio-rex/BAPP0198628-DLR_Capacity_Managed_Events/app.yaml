  - component_name: "cme-elig-dlr"
    component_type: "api"
    description: "Checks guest entitlements and reservation rules per VID/SWID"
    docs:
      troubleshooting: ""
      runbook: ""
    health_check:
      url: "https://cme-dlr.wdprapps.disney.com/eligibility/healthcheck"
      expected_status: 200
    splunk:
      index: "wdpr-ecommerce"
      source: ""
      base_spl: >-
        index=wdpr-ecommerce ecs_cluster="dlr-ecommerce-S0001477*" ecs_task_definition="cme-elig*"
      error_spl: >-
        index=wdpr-ecommerce ecs_cluster="dlr-ecommerce-S0001477*" ecs_task_definition="cme-elig*" ("*error*" OR "*exception*")
      latency_spl: >-
        index=wdpr-ecommerce ecs_cluster="dlr-ecommerce-S0001477*" ecs_task_definition="cme-elig*" RESP_OUT | spath input=Msg path=timeTakenInMillis | stats avg(timeTakenInMillis) as avg_ms, p95(timeTakenInMillis) as p95_ms
