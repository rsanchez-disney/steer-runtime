        index=wdpr-apps ecs_cluster=*dtc* ecs_task_definition=*dtc* level=ERROR
      latency_spl: >-
        index=wdpr-apps ecs_cluster=*dtc* ecs_task_definition=*dtc*
        | stats avg(response_time) as avg_rt p95(response_time) as p95_rt by endpoint

