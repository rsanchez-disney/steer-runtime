# --- Identity ---
bapp_id: "BAPP0244886"
app_name: "wdpr-dinetime-reservation-sync"
full_name: "WDPR Dinetime Reservation Sync"
description: "Event-driven microservice that synchronizes Disney dining reservations from DREAMS into the DineTime vendor system (QSR Automation) via RabbitMQ messages."

# --- Ownership ---
support_studio: "Studio FNB"
escalation_channel: "Live Support - Dine Check-in and WUL | Mobile Retail and Restaurant"
escalation_contacts:
  - name: "Kevin Fittro"
    role: "primary"
    contact: "kevin.n.fittro@disney.com"
  - name: "Roberto Patoni Beltran"
    role: "secondary"
    contact: "roberto.patoni@disney.com"
  - name: "Aidelis Calvo"
    role: "SME"
    contact: "aidelis.x.calvo.-nd@disney.com"

# --- ServiceNow ---
servicenow:
  configuration_items:
    - "WDPR Dinetime Reservation Sync - AWS Latest"
    - "WDPR Dinetime Reservation Sync - AWS Load Test"
    - "WDPR Dinetime Reservation Sync - AWS Production"
    - "WDPR Dinetime Reservation Sync - AWS Staging"
  assignment_group: "prd-global-fnb"
  business_service: "Mobile Retail & Restaurant"

# --- Documentation ---
documentation:
  runbook: "https://mywiki.disney.com/spaces/FBT/pages/1251218545/DineTime+Reservation+Sync"
  wiki: "https://mywiki.disney.com/spaces/FBT/pages/793976222/Studio+Kronk"
  architecture_diagram: ""

# --- Companion Docs (Markdown) ---
docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

# --- Components ---
components:

  - component_name: "dinetime-res-sync-svc"
    component_type: "worker"
    description: "Event-driven ECS service consuming RabbitMQ messages for dining reservation sync"

    repository:
      url: "https://github.disney.com/studio-lumiere/dinetime-reservation-sync"
      branch: "master"
      path: ""

    cicd:
      platform: "jenkins"
      pipeline_url: "https://ee.cicd.wdprapps.disney.com/view/CICD%20Projects/job/dinetime-reservation-sync/"
      deploy_target: "ECS"

    health_check:
      url: "https://dinetime-res-sync.wdprapps.disney.com/healthcheck"
      expected_status: 200

    splunk:
      index: "wdpr_fnb_lumiere"
      source: "us-east-1:wdpr-revmgmt-S0001416-use1-dinetime-res-sync-svc-prd:dinetime-res-sync-svc-prod/dinetime-res-sync-svc/*"
      base_spl: >-
        index=wdpr_fnb_lumiere source="*dinetime-res-sync*prod*"
      error_spl: >-
        index=wdpr_fnb_lumiere source="*dinetime-res-sync*prod*" level=ERROR
      latency_spl: ""

    cloud:
      provider: "AWS"
      region: "us-east-1"
      account_id: "wdpr-revmgmt-prod"
      infra_type: "ECS"
      cluster_id: "wdpr-revmgmt-S0001416-use1-prd"
      service_name: "dinetime-res-sync-svc-prod-live"

      cloudwatch:
        log_group: ""
        namespace: ""
        alarm_prefix: ""

      services:
        - type: "sqs"
          name: "DINE.EVENTDINING.FNBSUB (RabbitMQ queue)"

    other_environments:
      stage:
        health_check:
          url: "https://stage.dinetime-res-sync.wdprapps.disney.com/healthcheck"
        cloud:
          region: "us-east-1"
          service_name: "dinetime-res-sync-svc-stage-live"

      load:
        health_check:
          url: "https://load.dinetime-res-sync.wdprapps.disney.com/healthcheck"
        cloud:
          region: "us-east-1"
          service_name: "dinetime-res-sync-svc-load-live"

      latest:
        health_check:
          url: "https://latest.dinetime-res-sync.wdprapps.disney.com/healthcheck"
        cloud:
          region: "us-east-1"
          service_name: "dinetime-res-sync-svc-latest-live"
