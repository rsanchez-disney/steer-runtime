# ============================================================================
# ADM Managed Services Catalog — Application Entry
# ============================================================================

# --- Identity ---
bapp_id: "BAPP0205130"
app_name: "wdw-retail-ordering-orchestration"
full_name: "WDW Retail Ordering Orchestration"
description: "Orchestration service for WDW mobile merchandise/retail checkout. Integrates with VenueNext for order processing, payment systems, and fulfillment."

# --- Ownership ---
support_studio: "Studio FNB"
escalation_channel: "Live Support - Merchandise Checkout | Mobile Retail and Restaurant"
escalation_contacts:
  - name: "Kevin Fittro"
    role: "primary"
    contact: "kevin.n.fittro@disney.com"
  - name: "Roberto Patoni Beltran"
    role: "secondary"
    contact: "roberto.patoni@disney.com"
  - name: "Aidelis Calvo"
    role: "SME"
    contact: "aidelis.x.calvo.-nd@disney.com"

# --- ServiceNow ---
servicenow:
  configuration_items:
    - "WDW Retail Ordering Orchestration - AWS Latest"
    - "WDW Retail Ordering Orchestration - AWS Load Test"
    - "WDW Retail Ordering Orchestration - AWS Production"
    - "WDW Retail Ordering Orchestration - AWS Staging"
  assignment_group: "prd-global-fnb"
  business_service: "Mobile Retail & Restaurant"

# --- Documentation ---
documentation:
  runbook: "https://mywiki.disney.com/spaces/FBT/pages/790430394/Mobile+Checkout+-+Runbook"
  wiki: "https://mywiki.disney.com/spaces/FBT/pages/793976222/Studio+Kronk"
  architecture_diagram: ""

# --- Companion Docs (Markdown) ---
docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

# --- Components ---
components:

  - component_name: "retail-ordering-orchestration-service"
    component_type: "api"
    description: "Java-based orchestration service for WDW retail checkout"

    repository:
      url: "https://github.disney.com/wdpro-development/retail-ordering-orchestration-service"
      branch: "master"
      path: ""

    cicd:
      platform: "harness"
      pipeline_url: "https://rundeck.wdprapps.disney.com/project/retail-ordering-orchestration-service_aws/jobs"
      deploy_target: "ECS"

    health_check:
      url: "https://wdw-roo.wdprapps.disney.com/svc/healthcheck"
      expected_status: 200

    splunk:
      index: "wdw_ro_service"
      source: "us-east-1:wdw-revmgmt-S0001320-use1-retailorder-svc-prd:retailorder-svc-prod/retailorder-svc/*"
      base_spl: >-
        index=wdw_ro_service source="us-east-1:wdw-revmgmt-S0001320-use1-retailorder-svc-prd:retailorder-svc-prod/retailorder-svc/*"
      error_spl: >-
        index=wdw_ro_service source="us-east-1:wdw-revmgmt-S0001320-use1-retailorder-svc-prd:retailorder-svc-prod/retailorder-svc/*" level=ERROR
      latency_spl: >-
        index=wdw_ro_service source="us-east-1:wdw-revmgmt-S0001320-use1-retailorder-svc-prd:retailorder-svc-prod/retailorder-svc/*"
        | stats avg(response_time) as avg_rt p95(response_time) as p95_rt by endpoint

    appdynamics:
      app_name: "retail-ordering-mobile-checkout-prod"
      app_id: "retail-ordering-mobile-checkout-prod"
      tier: "retailorder-svc"
      dashboard_url: "https://disney-prod.saas.appdynamics.com/controller/"

    grafana:
      dashboard_uid: ""
      dashboard_url: "https://wdpr-splunk-prod.wdprapps.disney.com/en-US/app/search/mobile_checkout__roo__health"
      datasource: "General Stats - WDW - ROO"

    cloud:
      provider: "AWS"
      region: "us-east-1"
      account_id: "wdpr-revmgmt-prod"
      infra_type: "ECS"
      cluster_id: "wdw-revmgmt-S0001320-use1-prd"
      service_name: "retailorder-svc-prod-live"

      cloudwatch:
        log_group: ""
        namespace: ""
        alarm_prefix: ""

      services:
        - type: "elasticache"
          name: "roo-prod"
