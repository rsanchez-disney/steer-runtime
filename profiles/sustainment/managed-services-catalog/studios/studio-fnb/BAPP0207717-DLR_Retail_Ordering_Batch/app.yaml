# --- Identity ---
bapp_id: "BAPP0207717"
app_name: "dlr-retail-ordering-batch"
full_name: "DLR Retail Ordering Batch"
description: "Batch service for DLR retail ordering that processes abandoned authorization refunds and order reconciliation. Runs on AWS Batch with Lambda triggers."

# --- Ownership ---
support_studio: "Studio FNB"
escalation_channel: "Live Support - Merchandise Checkout | Mobile Retail and Restaurant"
escalation_contacts:
  - name: "Kevin Fittro"
    role: "primary"
    contact: "kevin.n.fittro@disney.com"
  - name: "Roberto Patoni Beltran"
    role: "secondary"
    contact: "roberto.patoni@disney.com"
  - name: "Aidelis Calvo"
    role: "SME"
    contact: "aidelis.x.calvo.-nd@disney.com"

# --- ServiceNow ---
servicenow:
  configuration_items:
    - "DLR Retail Ordering Batch - AWS Latest"
    - "DLR Retail Ordering Batch - AWS Load Test"
    - "DLR Retail Ordering Batch - AWS Production"
    - "DLR Retail Ordering Batch - AWS Staging"
  assignment_group: "prd-global-fnb"
  business_service: "Mobile Retail & Restaurant"

# --- Documentation ---
documentation:
  runbook: "https://mywiki.disney.com/spaces/FBT/pages/790430394/Mobile+Checkout+-+Runbook"
  wiki: "https://mywiki.disney.com/spaces/FBT/pages/793976222/Studio+Kronk"
  architecture_diagram: ""

# --- Companion Docs (Markdown) ---
docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

# --- Components ---
components:

  - component_name: "ro-batch-dlr"
    component_type: "batch"
    description: "DLR Retail Ordering batch job on AWS Batch"

    repository:
      url: "https://github.disney.com/wdpro-development/wdpr-ro-batch-svc"
      branch: "master"
      path: ""

    cicd:
      platform: "harness"
      pipeline_url: "https://rundeck.wdprapps.disney.com/project/wdpr-ro-batch-svc_aws/jobs"
      deploy_target: "AWS Batch"

    splunk:
      index: "wdpr_revmgmt_prd_usw2_awsbatch"
      source: "us-west-2:/aws/batch/job:wdpr-ro-batch-svc-prod/default/*"
      base_spl: >-
        index=wdpr_revmgmt_prd_usw2_awsbatch source="us-west-2:/aws/batch/job:wdpr-ro-batch-svc-prod/default/*"
      error_spl: >-
        index=wdpr_revmgmt_prd_usw2_awsbatch source="us-west-2:/aws/batch/job:wdpr-ro-batch-svc-prod/default/*" level=ERROR
      latency_spl: ""

    cloud:
      provider: "AWS"
      region: "us-west-2"
      account_id: "wdpr-revmgmt-prod"
      infra_type: "Batch"
      cluster_id: ""
      service_name: "B0205283-wdprt-ro-batch-prod"

      cloudwatch:
        log_group: "/aws/batch/job"
        namespace: ""
        alarm_prefix: ""

      services:
        - type: "lambda"
          name: "wdpr-revmgmt-S0001535-usw2-prd-ro-awsbatch-cw"
