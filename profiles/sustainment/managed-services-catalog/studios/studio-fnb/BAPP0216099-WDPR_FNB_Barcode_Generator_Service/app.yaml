# ============================================================================
# ADM Managed Services Catalog — Application Entry
# ============================================================================

# --- Identity ---
bapp_id: "BAPP0216099"
app_name: "wdpr-fnb-barcode-generator-service"
full_name: "WDPR FNB Barcode Generator Service"
description: "Lambda-based barcode generation service shared by WDW and DLR. Creates barcode images for retail ordering receipts via API Gateway + Lambda + S3."

# --- Ownership ---
support_studio: "Studio FNB"
escalation_channel: "Live Support - Merchandise Checkout | Mobile Retail and Restaurant"
escalation_contacts:
  - name: "Kevin Fittro"
    role: "primary"
    contact: "kevin.n.fittro@disney.com"
  - name: "Roberto Patoni Beltran"
    role: "secondary"
    contact: "roberto.patoni@disney.com"
  - name: "Aidelis Calvo"
    role: "SME"
    contact: "aidelis.x.calvo.-nd@disney.com"

# --- ServiceNow ---
servicenow:
  configuration_items:
    - "WDPR FNB Barcode Generator Service - AWS Latest"
    - "WDPR FNB Barcode Generator Service - AWS Load Test"
    - "WDPR FNB Barcode Generator Service - AWS Production"
    - "WDPR FNB Barcode Generator Service - AWS Staging"
  assignment_group: "prd-global-fnb"
  business_service: "Mobile Retail & Restaurant"

# --- Documentation ---
documentation:
  runbook: "https://mywiki.disney.com/spaces/FBT/pages/790430394/Mobile+Checkout+-+Runbook"
  wiki: "https://mywiki.disney.com/spaces/FBT/pages/793976222/Studio+Kronk"
  architecture_diagram: ""

# --- Companion Docs (Markdown) ---
docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

# --- Components ---
components:

  - component_name: "barcode-gen-svc"
    component_type: "api"
    description: "Serverless barcode generator via API Gateway + Lambda + S3"

    repository:
      url: "https://github.disney.com/studio-lumiere/barcode-gen-svc"
      branch: "master"
      path: ""

    cicd:
      platform: "harness"
      pipeline_url: "https://rundeck.wdprapps.disney.com/project/barcode-gen-svc_aws/jobs"
      deploy_target: "Lambda"

    splunk:
      index: "wdpr_roo_barcode"
      source: "us-east-1:/aws/lambda/wdpr-revmgmt-S0001320-use1-prd-barcodegen-create*"
      base_spl: >-
        index=wdpr_roo_barcode
      error_spl: >-
        index=wdpr_roo_barcode level=ERROR
      latency_spl: ""

    cloud:
      provider: "AWS"
      region: "us-east-1"
      account_id: "wdpr-revmgmt-prod"
      infra_type: "Lambda"
      cluster_id: ""
      service_name: "wdpr-revmgmt-S0001320-use1-prd-barcodegen-create"

      cloudwatch:
        log_group: "/aws/lambda/wdpr-revmgmt-S0001320-use1-prd-barcodegen-create"
        namespace: ""
        alarm_prefix: ""

      services:
        - type: "s3"
          name: "wdw-revmgmt-s0001320-use1-prd-barcodes"
