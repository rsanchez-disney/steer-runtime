# ============================================================================
# ADM Managed Services Catalog — Application Entry
# ============================================================================

# --- Identity ---
bapp_id: "BAPP0245596"
app_name: "dlr-dining-menu-ui"
full_name: "DLR Dining Menu UI"
description: "Angular SPA for displaying dining menus on the DLR website (disneyland.disney.go.com). Deployed via GitLab Cassian SPA/S3 pipeline with Lambda backend."

# --- Ownership ---
support_studio: "Studio FNB"
escalation_channel: "Live Support - Dine Menus | Mobile Retail and Restaurant"
escalation_contacts:
  - name: "Kevin Fittro"
    role: "primary"
    contact: "kevin.n.fittro@disney.com"
  - name: "Roberto Patoni Beltran"
    role: "secondary"
    contact: "roberto.patoni@disney.com"
  - name: "Aidelis Calvo"
    role: "SME"
    contact: "aidelis.x.calvo.-nd@disney.com"

# --- ServiceNow ---
servicenow:
  configuration_items:
    - "DLR Dining Menu UI - AWS Latest"
    - "DLR Dining Menu UI - AWS Load Test"
    - "DLR Dining Menu UI - AWS Production"
    - "DLR Dining Menu UI - AWS Staging"
  assignment_group: "prd-global-fnb"
  business_service: "Mobile Retail & Restaurant"

# --- Documentation ---
documentation:
  runbook: "https://mywiki.disney.com/spaces/FBT/pages/790430416/Dining+Menu+UI+-+Runbook"
  wiki: "https://mywiki.disney.com/spaces/FBT/pages/793976222/Studio+Kronk"
  architecture_diagram: ""

# --- Companion Docs (Markdown) ---
docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

# --- Components ---
components:

  - component_name: "dinemenu-dlr"
    component_type: "frontend"
    description: "DLR Dining Menu Angular SPA + Lambda on S3/API Gateway"

    repository:
      url: "https://gitlab.disney.com/cgs-wdw/dinemenu"
      branch: "master"
      path: ""

    cicd:
      platform: "gitlab"
      pipeline_url: "GitLab Cassian SPA/S3 pipeline"
      deploy_target: "S3 + API Gateway + Lambda"

    health_check:
      url: "https://disneyland.disney.go.com/dining/disney-california-adventure/corn-dog-castle/menus/"
      expected_status: 200

    splunk:
      index: "wdpr_diningmenu_service"
      source: "us-west-2:/aws/lambda/dinemenu-usw2-prd-dinemenu*"
      base_spl: >-
        index=wdpr_diningmenu_service source="*usw2*prod*"
      error_spl: >-
        index=wdpr_diningmenu_service source="*usw2*prod*" level=ERROR
      latency_spl: ""

    cloud:
      provider: "AWS"
      region: "us-west-2"
      account_id: "wdpr-revmgmt-prod"
      infra_type: "Lambda"
      cluster_id: ""
      service_name: "dinemenu-usw2-prd"

      cloudwatch:
        log_group: "/aws/lambda/dinemenu-usw2-prd-dinemenu"
        namespace: ""
        alarm_prefix: ""

      services:
        - type: "s3"
          name: "cgssre-wdpr-revmgmt-prod-usw2-spa"
