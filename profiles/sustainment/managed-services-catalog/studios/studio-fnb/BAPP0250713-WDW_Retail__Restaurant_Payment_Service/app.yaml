# ============================================================================
# ADM Managed Services Catalog — Application Entry
# ============================================================================

# --- Identity ---
bapp_id: "BAPP0250713"
app_name: "wdw-retail-restaurant-payment-service"
full_name: "WDW Retail & Restaurant Payment Service"
description: "Payment processing service for WDW retail and restaurant transactions. Handles payment orchestration, order tracking, and refund processing for mobile ordering and merchandise checkout."

# --- Ownership ---
support_studio: "Studio FNB"
escalation_channel: "Live Support - Mobile Order | Mobile Retail and Restaurant"
escalation_contacts:
  - name: "Kevin Fittro"
    role: "primary"
    contact: "kevin.n.fittro@disney.com"
  - name: "Roberto Patoni Beltran"
    role: "secondary"
    contact: "roberto.patoni@disney.com"
  - name: "Aidelis Calvo"
    role: "SME"
    contact: "aidelis.x.calvo.-nd@disney.com"

# --- ServiceNow ---
servicenow:
  configuration_items:
    - "WDW Retail & Restaurant Payment Service - AWS Latest"
    - "WDW Retail & Restaurant Payment Service - AWS Load Test"
    - "WDW Retail & Restaurant Payment Service - AWS Production"
    - "WDW Retail & Restaurant Payment Service - AWS Staging"
  assignment_group: "prd-global-fnb"
  business_service: "Mobile Retail & Restaurant"

# --- Documentation ---
documentation:
  runbook: "https://mywiki.disney.com/spaces/FBT/pages/1005226254/Payment+Service+-+Runbook"
  wiki: "https://mywiki.disney.com/spaces/FBT/pages/793976222/Studio+Kronk"
  architecture_diagram: ""

# --- Companion Docs (Markdown) ---
docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

# --- Components ---
components:

  - component_name: "rr-payment-service-wdw"
    component_type: "api"
    description: "WDW Payment Service on ECS"

    repository:
      url: "https://github.disney.com/studio-lumiere/payment-service"
      branch: "master"
      path: ""

    cicd:
      platform: "harness"
      pipeline_url: "https://disney.harness.io/ng/account/1-wFe3qRQv2mUh1s9244Eg/all/orgs/Commerce/projects/Retail_Restaurant_Payment_Service/pipelines"
      deploy_target: "ECS"

    health_check:
      url: "https://latest.rr-payment.wdw.wdprapps.disney.com/healthcheck"
      expected_status: 200

    splunk:
      index: "wdpr-revmgmt"
      source: "stdout"
      base_spl: >-
        index=wdpr-revmgmt service=rr-payment-service aws_region=us-east-1
      error_spl: >-
        index=wdpr-revmgmt service=rr-payment-service aws_region=us-east-1 level=ERROR
      latency_spl: ""

    cloud:
      provider: "AWS"
      region: "us-east-1"
      account_id: "wdpr-revmgmt-prod"
      infra_type: "ECS"
      cluster_id: "rr-payment-prod"
      service_name: "rr-payment-service-prod"

      cloudwatch:
        log_group: ""
        namespace: ""
        alarm_prefix: ""

      services:
        - type: "dynamodb"
          name: "wdw-rr-payment-service-dynamodb-bapp0250713-prod-orders"
        - type: "dynamodb"
          name: "wdw-rr-payment-service-dynamodb-bapp0250713-prod-refunds"

  - component_name: "rr-payment-batch-wdw"
    component_type: "batch"
    description: "WDW Payment Batch Lambda"

    repository:
      url: "https://github.disney.com/studio-lumiere/payment-batch"
      branch: "master"
      path: ""

    cloud:
      provider: "AWS"
      region: "us-east-1"
      account_id: "wdpr-revmgmt-prod"
      infra_type: "Lambda"
      cluster_id: ""
      service_name: "rr-payment-batch-prod-api"

    other_environments:
      stage:
        health_check:
          url: "https://stage.rr-payment.wdw.wdprapps.disney.com/healthcheck"
      load:
        health_check:
          url: "https://load.rr-payment.wdw.wdprapps.disney.com/healthcheck"
      latest:
        health_check:
          url: "https://latest.rr-payment.wdw.wdprapps.disney.com/healthcheck"
