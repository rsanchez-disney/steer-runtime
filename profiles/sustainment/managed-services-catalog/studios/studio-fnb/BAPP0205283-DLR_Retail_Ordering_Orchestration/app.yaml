# ============================================================================
# ADM Managed Services Catalog — Application Entry
# ============================================================================

# --- Identity ---
bapp_id: "BAPP0205283"
app_name: "dlr-retail-ordering-orchestration"
full_name: "DLR Retail Ordering Orchestration"
description: "Orchestration service for Disneyland Resort mobile merchandise/retail checkout, integrating with VenueNext for order processing."

# --- Ownership ---
support_studio: "Studio FNB"
escalation_channel: "Live Support - Merchandise Checkout | Mobile Retail and Restaurant"
escalation_contacts:
  - name: "Kevin Fittro"
    role: "primary"
    contact: "kevin.n.fittro@disney.com"
  - name: "Roberto Patoni Beltran"
    role: "secondary"
    contact: "roberto.patoni@disney.com"
  - name: "Aidelis Calvo"
    role: "SME"
    contact: "aidelis.x.calvo.-nd@disney.com"

# --- ServiceNow ---
servicenow:
  configuration_items:
    - "DLR Retail Ordering Orchestration - AWS Latest"
    - "DLR Retail Ordering Orchestration - AWS Load Test"
    - "DLR Retail Ordering Orchestration - AWS Production"
    - "DLR Retail Ordering Orchestration - AWS Staging"
  assignment_group: "prd-global-fnb"
  business_service: "Mobile Retail & Restaurant"

# --- Documentation ---
documentation:
  runbook: "https://mywiki.disney.com/spaces/FBT/pages/790430394/Mobile+Checkout+-+Runbook"
  wiki: "https://mywiki.disney.com/spaces/FBT/pages/793976222/Studio+Kronk"
  architecture_diagram: ""

# --- Companion Docs (Markdown) ---
docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

# --- Components ---
components:

  - component_name: "retail-ordering-orchestration-service"
    component_type: "api"
    description: "Java-based orchestration service for DLR retail checkout"

    repository:
      url: "https://github.disney.com/wdpro-development/retail-ordering-orchestration-service"
      branch: "master"
      path: ""

    cicd:
      platform: "harness"
      pipeline_url: "https://rundeck.wdprapps.disney.com/project/retail-ordering-orchestration-service_aws/jobs"
      deploy_target: "ECS"

    health_check:
      url: "https://dlr-roo.wdprapps.disney.com/svc/healthcheck"
      expected_status: 200

    splunk:
      index: "dlr_ro_service"
      source: "us-west-2:dlr-revmgmt-S0001535-usw2-retailorder-svc-prd:retailorder-svc-prod/retailorder-svc/*"
      base_spl: >-
        index=dlr_ro_service source="us-west-2:dlr-revmgmt-S0001535-usw2-retailorder-svc-prd:retailorder-svc-prod/retailorder-svc/*"
      error_spl: >-
        index=dlr_ro_service source="us-west-2:dlr-revmgmt-S0001535-usw2-retailorder-svc-prd:retailorder-svc-prod/retailorder-svc/*" level=ERROR
      latency_spl: >-
        index=dlr_ro_service source="us-west-2:dlr-revmgmt-S0001535-usw2-retailorder-svc-prd:retailorder-svc-prod/retailorder-svc/*"
        | stats avg(response_time) as avg_rt p95(response_time) as p95_rt by endpoint

    appdynamics:
      app_name: "retail-ordering-mobile-checkout-prod"
      app_id: "retail-ordering-mobile-checkout-prod"
      tier: "retailorder-svc"
      dashboard_url: "https://disney-prod.saas.appdynamics.com/controller/"

    grafana:
      dashboard_uid: ""
      dashboard_url: "https://wdpr-splunk-prod.wdprapps.disney.com/en-US/app/search/mobile_checkout__roo__health"
      datasource: "General Stats - DLR - ROO"

    cloud:
      provider: "AWS"
      region: "us-west-2"
      account_id: "wdpr-revmgmt-prod"
      infra_type: "ECS"
      cluster_id: "dlr-revmgmt-S0001535-usw2-prd"
      service_name: "retailorder-svc-prod-live"

      cloudwatch:
        log_group: ""
        namespace: ""
        alarm_prefix: ""

    other_environments:
      stage:
        health_check:
          url: "https://stage.dlr-roo.wdprapps.disney.com/svc/healthcheck"
        splunk:
          index: "dlr_ro_service"
          base_spl: >-
            index=dlr_ro_service source="*stage*"
        cloud:
          region: "us-west-2"
          service_name: "retailorder-svc-stage-live"

      load:
        health_check:
          url: "https://load.dlr-roo.wdprapps.disney.com/svc/healthcheck"
        splunk:
          index: "dlr_ro_service"
          base_spl: >-
            index=dlr_ro_service source="*load*"
        cloud:
          region: "us-west-2"
          service_name: "retailorder-svc-load-live"

      latest:
        health_check:
          url: "https://latest.dlr-roo.wdprapps.disney.com/svc/healthcheck"
        splunk:
          index: "dlr_ro_service"
          base_spl: >-
            index=dlr_ro_service source="*latest*"
        cloud:
          region: "us-west-2"
          service_name: "retailorder-svc-latest-live"
