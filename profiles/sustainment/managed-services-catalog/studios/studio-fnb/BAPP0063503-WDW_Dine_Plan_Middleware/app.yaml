# --- Components ---
components:

  - component_name: "dine-plan-middleware"
    component_type: "api"
    description: "Dining plan validation middleware called by MOO for DDP credit redemptions"

    repository:
      url: "N/A - not documented on wiki"
      branch: "master"
      path: ""

    cicd:
      platform: "harness"
      pipeline_url: "N/A - not documented on wiki"
      deploy_target: "ECS"

    health_check:
      url: "N/A - part of MOO service flow, no independent health check documented"
      expected_status: 200

    splunk:
      index: "wdpr_ddpmw"
      source: "*dine-plan*"
      base_spl: >-
        index=wdpr_ddpmw source=*dine-plan*
      error_spl: >-
        index=wdpr_ddpmw source=*dine-plan* level=ERROR
      latency_spl: >-
        index=wdpr_ddpmw source=*dine-plan*
        | stats avg(response_time) as avg_rt p95(response_time) as p95_rt by endpoint

    cloud:
      provider: "AWS"
      region: "us-east-1"
      account_id: "wdpr-revmgmt-prod"
      infra_type: "ECS"
      cluster_id: "N/A - not documented"
      service_name: "N/A - not documented"

      cloudwatch:
        log_group: ""
        namespace: ""
        alarm_prefix: ""
