# --- Identity ---
bapp_id: "BAPP0245716"
app_name: "dlr-fnb-order-service"
full_name: "DLR FnB Order Service"
description: "Event-driven service for DLR that processes food and beverage orders, publishing order events to Kinesis streams. Stores placed orders in DynamoDB with Redis caching."

# --- Ownership ---
support_studio: "Studio FNB"
escalation_channel: "Live Support - Mobile Order | Mobile Retail and Restaurant"
escalation_contacts:
  - name: "Kevin Fittro"
    role: "primary"
    contact: "kevin.n.fittro@disney.com"
  - name: "Roberto Patoni Beltran"
    role: "secondary"
    contact: "roberto.patoni@disney.com"
  - name: "Aidelis Calvo"
    role: "SME"
    contact: "aidelis.x.calvo.-nd@disney.com"

# --- ServiceNow ---
servicenow:
  configuration_items:
    - "DLR FnB Order Service - AWS Latest"
    - "DLR FnB Order Service - AWS Load Test"
    - "DLR FnB Order Service - AWS Production"
    - "DLR FnB Order Service - AWS Staging"
  assignment_group: "prd-global-fnb"
  business_service: "Mobile Retail & Restaurant"

# --- Documentation ---
documentation:
  runbook: "https://mywiki.disney.com/spaces/FBT/pages/790430726/Order+Service+-+Runbook"
  wiki: "https://mywiki.disney.com/spaces/FBT/pages/793976222/Studio+Kronk"
  architecture_diagram: ""

# --- Companion Docs (Markdown) ---
docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

# --- Components ---
components:

  - component_name: "fnb-order-svc-dlr"
    component_type: "api"
    description: "DLR FnB Order Service - Java ECS with Kinesis, DynamoDB, Redis"

    repository:
      url: "https://github.disney.com/studio-lumiere/fnb-order-service"
      branch: "master"
      path: ""

    cicd:
      platform: "jenkins"
      pipeline_url: "https://ee.cicd.wdprapps.disney.com/job/fnb-order-service/"
      deploy_target: "ECS"

    splunk:
      index: "wdpr_fnb_order_service"
      source: "*prod*"
      base_spl: >-
        index=wdpr_fnb_order_service source="*usw2*prod*"
      error_spl: >-
        index=wdpr_fnb_order_service source="*usw2*prod*" level=ERROR
      latency_spl: >-
        index=wdpr_fnb_order_service source="*usw2*prod*"
        | stats avg(response_time) as avg_rt p95(response_time) as p95_rt by endpoint

    appdynamics:
      app_name: "dlr-revmgmt-S0001533-usw2-prd_fnb-order_aws"
      app_id: "1425"
      tier: "fnb-order-svc"
      dashboard_url: "https://disney-prod.saas.appdynamics.com/controller/#/location=APP_DASHBOARD&application=1425"

    cloud:
      provider: "AWS"
      region: "us-west-2"
      account_id: "wdpr-revmgmt-prod"
      infra_type: "ECS"
      cluster_id: "dlr-revmgmt-S0001533-usw2-prd"
      service_name: "fnb-order-svc-prod-live"

      cloudwatch:
        log_group: ""
        namespace: ""
        alarm_prefix: ""

      services:
        - type: "dynamodb"
          name: "PlacedOrders"
        - type: "elasticache"
          name: "fnb-order-prod"
        - type: "kinesis"
          name: "dlr-revmgmt-S0001533-usw2-fnb-order-prd"
