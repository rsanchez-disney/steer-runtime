# --- Identity ---
bapp_id: "BAPP0245182"
app_name: "wdprt-pitdroids"
full_name: "WDPRT PitDroids"
description: "Backend Java orchestration service integrating with MOO, ROO, DiSCO and VenueNext to support a Flutter mobile app for Tech/Operations teams to review, monitor and triage Mobile Ordering, Merchandise Checkout, and Dine Self-Check-In."

# --- Ownership ---
support_studio: "Studio FNB"
escalation_channel: "Live Support - Mobile Order | Mobile Retail and Restaurant"
escalation_contacts:
  - name: "Kevin Fittro"
    role: "primary"
    contact: "kevin.n.fittro@disney.com"
  - name: "Roberto Patoni Beltran"
    role: "secondary"
    contact: "roberto.patoni@disney.com"
  - name: "Aidelis Calvo"
    role: "SME"
    contact: "aidelis.x.calvo.-nd@disney.com"

# --- ServiceNow ---
servicenow:
  configuration_items:
    - "WDPRT PitDroids - Latest"
    - "WDPRT PitDroids - Load Test"
    - "WDPRT PitDroids - Production"
    - "WDPRT PitDroids - Staging"
  assignment_group: "prd-global-fnb"
  business_service: "Mobile Retail & Restaurant"

# --- Documentation ---
documentation:
  runbook: "https://mywiki.disney.com/spaces/FBT/pages/790430390/PitDroids+-+Runbook"
  wiki: "https://mywiki.disney.com/spaces/FBT/pages/793976222/Studio+Kronk"
  architecture_diagram: ""

# --- Companion Docs (Markdown) ---
docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

# --- Components ---
components:

  - component_name: "pitdroids-orchestration-service"
    component_type: "api"
    description: "Java backend orchestration service for PitDroids"

    repository:
      url: "https://github.disney.com/studio-lumiere/pitdroids-orchestration-service"
      branch: "master"
      path: ""

    cicd:
      platform: "jenkins"
      pipeline_url: "https://ee.cicd.wdprapps.disney.com/job/pitdroids-orchestration-service/"
      deploy_target: "ECS"

    health_check:
      url: "https://pitdroids.wdprapps.disney.com"
      expected_status: 200

    splunk:
      index: "wdpr_pitdroids_service"
      source: "*prod*"
      base_spl: >-
        index=wdpr_pitdroids_service
      error_spl: >-
        index=wdpr_pitdroids_service level=ERROR
      latency_spl: >-
        index=wdpr_pitdroids_service
        | stats avg(response_time) as avg_rt p95(response_time) as p95_rt by endpoint

    cloud:
      provider: "AWS"
      region: "us-east-1"
      account_id: "wdpr-cast"
      infra_type: "ECS"
      cluster_id: "wdpr-cast-S0001416-use1-lst"
      service_name: "pitdroids-svc-prod-live"

      cloudwatch:
        log_group: ""
        namespace: ""
        alarm_prefix: ""

  - component_name: "pitdroids-spa"
    component_type: "frontend"
    description: "Flutter mobile SPA for operations teams"

    repository:
      url: "https://github.disney.com/studio-lumiere/pitdroids-spa"
      branch: "master"
      path: ""

    cicd:
      platform: "jenkins"
      pipeline_url: "https://ee.cicd.wdprapps.disney.com/job/pitdroids-orchestration-service/"
      deploy_target: "ECS"
