# --- Identity ---
bapp_id: "BAPP0216524"
app_name: "dlr-dine-admin-tool"
full_name: "DLR Dine Admin Tool"
description: "Admin tool for DLR Dine Self Check-In configuration management. Three sub-components: Config Service (backend), Admin API, and Admin UI. Same architecture as WDW deployed to DLR region."

# --- Ownership ---
support_studio: "Studio FNB"
escalation_channel: "Live Support - Dine Check-in and WUL | Mobile Retail and Restaurant"
escalation_contacts:
  - name: "Kevin Fittro"
    role: "primary"
    contact: "kevin.n.fittro@disney.com"
  - name: "Roberto Patoni Beltran"
    role: "secondary"
    contact: "roberto.patoni@disney.com"
  - name: "Aidelis Calvo"
    role: "SME"
    contact: "aidelis.x.calvo.-nd@disney.com"

# --- ServiceNow ---
servicenow:
  configuration_items:
    - "DLR Dine Admin Tool - AWS Latest"
    - "DLR Dine Admin Tool - AWS Load Test"
    - "DLR Dine Admin Tool - AWS Production"
    - "DLR Dine Admin Tool - AWS Stage"
  assignment_group: "prd-global-fnb"
  business_service: "Mobile Retail & Restaurant"

# --- Documentation ---
documentation:
  runbook: "https://mywiki.disney.com/spaces/FBT/pages/790430539/Dine+Self+Checkin-Admin+UI+-+Runbook"
  wiki: "https://mywiki.disney.com/spaces/FBT/pages/793976222/Studio+Kronk"
  architecture_diagram: ""

# --- Companion Docs (Markdown) ---
docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

# --- Components ---
components:

  - component_name: "dineadmintool-svc-dlr"
    component_type: "api"
    description: "DLR Dine Admin Config Service backend"

    cicd:
      platform: "harness"
      pipeline_url: "https://disney.harness.io/ng/account/1-wFe3qRQv2mUh1s9244Eg/all/orgs/Commerce/projects/WDW_Dine_Admin_Tool/pipelines"
      deploy_target: "ECS"

    health_check:
      url: "https://dineadmintool-dlr.wdprapps.disney.com/dine-self-checkin-config-service/api/v1/healthcheck"
      expected_status: 200

    splunk:
      index: "wdpr_dineadmintool_dlr"
      source: "us-west-2:dlr-revmgmt-S0001535-usw2-dineadmintool-svc-prd:dineadmintool-svc-prod/dineadmintool-svc/*"
      base_spl: >-
        index=wdpr_dineadmintool_dlr source="*dineadmintool-svc-prod*"
      error_spl: >-
        index=wdpr_dineadmintool_dlr source="*dineadmintool-svc-prod*" level=ERROR
      latency_spl: ""

    cloud:
      provider: "AWS"
      region: "us-west-2"
      account_id: "wdpr-revmgmt-prod"
      infra_type: "ECS"
      cluster_id: "dlr-revmgmt-S0001535-usw2-prd"
      service_name: "dineadmintool-svc-prod-live"

      cloudwatch:
        log_group: "dlr-revmgmt-S0001535-usw2-dineadmintool-svc-prd"
        namespace: ""
        alarm_prefix: ""

  - component_name: "dineadmintool-api-dlr"
    component_type: "api"
    description: "DLR Dine Admin API"

    health_check:
      url: "https://dineadmintool-dlr.wdprapps.disney.com/dine-admin-tool/api/v1/healthcheck"
      expected_status: 200

    cloud:
      provider: "AWS"
      region: "us-west-2"
      account_id: "wdpr-revmgmt-prod"
      infra_type: "ECS"
      cluster_id: "dlr-revmgmt-S0001535-usw2-prd"
      service_name: "dineadmintool-api-prod-live"

      cloudwatch:
        log_group: "dlr-revmgmt-S0001535-usw2-dineadmintool-api-prd"
        namespace: ""
        alarm_prefix: ""

  - component_name: "dineadmintool-ui-dlr"
    component_type: "frontend"
    description: "DLR Dine Admin UI"

    health_check:
      url: "https://dineadmintool-dlr.wdprapps.disney.com/healthcheck"
      expected_status: 200

    cloud:
      provider: "AWS"
      region: "us-west-2"
      account_id: "wdpr-revmgmt-prod"
      infra_type: "ECS"
      cluster_id: "dlr-revmgmt-S0001535-usw2-prd"
      service_name: "dineadmintool-ui-prod-live"
