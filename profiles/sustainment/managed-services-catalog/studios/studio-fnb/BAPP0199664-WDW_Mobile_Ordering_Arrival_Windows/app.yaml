# --- Identity ---
bapp_id: "BAPP0199664"
app_name: "wdw-mobile-ordering-arrival-windows"
full_name: "WDW Mobile Ordering Arrival Windows"
description: "Manages arrival window time slots for WDW mobile ordering pickup. Multiple sub-components: Service, Batch, API, and Flutter UI."

# --- Ownership ---
support_studio: "Studio FNB"
escalation_channel: "Live Support - Mobile Order | Mobile Retail and Restaurant"
escalation_contacts:
  - name: "Kevin Fittro"
    role: "primary"
    contact: "kevin.n.fittro@disney.com"
  - name: "Roberto Patoni Beltran"
    role: "secondary"
    contact: "roberto.patoni@disney.com"
  - name: "Aidelis Calvo"
    role: "SME"
    contact: "aidelis.x.calvo.-nd@disney.com"

# --- ServiceNow ---
servicenow:
  configuration_items:
    - "WDW Mobile Ordering Arrival Windows - AWS Latest"
    - "WDW Mobile Ordering Arrival Windows - AWS Load Test"
    - "WDW Mobile Ordering Arrival Windows - AWS Production"
    - "WDW Mobile Ordering Arrival Windows - AWS Staging"
  assignment_group: "prd-global-fnb"
  business_service: "Mobile Retail & Restaurant"

# --- Documentation ---
documentation:
  runbook: "https://mywiki.disney.com/spaces/FBT/pages/790430631/Arrival+Windows+-+Runbook"
  wiki: "https://mywiki.disney.com/spaces/FBT/pages/793976222/Studio+Kronk"
  architecture_diagram: ""

# --- Companion Docs (Markdown) ---
docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

# --- Components ---
components:

  - component_name: "arrw-svc-wdw"
    component_type: "api"
    description: "WDW Arrival Windows service"

    repository:
      url: "https://github.disney.com/StudioFeast/wdpr-sales-dlrarrw-svc"
      branch: "master"
      path: ""

    cicd:
      platform: "harness"
      pipeline_url: "https://rundeck.wdprapps.disney.com/project/wdpr-sales-dlrarrw-svc_aws/jobs"
      deploy_target: "ECS"

    health_check:
      url: "https://wdwarrw-svc.wdprapps.disney.com/arrival-window-service/healthcheck"
      expected_status: 200

    splunk:
      index: "wdw_arrw"
      source: "us-east-1:wdw-revmgmt-S0001409-use1-arrw-svc-prd:arrw-svc-prod/arrw-svc/*"
      base_spl: >-
        index=wdw_arrw source="us-east-1:wdw-revmgmt-S0001409-use1-arrw-svc-prd:arrw-svc-prod/arrw-svc/*"
      error_spl: >-
        index=wdw_arrw source="us-east-1:wdw-revmgmt-S0001409-use1-arrw-svc-prd:arrw-svc-prod/arrw-svc/*" level=ERROR
      latency_spl: >-
        index=wdw_arrw source="us-east-1:wdw-revmgmt-S0001409-use1-arrw-svc-prd:arrw-svc-prod/arrw-svc/*"
        | stats avg(response_time) as avg_rt p95(response_time) as p95_rt by endpoint

    appdynamics:
      app_name: "prod_wdwarrw_aws"
      app_id: "prod_wdwarrw_aws"
      tier: "arrival-window-service"
      dashboard_url: "https://disney-prod.saas.appdynamics.com/controller/"

    grafana:
      dashboard_uid: ""
      dashboard_url: "https://wdpr-splunk-prod.wdprapps.disney.com/en-US/app/search/wdw_arrival_windows"
      datasource: "Arrival Windows | WDW | Rundeck Deployments | AWS | CloudWatch Logs"

    cloud:
      provider: "AWS"
      region: "us-east-1"
      account_id: "wdpr-revmgmt-prod"
      infra_type: "ECS"
      cluster_id: "wdw-revmgmt-S0001409-use1-prd"
      service_name: "arrw-svc-prod-live"

      cloudwatch:
        log_group: ""
        namespace: ""
        alarm_prefix: ""

      services:
        - type: "rds"
          name: "wdw-arrivalwindow-prod-master.wdatdbs.disney.com"

  - component_name: "arrw-batch-wdw"
    component_type: "batch"
    description: "WDW Arrival Windows batch processing"

    repository:
      url: "https://github.disney.com/StudioFeast/wdpr-sales-dlrarrw-batch"
      branch: "master"
      path: ""

    health_check:
      url: "https://wdwarrw-batch.wdprapps.disney.com/arrival-window-batch/healthcheck"
      expected_status: 200

    cloud:
      provider: "AWS"
      region: "us-east-1"
      account_id: "wdpr-revmgmt-prod"
      infra_type: "ECS"
      cluster_id: "wdw-revmgmt-S0001409-use1-prd"
      service_name: "arrw-batch-prod-live"

  - component_name: "arrw-ui-wdw"
    component_type: "frontend"
    description: "WDW Arrival Windows Flutter UI SPA"

    repository:
      url: "https://gitlab.disney.com/cgs-wdw/arrwui/arrwui-spa"
      branch: "master"
      path: ""

    health_check:
      url: "https://wdwarrw-ui.wdprapps.disney.com/api/healthcheck"
      expected_status: 200

    cloud:
      provider: "AWS"
      region: "us-east-1"
      account_id: "wdpr-revmgmt-prod"
      infra_type: "ECS"
      cluster_id: "wdw-revmgmt-S0001409-use1-prd"
      service_name: "arrw-ui-prod-live"
