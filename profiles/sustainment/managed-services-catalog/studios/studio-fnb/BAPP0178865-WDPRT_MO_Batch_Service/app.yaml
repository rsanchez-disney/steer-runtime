# ============================================================================
# ADM Managed Services Catalog — Application Entry
# ============================================================================

# --- Identity ---
bapp_id: "BAPP0178865"
app_name: "wdprt-mo-batch-service"
full_name: "WDPRT MO Batch Service"
description: "Batch service responsible for refunding abandoned payment authorizations tracked by MOO. Runs on AWS Batch on a scheduler for both WDW and DLR."

# --- Ownership ---
support_studio: "Studio FNB"
escalation_channel: "Live Support - Mobile Order | Mobile Retail and Restaurant"
escalation_contacts:
  - name: "Kevin Fittro"
    role: "primary"
    contact: "kevin.n.fittro@disney.com"
  - name: "Roberto Patoni Beltran"
    role: "secondary"
    contact: "roberto.patoni@disney.com"
  - name: "Aidelis Calvo"
    role: "SME"
    contact: "aidelis.x.calvo.-nd@disney.com"

# --- ServiceNow ---
servicenow:
  configuration_items:
    - "WDPRT MO Batch Service - DLR - AWS Latest"
    - "WDPRT MO Batch Service - DLR - AWS Load Test"
    - "WDPRT MO Batch Service - DLR - AWS Production"
    - "WDPRT MO Batch Service - DLR - AWS Staging"
    - "WDPRT MO Batch Service - WDW  - AWS Production"
    - "WDPRT MO Batch Service - WDW - AWS Latest"
    - "WDPRT MO Batch Service - WDW - AWS Load Test"
    - "WDPRT MO Batch Service - WDW - AWS Staging"
  assignment_group: "prd-global-fnb"
  business_service: "Mobile Retail & Restaurant"

# --- Documentation ---
documentation:
  runbook: "https://mywiki.disney.com/spaces/FBT/pages/790430431/Mobile+Order+-+Runbook"
  wiki: "https://mywiki.disney.com/spaces/FBT/pages/793976222/Studio+Kronk"
  architecture_diagram: ""

# --- Companion Docs (Markdown) ---
docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

# --- Components ---
components:

  - component_name: "mo-batch-wdw"
    component_type: "batch"
    description: "WDW MO Batch - refunds abandoned authorizations via AWS Batch"

    repository:
      url: "https://github.disney.com/wdpro-development/wdpr-mo-batch-svc"
      branch: "master"
      path: ""

    cicd:
      platform: "harness"
      pipeline_url: "https://disney.harness.io/ng/account/1-wFe3qRQv2mUh1s9244Eg/all/orgs/Commerce/projects/WDPRT_MO_Batch_Service/pipelines"
      deploy_target: "AWS Batch"

    splunk:
      index: "wdpr_revmgmt_prod_use1_awsbatch"
      source: "*mo-batch*"
      base_spl: >-
        index=wdpr_revmgmt_prod_use1_awsbatch source=*mo-batch*
      error_spl: >-
        index=wdpr_revmgmt_prod_use1_awsbatch source=*mo-batch* level=ERROR
      latency_spl: ""

    grafana:
      dashboard_uid: ""
      dashboard_url: "Grafana: WDW - Mobile Ordering BATCH"
      datasource: "WDW - Mobile Ordering BATCH"

    cloud:
      provider: "AWS"
      region: "us-east-1"
      account_id: "wdpr-revmgmt-prod"
      infra_type: "Batch"
      cluster_id: ""
      service_name: "wdpr-mo-batch-svc-prod"

      cloudwatch:
        log_group: "/aws/batch/job"
        namespace: ""
        alarm_prefix: ""

      services:
        - type: "dynamodb"
          name: "wdw-revmgmt-nb-B0178865-mo-batch-prd-orders"
        - type: "dynamodb"
          name: "wdw-revmgmt-nb-B0178865-mo-batch-prd-processedorders"

  - component_name: "mo-batch-dlr"
    component_type: "batch"
    description: "DLR MO Batch - refunds abandoned authorizations via AWS Batch"

    repository:
      url: "https://github.disney.com/wdpro-development/wdpr-mo-batch-svc"
      branch: "master"
      path: ""

    cicd:
      platform: "harness"
      pipeline_url: "https://disney.harness.io/ng/account/1-wFe3qRQv2mUh1s9244Eg/all/orgs/Commerce/projects/WDPRT_MO_Batch_Service/pipelines"
      deploy_target: "AWS Batch"

    splunk:
      index: "wdpr_revmgmt_prd_usw2_awsbatch"
      source: "*mo-batch*"
      base_spl: >-
        index=wdpr_revmgmt_prd_usw2_awsbatch source=*mo-batch*
      error_spl: >-
        index=wdpr_revmgmt_prd_usw2_awsbatch source=*mo-batch* level=ERROR
      latency_spl: ""

    grafana:
      dashboard_uid: ""
      dashboard_url: "Grafana: DLR - Mobile Ordering BATCH"
      datasource: "DLR - Mobile Ordering BATCH"

    cloud:
      provider: "AWS"
      region: "us-west-2"
      account_id: "wdpr-revmgmt-prod"
      infra_type: "Batch"
      cluster_id: ""
      service_name: "wdpr-mo-batch-svc-prod"

      cloudwatch:
        log_group: "/aws/batch/job"
        namespace: ""
        alarm_prefix: ""

      services:
        - type: "dynamodb"
          name: "dlr-revmgmt-nb-B0178865-mo-batch-prd-orders"
        - type: "dynamodb"
          name: "dlr-revmgmt-nb-B0178865-mo-batch-prd-processedorders"
