# --- Identity ---
bapp_id: "BAPP0089046"
app_name: "wdpr-moo-mobile-order-orchestration"
full_name: "WDPR MOO Mobile Order Orchestration"
description: "Core backend orchestration service for mobile ordering across WDW and DLR. Integrates with VenueNext for order submission, payment systems, arrival windows, and fulfillment."

# --- Ownership ---
support_studio: "Studio FNB"
escalation_channel: "Live Support - Mobile Order | Mobile Retail and Restaurant"
escalation_contacts:
  - name: "Kevin Fittro"
    role: "primary"
    contact: "kevin.n.fittro@disney.com"
  - name: "Roberto Patoni Beltran"
    role: "secondary"
    contact: "roberto.patoni@disney.com"
  - name: "Aidelis Calvo"
    role: "SME"
    contact: "aidelis.x.calvo.-nd@disney.com"

# --- ServiceNow ---
servicenow:
  configuration_items:
    - "WDPR MOO Mobile Order Orchestration - AWS DLR Latest"
    - "WDPR MOO Mobile Order Orchestration - AWS DLR Load Test"
    - "WDPR MOO Mobile Order Orchestration - AWS DLR Production"
    - "WDPR MOO Mobile Order Orchestration - AWS DLR Stage"
    - "WDPR MOO Mobile Order Orchestration - AWS WDW Latest"
    - "WDPR MOO Mobile Order Orchestration - AWS WDW Load Test"
    - "WDPR MOO Mobile Order Orchestration - AWS WDW Production"
    - "WDPR MOO Mobile Order Orchestration - AWS WDW Stage"
  assignment_group: "prd-global-fnb"
  business_service: "Mobile Retail & Restaurant"

# --- Documentation ---
documentation:
  runbook: "https://mywiki.disney.com/spaces/FBT/pages/790430431/Mobile+Order+-+Runbook"
  wiki: "https://mywiki.disney.com/spaces/FBT/pages/793976222/Studio+Kronk"
  architecture_diagram: ""

# --- Companion Docs (Markdown) ---
docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

# --- Components ---
components:

  - component_name: "moo-wdw"
    component_type: "api"
    description: "WDW Mobile Order Orchestration service - Java-based ECS service with Redis caching"

    repository:
      url: "https://github.disney.com/wdpro-development/mobile-ordering-orchestration-service"
      branch: "master"
      path: ""

    cicd:
      platform: "harness"
      pipeline_url: "https://disney.harness.io/ng/account/1-wFe3qRQv2mUh1s9244Eg/all/orgs/Commerce/projects/WDPR_MOO_Mobile_Order_Orchestration/pipelines"
      deploy_target: "ECS"

    health_check:
      url: "https://moo.wdprapps.disney.com/mobile-ordering-orchestration-service/api/v1/admin/health-check?show-all=true"
      expected_status: 200

    splunk:
      index: "wdpr_ddpmw"
      source: "us-east-1:sales-ddpmw-prod:moo-svc-prod/moo-service/*"
      base_spl: >-
        index=wdpr_ddpmw source="us-east-1:sales-ddpmw-prod:moo-svc-prod/moo-service/*"
      error_spl: >-
        index=wdpr_ddpmw source="us-east-1:sales-ddpmw-prod:moo-svc-prod/moo-service/*" level=ERROR
      latency_spl: >-
        index=wdpr_ddpmw source="us-east-1:sales-ddpmw-prod:moo-svc-prod/moo-service/*"
        | stats avg(response_time) as avg_rt p95(response_time) as p95_rt by endpoint

    appdynamics:
      app_name: "prod_ddpmw_aws"
      app_id: "241"
      tier: "moo-service"
      dashboard_url: "https://disney-prod.saas.appdynamics.com/controller/"

    grafana:
      dashboard_uid: ""
      dashboard_url: "https://wdpr-splunk-prod.wdprapps.disney.com/en-US/app/search/moo__general_stats"
      datasource: "General Stats - WDW - MOO"

    cloud:
      provider: "AWS"
      region: "us-east-1"
      account_id: "wdpr-apps"
      infra_type: "ECS"
      cluster_id: "ddpmw-prod"
      service_name: "moo-prod-live"

      cloudwatch:
        log_group: ""
        namespace: ""
        alarm_prefix: ""

  - component_name: "moo-dlr"
    component_type: "api"
    description: "DLR Mobile Order Orchestration service"

    repository:
      url: "https://github.disney.com/wdpro-development/mobile-ordering-orchestration-service"
      branch: "master"
      path: ""

    cicd:
      platform: "harness"
      pipeline_url: "https://disney.harness.io/ng/account/1-wFe3qRQv2mUh1s9244Eg/all/orgs/Commerce/projects/WDPR_MOO_Mobile_Order_Orchestration/pipelines"
      deploy_target: "ECS"

    health_check:
      url: "https://moo-dlr.wdprapps.disney.com/mobile-ordering-orchestration-service/api/v1/admin/health-check?show-all=true"
      expected_status: 200

    splunk:
      index: "dlr_moo"
      source: "us-west-2:commerce2-moo-prod-dlr-svc-prod/moo-dlr-service/*"
      base_spl: >-
        index=dlr_moo source="us-west-2:commerce2-moo-prod-dlr-svc-prod/moo-dlr-service/*"
      error_spl: >-
        index=dlr_moo source="us-west-2:commerce2-moo-prod-dlr-svc-prod/moo-dlr-service/*" level=ERROR
      latency_spl: >-
        index=dlr_moo source="us-west-2:commerce2-moo-prod-dlr-svc-prod/moo-dlr-service/*"
        | stats avg(response_time) as avg_rt p95(response_time) as p95_rt by endpoint

    appdynamics:
      app_name: "prod_moo_aws"
      app_id: "294"
      tier: "moo-dlr-service"
      dashboard_url: "https://disney-prod.saas.appdynamics.com/controller/"

    grafana:
      dashboard_uid: ""
      dashboard_url: "https://wdpr-splunk-prod.wdprapps.disney.com/en-US/app/search/dlr__prod__moo_stats"
      datasource: "General Stats - DLR - MOO"

    cloud:
      provider: "AWS"
      region: "us-west-2"
      account_id: "wdpr-apps"
      infra_type: "ECS"
      cluster_id: "moo-prod"
      service_name: "moo-dlr-prod-live"

      cloudwatch:
        log_group: ""
        namespace: ""
        alarm_prefix: ""
