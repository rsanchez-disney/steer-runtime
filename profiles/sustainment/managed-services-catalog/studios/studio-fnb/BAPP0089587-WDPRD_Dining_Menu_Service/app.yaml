# ============================================================================
# ADM Managed Services Catalog — Application Entry
# ============================================================================

# --- Identity ---
bapp_id: "BAPP0089587"
app_name: "wdprd-dining-menu-service"
full_name: "WDPRD Dining Menu Service"
description: "Backend service providing dining menu data (items, prices, meal periods, allergens) for Disney parks restaurants. Serves both WDW and DLR menu data to mobile apps and web."

# --- Ownership ---
support_studio: "Studio FNB"
escalation_channel: "Live Support - Dine Menus | Mobile Retail and Restaurant"
escalation_contacts:
  - name: "Kevin Fittro"
    role: "primary"
    contact: "kevin.n.fittro@disney.com"
  - name: "Roberto Patoni Beltran"
    role: "secondary"
    contact: "roberto.patoni@disney.com"
  - name: "Aidelis Calvo"
    role: "SME"
    contact: "aidelis.x.calvo.-nd@disney.com"

# --- ServiceNow ---
servicenow:
  configuration_items:
    - "DLR Dining Menu Service - AWS Latest"
    - "DLR Dining Menu Service - AWS Load Test"
    - "DLR Dining Menu Service - AWS Production"
    - "DLR Dining Menu Service - AWS Staging"
  assignment_group: "prd-global-fnb"
  business_service: "Mobile Retail & Restaurant"

# --- Documentation ---
documentation:
  runbook: "https://mywiki.disney.com/spaces/FBT/pages/790430369/Dining+Menus+-+Runbook"
  wiki: "https://mywiki.disney.com/spaces/FBT/pages/793976222/Studio+Kronk"
  architecture_diagram: ""

# --- Companion Docs (Markdown) ---
docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

# --- Components ---
components:

  - component_name: "dining-menu-svc-wdw"
    component_type: "api"
    description: "WDW Dining Menu Java service on ECS"

    repository:
      url: "https://github.disney.com/StudioFeast/dlr-commerce2-menu-svc"
      branch: "master"
      path: ""

    cicd:
      platform: "harness"
      pipeline_url: "https://disney.harness.io/ng/account/1-wFe3qRQv2mUh1s9244Eg/all/orgs/Commerce/projects/WDPRD_Dining_Menu_Service/pipelines"
      deploy_target: "ECS"

    health_check:
      url: "https://dining-menu.wdw.wdprapps.disney.com/diningMenuSvc/healthcheck"
      expected_status: 200

    splunk:
      index: "wdpr_diningmenu_service"
      source: "*prod*"
      base_spl: >-
        index=wdpr_diningmenu_service source="*prod*" source="*use1*"
      error_spl: >-
        index=wdpr_diningmenu_service source="*prod*" source="*use1*" level=ERROR
      latency_spl: >-
        index=wdpr_diningmenu_service source="*prod*" source="*use1*"
        | stats avg(response_time) as avg_rt p95(response_time) as p95_rt by endpoint

    appdynamics:
      app_name: "wdw-revmgmt-S0016153-use1-prd_dining-menu_aws"
      app_id: "1910"
      tier: "dining-menu-svc"
      dashboard_url: "https://disney-prod.saas.appdynamics.com/controller/#/location=APP_DASHBOARD&application=1910"

    cloud:
      provider: "AWS"
      region: "us-east-1"
      account_id: "wdpr-revmgmt-prod"
      infra_type: "ECS"
      cluster_id: "wdw-revmgmt-S0016153-use1-prd"
      service_name: "dining-menu-svc-prod-live"

      cloudwatch:
        log_group: "commerce2-menu-prod"
        namespace: ""
        alarm_prefix: ""

  - component_name: "dining-menu-svc-dlr"
    component_type: "api"
    description: "DLR Dining Menu Java service on ECS"

    repository:
      url: "https://github.disney.com/StudioFeast/dlr-commerce2-menu-svc"
      branch: "master"
      path: ""

    cicd:
      platform: "harness"
      pipeline_url: "https://disney.harness.io/ng/account/1-wFe3qRQv2mUh1s9244Eg/all/orgs/Commerce/projects/WDPRD_Dining_Menu_Service/pipelines"
      deploy_target: "ECS"

    health_check:
      url: "https://dining-menu.dlr.wdprapps.disney.com/diningMenuSvc/healthcheck"
      expected_status: 200

    splunk:
      index: "wdpr_diningmenu_service"
      source: "*prod*"
      base_spl: >-
        index=wdpr_diningmenu_service source="*prod*" source="*usw2*"
      error_spl: >-
        index=wdpr_diningmenu_service source="*prod*" source="*usw2*" level=ERROR
      latency_spl: >-
        index=wdpr_diningmenu_service source="*prod*" source="*usw2*"
        | stats avg(response_time) as avg_rt p95(response_time) as p95_rt by endpoint

    appdynamics:
      app_name: "dlr-revmgmt-S0015639-usw2-prd_dining-menu_aws"
      app_id: "1911"
      tier: "dining-menu-svc"
      dashboard_url: "https://disney-prod.saas.appdynamics.com/controller/#/location=APP_DASHBOARD&application=1911"

    cloud:
      provider: "AWS"
      region: "us-west-2"
      account_id: "wdpr-revmgmt-prod"
      infra_type: "ECS"
      cluster_id: "dlr-revmgmt-S0015639-usw2-prd"
      service_name: "dining-menu-svc-prod-live"

      cloudwatch:
        log_group: "commerce2-menu-prod"
        namespace: ""
        alarm_prefix: ""
