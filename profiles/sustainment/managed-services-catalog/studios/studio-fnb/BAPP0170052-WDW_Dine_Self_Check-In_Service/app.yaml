escalation_contacts:
  - name: "Kevin Fittro"
    role: "primary"
    contact: "kevin.n.fittro@disney.com"
  - name: "Roberto Patoni Beltran"
    role: "secondary"
    contact: "roberto.patoni@disney.com"
  - name: "Aidelis Calvo"
    role: "SME"
    contact: "aidelis.x.calvo.-nd@disney.com"

# --- ServiceNow ---
servicenow:
  configuration_items:
    - "WDW Dine Self Check-In Service - AWS Latest"
    - "WDW Dine Self Check-In Service - AWS Load Test"
    - "WDW Dine Self Check-In Service - AWS Production"
    - "WDW Dine Self Check-In Service - AWS Staging"
  assignment_group: "prd-global-fnb"
  business_service: "Mobile Retail & Restaurant"

# --- Documentation ---
