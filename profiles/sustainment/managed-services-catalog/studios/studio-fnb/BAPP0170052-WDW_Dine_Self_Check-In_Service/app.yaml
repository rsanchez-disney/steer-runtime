# --- Companion Docs (Markdown) ---
docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

# --- Components ---
components:

  - component_name: "dinescisvc-wdw"
    component_type: "api"
    description: "WDW Dine Self Check-In Java service on ECS with Redis + DynamoDB"

    repository:
      url: "https://github.disney.com/studio-lumiere/dine-self-checkin-service"
      branch: "master"
      path: ""

    cicd:
      platform: "harness"
      pipeline_url: "https://disney.harness.io/ng/account/1-wFe3qRQv2mUh1s9244Eg/all/orgs/Commerce/projects/Dine_Self_CheckIn_Service/pipelines"
      deploy_target: "ECS"

    health_check:
      url: "https://dine-sci-svc.wdprapps.disney.com/svc/healthcheck"
      expected_status: 200

    splunk:
      index: "wdpr_disco"
      source: "us-east-1:wdpr-revmgmt-S0001422-use1-dinescisvc-svc-prd:dinescisvc-svc-prod/dinescisvc-svc/*"
      base_spl: >-
        index=wdpr_disco source="us-east-1:wdpr-revmgmt-S0001422-use1-dinescisvc-svc-prd:dinescisvc-svc-prod/dinescisvc-svc/*"
      error_spl: >-
        index=wdpr_disco source="us-east-1:wdpr-revmgmt-S0001422-use1-dinescisvc-svc-prd:dinescisvc-svc-prod/dinescisvc-svc/*" level=ERROR
      latency_spl: >-
        index=wdpr_disco source="us-east-1:wdpr-revmgmt-S0001422-use1-dinescisvc-svc-prd:dinescisvc-svc-prod/dinescisvc-svc/*"
        | stats avg(response_time) as avg_rt p95(response_time) as p95_rt by endpoint

    appdynamics:
      app_name: "wdpr-revmgmt-S0001422-use1-prd_dinescisvc_aws"
      app_id: "wdpr-revmgmt-S0001422-use1-prd_dinescisvc"
      tier: "dinescisvc-svc"
      dashboard_url: "https://disney-prod.saas.appdynamics.com/controller/"

    grafana:
      dashboard_uid: ""
      dashboard_url: "https://wdpr-splunk-prod.wdprapps.disney.com/en-US/app/search/disco__wdw__general_stats"
      datasource: "General Stats - WDW - DiSCO"
      splunk_dashboard: "https://wdpr-splunk-prod.wdprapps.disney.com/en-US/app/search/disco__wdw__general_stats"

    cloud:
      provider: "AWS"
      region: "us-east-1"
      account_id: "wdpr-revmgmt-prod"
      infra_type: "ECS"
      cluster_id: "wdpr-revmgmt-S0001422-use1-prd"
      service_name: "dinescisvc-svc-prod-live"

      cloudwatch:
        log_group: ""
        namespace: ""
        alarm_prefix: ""

      services:
        - type: "dynamodb"
          name: "wdw-revmgmt-B0170052-wdprt-disco-prod-reservations"
        - type: "elasticache"
          name: "disco-prod"
