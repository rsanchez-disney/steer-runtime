# ============================================================================
# Commerce Cart
# ============================================================================

bapp_id: "BAPP0012683"
app_name: "cart-service"
full_name: "Commerce Cart"
description: >
  Cart management service — item validation, availability checks. Upstream of Booking Service in EC path.
  Flows: ec-checkout.
  Keywords: commerce cart, cart checkout, express checkout, cart error, item validation, availability check,
  trade ticket, DTA, payment error, one or more errors.

support_studio: "Studio Mars"
escalation_channel: "https://teams.microsoft.com/l/channel/19%3A8tRs3Dywq9mhc6Fat_p2d5Ykw0eKBpBm1Isvxh-rMRA1%40thread.tacv2/DX%20-%20Studio%20Mars?groupId=35a13470-e675-44b7-810e-f062466cffb5&tenantId=56b731a8-a2ac-4c32-bf6b-616810e913c6&ngc=true&allowXTenantAccess=true"
escalation_contacts:
  - name: "Tomas Grana"
    role: "primary"
    contact: "Tomas.Grana.-ND@disney.com"

servicenow:
  configuration_items:
    - "Cart Service"
  assignment_group: "web-global-salescart"

documentation:
  runbook: "https://confluence.disney.com/spaces/WDPROS/pages/484023191/Cart"
  wiki: "https://confluence.disney.com/spaces/WDPROS/pages/484023191/Cart"

docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

components:
  - component_name: "commerce-cart"
    component_type: "api"
    description: "Cart management before checkout"
    health_check:
      url: "https://cart-service.wdprapps.disney.com/cart-service/admin/health-report"
      expected_status: 200
    splunk:
      index: "wdpr_commerce_cart"
      base_spl: "index=wdpr_commerce_cart"
      error_spl: "index=wdpr_commerce_cart (\"*error*\" OR \"*exception*\")"
      latency_spl: "index=wdpr_commerce_cart response-millis | rex \"response-millis=(?<response_millis>\\d+)\" | stats avg(response_millis) as avg_ms, p95(response_millis) as p95_ms"
    appdynamics:
      app_name: "prod_cart_aws"
      app_id: "278"
      tier: "core_cart_machine_agent"
      dashboard_url: "https://disney-prod.saas.appdynamics.com/controller/#/location=APP_DASHBOARD&application=278&dashboardMode=grid"
    grafana:
      dashboard_url: "https://sid.disney.com/grafana/d/6cRDMP8nz/atlas-observability-metrics-ecs?orgId=1&var-Environment=prod&var-Account=wdpr-apps&var-Region=us-west-2&var-clusters=cart-prod&var-service=cart-prod-live"
    cloud:
      provider: "AWS"
      region: "us-west-2"
      infra_type: "ECS"
      cluster_id: "cart-prod"
      service_name: "cart-prod-live"
