# ============================================================================
# WDPR Notification Service (DLR + WDW)
# ============================================================================

# --- Identity ---
bapp_id: "BAPP0094245"
app_name: "notification-service"
full_name: "WDPR Notification Service"
description: "RESTful Java service for sending post-order confirmation emails via UM and SparkPost. Deployed as two independent components: DLR (us-west-2) and WDW (us-east-1)."

# --- Ownership ---
support_studio: "Studio Mars"
escalation_channel: "https://teams.microsoft.com/l/channel/19%3A8tRs3Dywq9mhc6Fat_p2d5Ykw0eKBpBm1Isvxh-rMRA1%40thread.tacv2/DX%20-%20Studio%20Mars?groupId=35a13470-e675-44b7-810e-f062466cffb5&tenantId=56b731a8-a2ac-4c32-bf6b-616810e913c6&ngc=true&allowXTenantAccess=true"
escalation_contacts:
  - name: "Tomas Grana"
    role: "primary"
    contact: "Tomas.Grana.-ND@disney.com"

# --- ServiceNow ---
servicenow:
  configuration_item: "WDPR Notification Service"
  assignment_group: "web-global-salescart"
  business_service: ""

# --- Documentation ---
documentation:
  runbook: "https://confluence.disney.com/spaces/WDPROS/pages/555646814/DLR+Notification+Service+Runbook"
  wiki: "https://confluence.disney.com/spaces/WDPROS/pages/542457788/Notification+Service"
  architecture_diagram: "https://docs.google.com/spreadsheets/d/1NE0e2dayCXMpLBfWJgUyatwlDXfk29wHjdQVSezL6mw/edit#gid=0"

# --- Companion Docs (Markdown) ---
docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

# --- Components ---
components:

  # ─── DLR Component (us-west-2) ───
  - component_name: "notification-dlr"
    component_type: "worker"
    description: "Post-order email delivery for DLR via SparkPost"

    docs:
      troubleshooting: ""
      runbook: ""

    documentation:
      wiki: ""
      architecture_diagram: ""

    repository:
      url: "https://github.disney.com/wdpro-peplite/sales2-01323-notifysvc"
      branch: "develop"
      path: ""

    cicd:
      platform: "jenkins"
      pipeline_url: "https://ecommerce.cicd.wdprapps.disney.com/job/sales2-01323-notifysvc/"
      deploy_target: "ECS wdpr-apps us-west-2"

    health_check:
      url: "https://dlrns.wdprapps.disney.com/notifysvc/info"
      expected_status: 200

    splunk:
      index: "wdpr_tixsale_dlr"
      source: "*notify*"
      base_spl: >-
        index=wdpr_tixsale_dlr source=*notify*
      error_spl: >-
        index=wdpr_tixsale_dlr source=*notify* ("*error*" OR "*exception*")
      latency_spl: >-
        index=wdpr_tixsale_dlr source=*notify* RESP_OUT
        | spath input=Msg path=timeTakenInMillis
        | stats avg(timeTakenInMillis) as avg_ms, p95(timeTakenInMillis) as p95_ms

    appdynamics:
      app_name: "prod_01323_aws"
      app_id: "447"
      tier: "core_01323_dlr-notifysvc"
      dashboard_url: "https://disney-prod.saas.appdynamics.com/controller/#/location=APP_COMPONENT_MANAGER&timeRange=last_1_hour.BEFORE_NOW.-1.-1.60&application=447&component=3194&dashboardMode=force"

    grafana:
      dashboard_uid: "6cRDMP8nz"
      dashboard_url: "https://sid.disney.com/grafana/d/6cRDMP8nz/atlas-observability-metrics-ecs?orgId=1&var-Environment=prod&var-Account=wdpr-apps&var-Region=us-west-2&var-clusters=dlr-commerce2-01323-prod&var-service=notifysvc-prod-live"
      datasource: ""

    cloud:
      provider: "AWS"
      region: "us-west-2"
      account_id: ""
      infra_type: "ECS"
      cluster_id: "dlr-commerce2-01323-prod"
      service_name: "notifysvc-prod-live"

      cloudwatch:
        log_group: ""
        namespace: ""
        alarm_prefix: ""

      loginsights:
        log_group: ""
        saved_query: ""

      services:
        - type: "rds"
          name: "dlr-ns-prod-master.wdatdbs.disney.com:4001/dlrns"
        - type: "elasticache"
          name: "clustercfg.commerce-cfg-mgr-prod.cvhlhl.usw2.cache.amazonaws.com"

    other_environments:

      latest:
        health_check:
          url: "https://latest.dlrns.wdprapps.disney.com/notifysvc/info"
        splunk:
          index: "wdpr_tixsale_dlr"
          base_spl: >-
            index=wdpr_tixsale_dlr source=*notify*
        appdynamics:
