          services:
            - type: "rds"
              name: "dlrns-mariadb-stage.czadbdnytwxi.us-west-2.rds.amazonaws.com:4001/dlrns"
            - type: "elasticache"
              name: "clustercfg.commerce-cfg-mgr-stage.b5f2xn.usw2.cache.amazonaws.com"

