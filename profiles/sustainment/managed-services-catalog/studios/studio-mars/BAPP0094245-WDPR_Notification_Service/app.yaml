# ============================================================================
# WDPR Notification Service (DLR and WDW)
# ============================================================================

bapp_id: "BAPP0094245"
app_name: "notification-service"
full_name: "WDPR Notification Service"
description: >
  Sends confirmation emails after order completion via SparkPost (DLR and WDW).
  Flows: confirmation-email.
  Keywords: confirmation email, email not received, no email, notification, SparkPost, order confirmation,
  purchase email, receipt not received.

support_studio: "Studio Mars"
escalation_channel: "https://teams.microsoft.com/l/channel/19%3A8tRs3Dywq9mhc6Fat_p2d5Ykw0eKBpBm1Isvxh-rMRA1%40thread.tacv2/DX%20-%20Studio%20Mars?groupId=35a13470-e675-44b7-810e-f062466cffb5&tenantId=56b731a8-a2ac-4c32-bf6b-616810e913c6&ngc=true&allowXTenantAccess=true"

servicenow:
  configuration_item: "WDPR Notification Service"
  assignment_group: "web-global-salescart"

documentation:
  runbook: "https://confluence.disney.com/spaces/WDPROS/pages/1937271025/WDPR+Notification+Service+-+CTASK+Management"
  wiki: "https://confluence.disney.com/spaces/WDPROS/pages/542457788/Notification+Service"
  architecture_diagram: "https://docs.google.com/spreadsheets/d/1NE0e2dayCXMpLBfWJgUyatwlDXfk29wHjdQVSezL6mw/edit#gid=0"

docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

components:
  - component_name: "notification-dlr"
    component_type: "worker"
    description: "Post-order email delivery for DLR"
    health_check:
      url: "https://dlrns.wdprapps.disney.com/notifysvc/info"
      expected_status: 200
    splunk:
      index: "wdpr_tixsale_dlr"
      source: "*notify*"
      base_spl: "index=wdpr_tixsale_dlr source=*notify*"
      error_spl: "index=wdpr_tixsale_dlr source=*notify* (\"*error*\" OR \"*exception*\")"
      latency_spl: "index=wdpr_tixsale_dlr source=*notify* RESP_OUT | spath input=Msg path=timeTakenInMillis | stats avg(timeTakenInMillis) as avg_ms, p95(timeTakenInMillis) as p95_ms"
    appdynamics:
      app_name: "prod_01323_aws"
      app_id: "447"
      tier: "core_01323_dlr-notifysvc"
      dashboard_url: "https://disney-prod.saas.appdynamics.com/controller/#/location=APP_COMPONENT_MANAGER&timeRange=last_1_hour.BEFORE_NOW.-1.-1.60&application=447&component=3194&dashboardMode=force"
    grafana:
      dashboard_url: "https://sid.disney.com/grafana/d/6cRDMP8nz/atlas-observability-metrics-ecs?orgId=1&var-Environment=prod&var-Account=wdpr-apps&var-Region=us-west-2&var-clusters=dlr-commerce2-01323-prod&var-service=notifysvc-prod-live"
    cloud:
      provider: "AWS"
      region: "us-west-2"
      infra_type: "ECS"
      cluster_id: "dlr-commerce2-01323-prod"
      service_name: "notifysvc-prod-live"

  - component_name: "notification-wdw"
    component_type: "worker"
    description: "Post-order email delivery for WDW"
    health_check:
      url: "https://wdwns.wdprapps.disney.com/notifysvc/info"
      expected_status: 200
    splunk:
      index: "wdpr_tixsale_wdw"
      source: "*notify*"
      base_spl: "index=wdpr_tixsale_wdw source=*notify*"
      error_spl: "index=wdpr_tixsale_wdw source=*notify* (\"*error*\" OR \"*exception*\")"
      latency_spl: "index=wdpr_tixsale_wdw source=*notify* RESP_OUT | spath input=Msg path=timeTakenInMillis | stats avg(timeTakenInMillis) as avg_ms, p95(timeTakenInMillis) as p95_ms"
    appdynamics:
      app_name: "prod_01323_aws"
      app_id: "447"
      tier: "core_01323_wdw-notifysvc"
      dashboard_url: "https://disney-prod.saas.appdynamics.com/controller/#/location=APP_COMPONENT_MANAGER&timeRange=last_1_hour.BEFORE_NOW.-1.-1.60&application=447&component=307070&dashboardMode=force"
    grafana:
      dashboard_url: "https://sid.disney.com/grafana/d/6cRDMP8nz/atlas-observability-metrics-ecs?orgId=1&var-Environment=prod&var-Account=wdpr-apps&var-Region=us-east-1&var-clusters=wdw-sales2-01323-prod&var-service=notifysvc-prod-live"
    cloud:
      provider: "AWS"
      region: "us-east-1"
      infra_type: "ECS"
      cluster_id: "wdw-sales2-01323-prod"
      service_name: "notifysvc-prod-live"
