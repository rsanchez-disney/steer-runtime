# ============================================================================
# Booking Service — EC Checkout Orchestrator
# ============================================================================

bapp_id: "BAPP0012680"
app_name: "booking-service"
full_name: "Booking Service"
description: >
  EC checkout orchestrator — handles trade tickets, AP new sales/renewals, Photopass, ticket-to-pass upgrades,
  VO/Packages DTA, Room Only DTA, WDW consumer mods, Aulani.
  Flows: ec-checkout, mk-renewal.
  Keywords: trade ticket, booking service, AP new sale, Photopass purchase, VO package DTA, Room Only DTA, Aulani,
  cart checkout, express checkout, lodging DTA, resort package DTA, Duck Out, payment error, payment declined,
  credit card auth, AVS mismatch, card declined, MK renewal, Magic Key renewal, renew pass, annual pass renewal.

support_studio: "Studio Mars"
escalation_channel: "https://teams.microsoft.com/l/channel/19%3A8tRs3Dywq9mhc6Fat_p2d5Ykw0eKBpBm1Isvxh-rMRA1%40thread.tacv2/DX%20-%20Studio%20Mars?groupId=35a13470-e675-44b7-810e-f062466cffb5&tenantId=56b731a8-a2ac-4c32-bf6b-616810e913c6&ngc=true&allowXTenantAccess=true"
escalation_contacts:
  - name: "Tomas Grana"
    role: "primary"
    contact: "Tomas.Grana.-ND@disney.com"

servicenow:
  configuration_items:
    - "Booking Service"
    - "Booking Service - AWS Latest"
    - "Booking Service - AWS Load"
    - "Booking Service - AWS Production"
    - "Booking Service - AWS Stage"
    - "Booking Service - QA"
    - "Booking Service - Retired"
  assignment_group: "web-global-salescart"

documentation:
  runbook: "https://confluence.disney.com/spaces/WDPROS/pages/633354892/Operational+Readiness+Review+-+Booking+ECS"
  wiki: "https://confluence.disney.com/spaces/WDPROS/pages/484023178/Booking"
  architecture_diagram: "https://docs.google.com/drawings/d/1yRgS82trU0wDoCUBuVz8P3BTzz1vjVyUKfBO02FRwOg/edit"

docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

components:
  - component_name: "booking-service"
    component_type: "api"
    description: "Checkout orchestrator for EC path: Cart → Booking Service → Payment Service"
    health_check:
      url: "https://bookingsvc-nap7.wdpro.starwave.com/booking-service/admin/health-report"
      expected_status: 200
    splunk:
      index: "wdpr_booking_service"
      base_spl: "index=wdpr_booking_service"
      error_spl: "index=wdpr_booking_service (\"*error*\" OR \"*exception*\")"
      latency_spl: "index=wdpr_booking_service response-millis | rex \"response-millis=(?<response_millis>\\d+)\" | stats avg(response_millis) as avg_ms, p95(response_millis) as p95_ms"
    appdynamics:
      app_name: "prod_pci_S0001663_WDPR-Ticketing-Booking_aws"
      app_id: "945"
      tier: "wdpr_bap0012680_booking-service"
      dashboard_url: "https://disney-prod.saas.appdynamics.com/controller/#/location=APP_DASHBOARD&timeRange=last_1_hour.BEFORE_NOW.-1.-1.60&application=945&dashboardMode=force"
    grafana:
      dashboard_url: "https://sid.disney.com/grafana/d/6cRDMP8nz/atlas-observability-metrics-ecs?orgId=1&var-Environment=prod&var-Account=pci-apps-prod&var-Region=us-west-2&var-clusters=wdpr-pci-S0001663-usw2-prd&var-service=booking-svc-prod-live"
    cloud:
      provider: "AWS"
      region: "us-west-2"
      account_id: "517471039377"
      infra_type: "ECS"
      cluster_id: "wdpr-pci-S0001663-usw2-prd"
      service_name: "booking-svc-prod-live"
      cloudwatch:
        log_group: "wdpr-pci-S0001663-usw2-booking-svc-prd"
