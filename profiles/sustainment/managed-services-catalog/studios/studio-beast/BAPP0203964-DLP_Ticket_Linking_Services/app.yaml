app_name: "dlp-ticket-linking-services"
full_name: "DLP Ticket Linking Services"
description: "REST API that retrieves data about tickets and allows linking/unlinking of tickets to guest accounts. Interacts with TMS. Includes Park Entry BookingID Provider (on-prem) which retrieves order IDs from Galaxy database."

