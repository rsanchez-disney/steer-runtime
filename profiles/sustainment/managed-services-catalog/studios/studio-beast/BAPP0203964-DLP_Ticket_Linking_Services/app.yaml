# --- Technologies ---
technologies:
  - name: "Java"
    version: "21"
  - name: "Spring Boot"
    version: "3.4+"
  - name: "RabbitMQ"
  - name: "OneID"

# --- Components ---
components:

  - component_name: "tms-tickets-linking-provider"
    component_type: "api"
    description: "REST API for ticket data retrieval and linking/unlinking tickets to guest accounts. Interacts with TMS."

    repository:
      url: "https://github.disney.com/WDPR-DLP-IS/wdpr-dlp-is-guest-tms-tickets-linking-provider"
      branch: "develop"
      path: "/"

    cicd:
      platform: "harness"
      deploy_target: "ECS"

    cloud:
      provider: "AWS"
      region: "eu-west-1"
      infra_type: "ECS"
      cluster_id: "dlp-apps-S0001481-euw1"
      service_name: "tms-tickets-linking-provider-prod-live"

    splunk:
      index: "wdpr_dlp_digital"
      base_spl: >-
        index=wdpr_dlp_digital "Identifiers.App-Name"=wdpr-dlp-is-guest-tms-tickets-linking-provider
      dashboards:
        - "Ticket Linking Provider (Technical Dashboard)"

    other_environments:
      stage:
        cloud:
          cluster_id: "dlp-apps-S0001481-euw1-stg"
          service_name: "tms-tickets-linking-provider-stage-live"
      load:
        cloud:
          cluster_id: "dlp-apps-S0001481-euw1-lod"
          service_name: "tms-tickets-linking-provider-load-live"
      latest:
        cloud:
          cluster_id: "dlp-apps-S0001481-euw1-lst"
          service_name: "tms-tickets-linking-provider-latest-live"

  - component_name: "park-entry-ticket-bookingid-provider"
    component_type: "api"
    description: "Retrieves order IDs from the Galaxy database for specified package IDs by invoking stored procedure DLRP_ListeResa. Deployed ON-PREM (not AWS)."

    repository:
      url: "https://github.disney.com/WDPR-DLP-IS/wdpr-dlp-is-guest-gxc-park-entry-ticket-bookingid-provider"
      branch: "develop"
      path: "/"

    cloud:
      provider: "on-prem"
      infra_type: "On-premises (DLP Genie Datacenter)"
      note: "Server address: vl-frmv-rhe***"

    swagger: "https://dlp-microservice-stage.emea.wdpr.disney.com:8443/WDPR-DLP-IS/wdpr-dlp-is-guest-gxc-park-entry-ticket-bookingid-provider/swagger-ui/index.html"

    splunk:
      index: "wdpr_dlp_digital"
      base_spl: >-
        index=wdpr_dlp_digital "Identifiers.App-Name"=wdpr-dlp-is-guest-tms-tickets-linking-provider
      dashboards:
        - "wdpr-dlp-is-guest-gxc-park-entry-ticket-bookingid-provider (PROD)"
        - "Park-Entry BookingID Provider Dashboard (Lowers)"

  - component_name: "eGalaxy Database"
    component_type: "database"
    description: "Galaxy database used by Park Entry BookingID Provider via stored procedure DLRP_ListeResa."
    external: true

# --- Guest Impact ---
guest_impact:
  ticket_linking: "Guests may not be able to access ticket information or link/unlink tickets to their accounts."
  park_entry_bookingid: "Guests unable to verify packages, difficulty retrieving package information. Relies on single endpoint to Galaxy database."

# --- Notes ---
notes:
  - "Park Entry BookingID Provider is deployed ON-PREM, not on AWS"
  - "Known issue: wdpr-dlp-is-booking-ooc-reservation-publisher issues if reservation not visible in Galaxy yet (Source: SMARTMEDIA)"
