# --- Technologies ---
technologies:
  - name: "Java"
    version: "21"
  - name: "Spring Boot"
    version: "3.4+"
# --- Components ---
components:

  - component_name: "pea-attraction-provider-v2"
    component_type: "api"
    description: "PEA Attraction Provider V2 — main DPA One service. Handles attraction availability, pass purchase, and QR code generation."
    repository:
      url: "https://github.disney.com/WDPR-DLP-IS/wdpr-dlp-is-operations-pea-attraction-provider"
      branch: "develop"
      path: "/"
    cloud:
      provider: "AWS"
      region: "eu-west-1"
      infra_type: "ECS"
      cluster_id: "dlp-apps-S0001481-euw1"
      service_name: "pea-attraction-provider-v2"

  - component_name: "psp-payment-methods-provider"
    component_type: "api"
    description: "PSP Payment Methods Provider — handles payment processing via Worldpay for DPA purchases."
    repository:
      url: "https://github.disney.com/WDPR-DLP-IS/wdpr-dlp-is-guest-psp-payment-methods-provider"
      branch: "develop"
      path: "/"
    cloud:
      provider: "AWS"
      region: "eu-west-1"
      infra_type: "ECS"
      cluster_id: "dlp-apps-S0001481-euw1"
      service_name: "psp-payment-methods-provider"

  - component_name: "guest-itinerary-provider"
    component_type: "api"
    description: "Guest Itinerary Provider — manages guest itinerary/plans including DPA passes."
    repository:
      url: "https://github.disney.com/WDPR-DLP-IS/wdpr-dlp-is-guest-itinerary-provider"
      branch: "develop"
      path: "/"
    cloud:
      provider: "AWS"
      region: "eu-west-1"
      infra_type: "ECS"
      cluster_id: "dlp-apps-S0001481-euw1"
      service_name: "guest-itinerary-provider"

  - component_name: "push-notification-publisher"
    component_type: "worker"
    description: "Push Notification Publisher — sends push notifications for DPA pass status, expiring timeslots, autorecovery."
    repository:
      url: "https://github.disney.com/WDPR-DLP-IS/wdpr-dlp-is-guest-push-notification-publisher"
      branch: "develop"
      path: "/"
    cloud:
      provider: "AWS"
      region: "eu-west-1"
      infra_type: "ECS"
      cluster_id: "dlp-apps-S0001481-euw1"
      service_name: "push-notification-publisher"

  - component_name: "Redis (ElastiCache)"
    component_type: "cache"
    description: "ElastiCache Redis for PEA pass data caching."
    cloud:
      provider: "AWS"
      region: "eu-west-1"
      infra_type: "ElastiCache"
      service_name: "peapass-prod"
      console_url: "https://eu-west-1.console.aws.amazon.com/elasticache/home?region=eu-west-1#/redis/peapass-prod"

  - component_name: "Core API Order Service"
    component_type: "api"
    description: "External — handles order creation for DPA purchases."
    external: true
    escalation_group: "app-frdlp-coreapi"

  - component_name: "Core API Payment Reference Service"
    component_type: "api"
    description: "External — handles payment references for DPA purchases."
    external: true
    escalation_group: "app-frdlp-coreapi"

  - component_name: "Worldpay"
    component_type: "gateway"
    description: "External payment gateway for DPA purchases."
    external: true

# --- Guest Impact ---
guest_impact:
  pea_attraction_provider: "Guests unable to buy Disney Premier Access — long wait times, cannot plan day effectively, no real-time availability."
  psp_payment: "Guests cannot complete DPA payment."
  itinerary: "Guests cannot view their DPA passes in itinerary/plans."
  push_notification: "Guests won't receive timeslot expiry or autorecovery notifications."

# --- Notes ---
notes:
  - "No known issues for the application"
  - "17 attractions available in production (FY 2025)"
  - "Booking must be done in-park (not available off-site like DPA Ultimate)"
  - "Guest must have valid Park Ticket, Annual Pass, or Hotel+Tickets package"
  - "Ticket must be marked 'In Park'"
  - "DPA One cannot be cancelled once purchased"
  - "Max 3 DPA One per attraction per guest per day, max 12 per same attraction/timeslot"
  - "Guests without smartphone can purchase at City Hall or Studios Services"
