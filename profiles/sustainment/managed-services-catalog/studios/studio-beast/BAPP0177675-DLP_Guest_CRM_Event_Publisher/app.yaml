# --- Technologies ---
technologies:
  - name: "Java"
    version: "21"
  - name: "RabbitMQ"
    version: ""

# --- Components ---
components:

  - component_name: "crm-event-v2-publisher"
    component_type: "worker"
    description: "AMQP Listener that continuously receives messages from the CRM Event Queue, transforms each into a CRM Event, and pushes resulting events to a special AMQP CRM Queue for Salesforce delivery."

    repository:
      url: "https://github.disney.com/WDPR-DLP-IS/wdpr-dlp-is-guest-crm-event-v2-publisher"
      branch: "develop"
      path: "/"

    cicd:
      platform: "harness"
      pipeline_url: "https://disney.harness.io/ng/account/1-wFe3qRQv2mUh1s9244Eg/module/ci/orgs/Disneyland_Paris/projects/DLP_Guest_CRM_Event_Publisher/pipelines"
      deploy_target: "ECS"

    health_check:
      url: ""
      expected_status: 200

    splunk:
      index: "wdpr_dlp_digital"
      base_spl: >-
        index=wdpr_dlp_digital "Identifiers.App-Name"=wdpr-dlp-is-guest-crm-event-v2-publisher
      dashboards:
        - "DLP - Guest Profile CRM Event Publisher"

    appdynamics:
      app_name: "crmweb3_guest-crm-event-v2-publisher"
      dashboards:
        - "PROD_DLP_PAAP_GUEST-PROFILE"
        - "crmweb3_guest-crm-event-v2-publisher (Application Dashboard)"

    grafana:
      dashboards:
        - "DLP Digital - PROD - Mobile Back-End Services - Nodes/Memory/CPU"
        - "AWS Digital Cluster Metrics"

    cloud:
      provider: "AWS"
      region: "eu-west-1"
      infra_type: "ECS"
      cluster_id: "dlp-apps-S0001481-euw1"
      service_name: "crm-event-v2-publisher-prod-live"

    sonarqube: "https://sonar.cicd.wdprapps.disney.com/dashboard?id=com.disney.dlpis%3Awdpr-dlp-is-guest-crm-event-v2-publisher"
    snyk: "https://app.snyk.io/org/wdpr-dlp/project/27af75ba-2eaf-4cd9-9145-e983cc7327a1"

    other_environments:
      stage:
        cloud:
          cluster_id: "dlp-apps-S0001481-euw1-stg"
          service_name: "crm-event-v2-publisher-stage-live"
        appdynamics:
          dashboards:
            - "STAGE_DLP_PAPP_wdpr-dlp-is-guest-crm-event-v2-publisher"
            - "crmweb3_guest-crm-event-v2-publisher (Application Dashboard)"
      load:
        cloud:
          cluster_id: "dlp-apps-S0001481-euw1-lod"
          service_name: "crm-event-v2-publisher-load-live"
      latest:
        cloud:
          cluster_id: "dlp-apps-S0001481-euw1-lst"
          service_name: "crm-event-v2-publisher-latest-live"

  - component_name: "RabbitMQ"
    component_type: "queue"
    description: "Message broker (EC2 ASG) used for AMQP event processing. CRM Publisher listens to CRM Event Queue and pushes to CRM Queue."
    rabbitmq_user: "f-wdpr-monitor-rw-gp-rmq"

    cloud:
      provider: "AWS"
      region: "eu-west-1"
      infra_type: "EC2"

    rabbitmq_urls:
      prod: "https://dlp-is-rmq.wdprapps.disney.com/"
      stage: "https://stage.dlp-is-rmq.wdprapps.disney.com/"
      load: "https://load.dlp-is-rmq.wdprapps.disney.com/"
      latest: "https://latest.dlp-is-rmq.wdprapps.disney.com/"

    instances:
      prod: "dlp-is-rmq-prod-asg"
      stage: "dlp-is-rmq-stage-asg"
      load: "dlp-is-rmq-load-asg"
      latest: "dlp-is-rmq-latest-asg"

# --- Guest Impact ---
guest_impact:
  description: "No guest impact. Since it's a CRM integration, the application is not guest-facing, hence it won't cause any P2s."

# --- Notes ---
notes:
  - "Not guest-facing — no P2 impact"
  - "Event sources: Keyring, Guest Extended Profile Provider, Travelbox (bookings), Google Cloud (accounts)"
  - "Salesforce is the downstream consumer"
