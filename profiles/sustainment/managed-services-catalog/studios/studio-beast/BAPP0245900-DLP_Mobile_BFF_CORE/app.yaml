      app_id: ""
      tier: ""
      dashboard_url: ""

    grafana:
      dashboard_uid: ""
      dashboard_url: ""
      datasource: ""
      environments:
        prod: "prod_dlp_mobile-bff-core-service"
        load: "load_dlp_mobile-bff-core-service"

    cloud:
      provider: "AWS"
      region: "eu-west-1"
      account_id: ""
      infra_type: "ECS"
      cluster_id: "dlp-apps-B0245900-euw1-prd"
      service_name: ""

      cloudwatch:
        log_group: "dlp-apps-B0245900-euw1-bff-core-bff-core-mobile-prd"
        namespace: ""
        alarm_prefix: ""
        additional_log_groups:
          - "dlp-apps-B0245900-euw1-prd-applogs"
          - "dlp-apps-B0245900-euw1-prd-syslogs"
          - "API-Gateway-Execution-Logs_z0luy5a6wc/default"

      loginsights:
        log_group: "dlp-apps-B0245900-euw1-bff-core-bff-core-mobile-prd"
        saved_query: >-
          fields @timestamp, @message, @logStream, @log
          | filter @message like "non-nullable"
          | sort @timestamp desc
          | limit 1000

      services:
        - type: "redis"
          name: "BFF Redis cache"
        - type: "api-gateway"
          name: "z0luy5a6wc"

    # --- Configuration Management ---
    config:
      vault_non_secret: "/non_secret/apps/is/eu-west-1/latest/mobile/bff-core-service/1.0.0"
      vault_secret: "secret/apps/is/eu-west-1/latest/mobile"

