# --- Identity ---
bapp_id: "BAPP0201208"
app_name: "dlp-ticket-management-service"
full_name: "DLP Ticket Management Service"
description: "Ticket management system service that acts as a Galaxy proxy. Manages entitlements portfolio, Galaxy caching, daily ticket pre-loading, and ticket linking/unlinking. Made up of 3 technical components: TMS Service Provider, Entitlement Product Service (EPS), and Ticket Preloader Batch."

