    role: "APM"
    contact: ""
  - name: "Nicolas Miel"
    role: "TL Back"
    contact: ""
  - name: "Alexandre Bessa"
    role: "TL Front"
    contact: ""
  - name: "Yoann Leon"
    role: "PO"
    contact: ""
  - name: "Yuliia Soury"
    role: "PO"
    contact: ""
