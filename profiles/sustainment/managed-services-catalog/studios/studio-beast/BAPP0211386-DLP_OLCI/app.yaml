# DLP OLCI — Online Check-In for Disneyland Paris Hotels
# ============================================================================

# --- Identity ---
bapp_id: "BAPP0211386"
app_name: "dlp-olci"
full_name: "DLP OLCI"
description: "Online Check-In service for Disneyland Paris hotels. Allows guests to check in early via the mobile app by filling out registration forms, avoiding long lines at hotel reception. Handles police registration forms for non-French guests via DocuSign, reservation preferences via Opera PMS, and push notifications."

# --- Ownership ---
support_studio: "Beast"
escalation_channel: "DLP ITOC"
escalation_contacts:
