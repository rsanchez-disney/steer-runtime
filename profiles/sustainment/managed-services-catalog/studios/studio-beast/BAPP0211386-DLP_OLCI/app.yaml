  configuration_items:
    - "DLP OLCI"
    - "DLP OLCI - AWS Latest"
    - "DLP OLCI - AWS Load Test"
    - "DLP OLCI - AWS Production"
    - "DLP OLCI - AWS Staging"
    - "DLP OLCI - Production"
  assignment_group: "app-frdlp-digital-ext-support"
  business_service: "DLP OLCI"

# --- Documentation ---
