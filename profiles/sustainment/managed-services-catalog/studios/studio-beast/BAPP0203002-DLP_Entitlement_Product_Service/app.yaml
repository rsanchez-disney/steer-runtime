# --- Technologies ---
technologies:
  - name: "Node.js"
  - name: "AWS Lambda"

# --- Components ---
components:

  - component_name: "cme-eps-product-finder"
    component_type: "api"
    description: "Node.js Lambda exposing a single product finder endpoint. Retrieves PLU/Product information using SKU parameter. Triggered by API Gateway."

    repository:
      url: "https://gitlab.disney.com/cgs-wdw/capacity-managed-events/cme-eps"
      branch: "develop"
      path: "/"

    endpoints:
      prod: "https://cme-eps-dlp.wdprapps.disney.com/api/product-finder"
      stage: "https://stage.cme-eps-dlp.wdprapps.disney.com/api/product-finder"
      load: "https://load.cme-eps-dlp.wdprapps.disney.com/api/product-finder"
      latest: "https://latest.cme-eps-dlp.wdprapps.disney.com/api/product-finder"

    cloud:
      provider: "AWS"
      region: "eu-west-1"
      infra_type: "Lambda"

    lambda_functions:
      prod:
        name: "epsdlp-euw1-prd-cme-eps-product-finder"
        account_id: "725065748993"
        role: "dlp-apps-prod"
        trigger: "API Gateway"
      stage:
        name: "epsdlp-euw1-stg-cme-eps-product-finder"
        account_id: "564479547993"
        role: "dlp-apps-test"
        trigger: "API Gateway"
      load:
        name: "epsdlp-euw1-lod-cme-eps-product-finder"
        account_id: "564479547993"
        role: "dlp-apps-test"
        trigger: "API Gateway"
      latest:
        name: "epsdlp-euw1-lst-cme-eps-product-finder"
        account_id: "301080195839"
        role: "dlp-apps-dev"
        trigger: "API Gateway"

    splunk:
      index: "wdpr_dlp_cme"
      queries:
        prod: 'index=wdpr_dlp_cme source="eu-west-1:/aws/lambda/epsdlp-euw1-prd-cme-eps-product-finder:*"'
        stage: 'index=wdpr_dlp_cme source="eu-west-1:/aws/lambda/epsdlp-euw1-stg-cme-eps-product-finder:*"'
        load: 'index=wdpr_dlp_cme source="eu-west-1:/aws/lambda/epsdlp-euw1-lod-cme-eps-product-finder:*"'
        latest: 'index=wdpr_dlp_cme source="eu-west-1:/aws/lambda/epsdlp-euw1-lst-cme-eps-product-finder:*"'

    postman: "See GET PLU DETAILS endpoint"

# --- Guest Impact ---
guest_impact:
  description: "If EPS fails, guests may lose access to essential product information, disrupting the identification and association of products with tickets, as well as degrading the overall user experience."

# --- Related BAPPs ---
related_bapps:
  - bapp_id: "BAPP0201208"
    name: "DLP Ticket Management Service"
    relationship: "Consumer — TMS uses EPS for product information"
