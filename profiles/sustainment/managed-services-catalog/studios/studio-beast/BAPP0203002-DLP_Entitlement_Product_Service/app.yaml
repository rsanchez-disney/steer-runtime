bapp_id: "BAPP0203002"
app_name: "dlp-entitlement-product-service"
full_name: "DLP Entitlement Product Service"
description: "Entitlement Product Service (EPS) exposes product information to TMS. It is a Node.js Lambda that exposes a single endpoint (product finder) to retrieve PLU/Product information using SKU as parameter. Returns product category, product name, guest access type, etc."

