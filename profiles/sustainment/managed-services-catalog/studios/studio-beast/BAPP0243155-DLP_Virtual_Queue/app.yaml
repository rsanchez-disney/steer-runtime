# --- Identity ---
bapp_id: "BAPP0243155"
app_name: "dlp-virtual-queue"
full_name: "DLP Mission Control Virtual Queue"
description: "Virtual Queue (VQ) allows guests to join the queue to participate in the Hero Training Center (HTC) activity in the Meet and Greet funnel. Guests select a character (queue), pick a time slot (wave), and VQ creates a booking linked to their park entry ticket."

