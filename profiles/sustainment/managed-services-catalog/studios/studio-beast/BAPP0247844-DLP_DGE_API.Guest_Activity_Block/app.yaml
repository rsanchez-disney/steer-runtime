  - component_name: "guest-activity-block-client-library"
    component_type: "sdk"
    description: "Java Spring-Boot library that integrates with guest-activity-block-provider. Uses OncePerRequestFilter to check lock status and publish activity events to RabbitMQ. Blocks endpoints after 10 consecutive failures."

    repository:
      url: "https://github.disney.com/WDPR-DLP-IS/wdpr-dlp-is-guest-activity-block-client-library"
      branch: "main"
      path: ""

