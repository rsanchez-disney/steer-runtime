        repo: "https://github.disney.com/WDPR-DLP-IS/wdpr-dlp-is-guest-tms-tickets-linking-provider"
      - name: "Package Digital Provider"
        repo: "https://github.disney.com/WDPR-DLP-IS/wdpr-dlp-is-guest-package-digital-provider"
      - name: "ARS Team"
        repo: ""

# --- RabbitMQ Configuration ---
rabbitmq:
  exchange: "GPE.GUESTEVENT.DIS.GAB"
  routing_keys:
    - key: "TICKET.LINKING.GUEST.ACTIVITY.BLOCK"
      description: "Ticket linking activity events"
    - key: "PACKAGE.PROVIDER.GUEST.ACTIVITY.BLOCK"
      description: "Package provider activity events"

# --- External Dependencies ---
external_dependencies:
  - name: "OneID"
    description: "Guest identity provider"
  - name: "RabbitMQ"
    description: "Message broker for activity events between client library and provider"
    support: "ops-frdlp-CloudOps / DLP.DL-IS.CLOUD.OPS@disney.com"
  - name: "AWS DocumentDB"
    description: "MongoDB-compatible database storing guest activity and block records"
    support: "ops-global-Flex SRE"
