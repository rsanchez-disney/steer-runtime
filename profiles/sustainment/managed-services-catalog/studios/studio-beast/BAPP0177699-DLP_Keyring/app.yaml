# ============================================================================
# ADM Managed Services Catalog — Application Entry
# ============================================================================
# DLP Keyring — Guest profile, portfolio, and ticket management platform
# ============================================================================

# --- Identity ---
bapp_id: "BAPP0177699"
app_name: "dlp-keyring"
full_name: "DLP Keyring"
description: "Guest digital identity platform for Disneyland Paris. Manages guest profiles, ticket portfolios (packages, web tickets, DPAU/DPAO), ticket-guest associations, and portfolio reconciliation. Integrates with OneID (GCP Pub/Sub), BMacs booking system, and DLP ticket management services."

# --- Ownership ---
support_studio: "Beast"
escalation_channel: "DLP ITOC"
escalation_contacts:
  - name: "Benoit Dupard"
    role: "APM"
    contact: ""
  - name: "Rigobert Ngaha"
    role: "TL Back"
    contact: ""
  - name: "Guislain Duthieuw"
    role: "TL Front"
    contact: ""
  - name: "Alejandra Arevalo"
    role: "PO"
    contact: ""
  - name: "Yuliia Soury"
    role: "PO"
    contact: ""
# --- ServiceNow ---
servicenow:
  configuration_items:
    - "DLP Keyring"
    - "DLP Keyring - AWS Latest"
    - "DLP Keyring - AWS Load Test"
    - "DLP Keyring - Production"
    - "DLP Keyring - Staging"
  assignment_group: "app-frdlp-digital-ext-support"
  business_service: ""

# --- Documentation ---
