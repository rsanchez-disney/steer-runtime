# --- Components ---
components:

  - component_name: "DLP Mobile App (Android)"
    component_type: "mobile"
    description: "Android version of the DLP Guest Mobile App built with React Native"

    repository:
      url: "https://gitlab.disney.com/DLP/digital/DLP_GUEST_MOBILE_APP"
      branch: "develop"
      path: "/"

    # -- AppDynamics --
    appdynamics:
      app_name: "Mobile App Android"
      alert_code: "AD-AAB-ABJ-AFD"
      dashboards:
        - name: "PROD Android"
          url: ""
        - name: "LOAD Android"
          url: ""

  - component_name: "DLP Mobile App (iOS)"
    component_type: "mobile"
    description: "iOS version of the DLP Guest Mobile App built with React Native"

    repository:
      url: "https://gitlab.disney.com/DLP/digital/DLP_GUEST_MOBILE_APP"
      branch: "develop"
      path: "/"

    # -- AppDynamics --
    appdynamics:
      app_name: "Mobile App IOS"
      alert_code: "AD-AAB-ABJ-AFE"
      dashboards:
        - name: "PROD iOS"
          url: ""
        - name: "LOAD iOS"
          url: ""

  - component_name: "Mobile BFF Core Service"
    component_type: "api"
    description: "Backend-for-Frontend core service for the DLP Mobile App"

    repository:
      url: "https://github.disney.com/WDPR-DLP-IS/wdpr-dlp-is-mobile-bff-core-service"
      branch: "develop"
      path: "/"

    health_check:
      url: ""
      expected_status: 200

    splunk:
      index: "wdpr_dlp_digital"
      base_spl: >-
        index=wdpr_dlp_digital "Identifiers.App-Name"=DLP_GUEST_MOBILE_APP

    other_environments:
