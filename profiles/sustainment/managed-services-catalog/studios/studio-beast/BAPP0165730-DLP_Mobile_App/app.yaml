app_name: "dlp-mobile-app"
full_name: "DLP Mobile App"
description: "DLP Mobile App is a React Native application for Android and iOS platforms designed for Guest Theme Park experience at Disneyland Paris. It allows users to make hotel reservations, purchase packages, book shows and meal plans, access personal account information, review digital passes, complete park check-in, and use Bluetooth for digital key room access."

