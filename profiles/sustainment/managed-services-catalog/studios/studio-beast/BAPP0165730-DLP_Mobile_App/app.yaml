        health_check:
          url: ""
      load:
        health_check:
          url: ""
      latest:
        health_check:
          url: ""

# --- Guest Impact ---
guest_impact:
  description: "If the DLP Mobile App fails, users may experience the following issues"
  impacts:
    - "Loss of time and frustration due to not being able to make reservations or purchases efficiently"
    - "Difficulty accessing personal information and digital passes, limiting their experience in the park"
    - "Problems checking in at the park, causing delays and confusion"
    - "Inability to use electronic locks on reserved rooms, affecting access to the stay"
    - "Unsatisfactory overall experience and dissatisfaction due to not being able to take full advantage of the app and its features"

