# --- Identity ---
bapp_id: "BAPP0220648"
app_name: "dlp-dge-apimeetandgreet"
full_name: "DLP DGE API.MeetAndGreet"
description: "Allows guests to book Meet and Greet experiences with characters inside resort hotels. The mobile app connects to the Meet & Greet microservice to get a JWT for Lineberty API, then connects directly to Lineberty to handle bookings (timeslot availability, register bookings, get registered bookings)."

