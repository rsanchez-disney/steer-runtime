app_name: "dlp-disney-premier-access-ultimate"
full_name: "DLP Disney Premier Access Ultimate"
description: "DPA Ultimate allows guests to skip standard ticket lines and take the fast lane to all eligible attractions without allocated time slots. Includes Secure Your Seat (SYS) for booking seats at popular shows. Can be purchased in advance or on the day via app/website, as part of Hotel+Tickets package, or from partners."

