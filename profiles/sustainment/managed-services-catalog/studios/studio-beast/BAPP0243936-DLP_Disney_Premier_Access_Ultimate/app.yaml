# --- Technologies ---
technologies:
  - name: "Java"
    version: "21"
  - name: "Spring Boot"

# --- Components ---
components:

  - component_name: "dpa-all-access-show-provider"
    component_type: "api"
    description: "Main DPA Ultimate/SYS service. Handles pass creation, show seat booking, and attraction fast-lane access."
    repository:
      url: "https://github.disney.com/WDPR-DLP-IS/wdpr-dlp-is-operations-dpa-all-access-show-provider"
      branch: "develop"
      path: "/"
    cicd:
      platform: "harness"
      deploy_target: "ECS"
    cloud:
      provider: "AWS"
      region: "eu-west-1"
      infra_type: "ECS"
      cluster_id: "dlp-apps-S0001481-euw1"
      service_name: "dpa-all-access-show-provider-prod-live"
    splunk:
      index: "wdpr_dlp_digital"
      base_spl: >-
        index=wdpr_dlp_digital "Identifiers.App-Name"=wdpr-dlp-is-operations-dpa-all-access-show-provider
      dashboards:
        - "wdpr-dlp-is-operations-dpa-all-access-show-provider"
        - "wdpr-dlp-is-operations-dpa-all-access-show-provider_ERRORS"
        - "DLP MOBILE DPA ULTIMATE (FUNC)"
        - "DLP DPA Ultimate (refresh)"
        - "ALL-ACCESS - Functional Fulfilment Issues"
        - "SYS Functional Dashboard"
        - "SYS Fulfillment Issues"
        - "SYS Technical Dashboard"
        - "SYS Errors"
        - "SYS Global Dashboard"
    appdynamics:
      dashboards:
        - "PROD_DLP_PAAP_wdpr-dlp-is-operations-dpa-all-access-show-provider"
    postman: "DGE Workspace: wdpr-dlp-is-operations-dpa-all-access-show-provider"
    other_environments:
      stage:
        cloud:
          cluster_id: "dlp-apps-S0001481-euw1-stg"
          service_name: "dpa-all-access-show-provider-stage-live"
      load:
        cloud:
          cluster_id: "dlp-apps-S0001481-euw1-lod"
          service_name: "dpa-all-access-show-provider-load-live"
      latest:
        cloud:
          cluster_id: "dlp-apps-S0001481-euw1-lst"
          service_name: "dpa-all-access-show-provider-latest-live"

  - component_name: "guest-itinerary-provider"
    component_type: "api"
    description: "Guest Itinerary Provider — manages DPA Ultimate/SYS passes in guest itinerary."
    cloud:
      provider: "AWS"
      region: "eu-west-1"
      infra_type: "ECS"
      cluster_id: "dlp-apps-S0001481-euw1"
      service_name: "guest-itinerary-provider-prod-live"
    other_environments:
      stage:
        cloud:
          service_name: "guest-itinerary-provider-stage-live"
      load:
        cloud:
          service_name: "guest-itinerary-provider-load-live"
      latest:
        cloud:
          service_name: "guest-itinerary-provider-latest-live"

  - component_name: "Redis (ElastiCache)"
    component_type: "cache"
    description: "ElastiCache Redis for DPA All Access Show Provider."
    cloud:
      provider: "AWS"
      region: "eu-west-1"
      infra_type: "ElastiCache"
      service_name: "dpaallaccessshow-prod"
      console_url: "https://eu-west-1.console.aws.amazon.com/elasticache/home?region=eu-west-1#/redis/dpaallaccessshow-prod"

# --- Guest Impact ---
guest_impact:
  dpa_all_access_show_provider: "Guests won't be able to create any Disney Premier Access Passes — certainly impacts business."

# --- DFM ---
dfm:
  process: "Contact ITOC team through their MS Teams Channel. Explain guest impact and ask if DFM is necessary. They put the DFM on their own."

# --- Notes ---
notes:
  - "Two functional flows: DPA Ultimate (attractions) and Secure Your Seat/SYS (shows)"
  - "DPA Ultimate: fast lane to ALL eligible attractions, no time slots, one use per attraction"
  - "SYS: book seats for Lion King, Mickey and the Magician, Frozen, Pixar shows"
  - "Can be purchased in advance (unlike DPA One which is in-park only)"
  - "Guest must have ticket or package linked to account"
  - "Same external POCs as Orion (BAPP0218964): Experience Access, Core API, Worldpay, Airship, Surqual"
