      region: "eu-west-1"
      infra_type: "API Gateway"

# --- Guest Impact ---
guest_impact:
  description: "If the API Gateway does not work, the service will be interrupted and clients will not be able to access the microservices that depend on it. Causes authentication/authorization errors, security issues. Guests unable to access reservation information, leading to lack of information and negative guest experience."

