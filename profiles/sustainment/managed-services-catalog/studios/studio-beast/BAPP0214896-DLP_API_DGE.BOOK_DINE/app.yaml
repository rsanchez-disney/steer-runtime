  - component_name: "drs-book-dine-publisher"
    component_type: "batch"
    description: "Batch for email reminders about upcoming restaurant reservations. Uses JobLauncher."

    repository:
      url: "https://github.disney.com/WDPR-DLP-IS/wdpr-dlp-is-sales-drs-book-dine-publisher"
      branch: "develop"
