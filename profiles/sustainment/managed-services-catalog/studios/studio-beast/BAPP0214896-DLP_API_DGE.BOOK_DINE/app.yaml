# --- Components ---
components:

  - component_name: "drs-book-dine-provider"
    component_type: "api"
    description: "Main Book Dine API. Allows guests to book/update/cancel restaurant reservations. Two flows: Classique (restaurant selection) and Discovery (date/meal type search)."

    repository:
      url: "https://github.disney.com/WDPR-DLP-IS/wdpr-dlp-is-sales-drs-book-dine-provider"
      branch: "develop"
      path: "/"

    cicd:
      platform: "harness"
      pipeline_url: "https://disney.harness.io/ng/account/1-wFe3qRQv2mUh1s9244Eg/module/ci/orgs/Disneyland_Paris/projects/DLP_API_DGE_BOOK_DINE/overview"
      deploy_target: "ECS"

    splunk:
      index: "wdpr_dlp_digital"
      base_spl: >-
        index=wdpr_dlp_digital "Identifiers.App-Name"=wdpr-dlp-is-sales-drs-book-dine-provider
      dashboards:
        - "wdpr-dlp-is-sales-drs-book-dine-provider"
