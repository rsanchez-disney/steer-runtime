    appdynamics:
      app_name: "prod_dlp-is_sales-bookdine_aws"
      dashboards:
        - "PROD_DLP_PAAP_wdpr-dlp-is-sales-drs-book-dine-provider"
        - "PROD_DLP_PAAP_wdpr-dlp-is-bookdine_sales-drs-book-dine-provider"
        - "PROD_DLP_PAAP_SALES-BOOKDINE"
        - "prod_dlp-is_sales-bookdine_aws (Application Dashboard)"

    grafana:
      dashboards:
        - "DLP Digital - PROD - Mobile Back-End API Gateway Global Dashboard"
        - "DLP Digital - PROD - Mobile Back-End Services - Nodes/Memory/CPU"
        - "AWS Digital Cluster Metrics"

    cloud:
      provider: "AWS"
      region: "eu-west-1"
      infra_type: "ECS"
      cluster_id: "dlp-apps-S0001481-euw1"
      service_name: "drs-book-dine-provider-prod-live"

      services:
        - type: "rds"
          name: "profile-mariadb"
        - type: "elasticache"
          name: "Redis (RateLimiter)"

    vault:
      non_secret: "non_secret/apps/is/eu-west-1/{env}/sales/drs-book-dine-provider/1.0.0"
