    rundeck:
      url: "https://rundeck.wdprapps.disney.com/project/wdpr-dlp-is-sales-drs-book-dine-publisher_aws/activity"

  - component_name: "DRS"
    component_type: "api"
    description: "System of Record for all restaurant bookings. Handles inventory. External component managed by POS team."
    external: true
    escalation_group: "app-frdlp-support-pos"

  - component_name: "Redis"
    component_type: "cache"
    description: "RateLimiter stored in Redis to limit calls from unexpected clients."
    external: true

# --- Guest Impact ---
guest_impact:
  book_dine_provider: "Guests won't be able to create, update and cancel table reservations in any restaurant."
  book_dine_publisher: "Guests won't receive emails related to their upcoming reservations."
  drs_outage: "Guests won't be able to create, update and cancel digital reservations, nor get reminders."
  notification_service: "Guests won't receive emails related to their reservations."
  bio_schedules: "Guests won't be able to search restaurants' opening hours."

# --- DFM ---
dfm:
  process: "Contact ITOC team through their MS Teams Channel. Explain guest impact and ask if DFM is necessary. They put the DFM on their own."

# --- INC Handling ---
incident_handling:
  p3: "Open incident with app-frdlp-food-dge and engage Mobile Oncall Team"
  p4: "Open incident with app-frdlp-food-dge"
  appdynamics_issue: "Correct AppDynamics agent installation with Squad Cloud Digital. If persists, contact app-frdlp-mobile-apps"

# --- Notes ---
notes:
  - "PPD (Prince or Princess for the day / My Royal Dream) reuses the BookDine flow — same backend"
  - "'Object reference not set to an instance of an object' errors are EXPECTED when no availability — can be ignored"
  - "DRS horizon period is 365 days max"
  - "Bio Schedules DB returns data only for next 12 months"
  - "Table held for up to 15 minutes on the day"
