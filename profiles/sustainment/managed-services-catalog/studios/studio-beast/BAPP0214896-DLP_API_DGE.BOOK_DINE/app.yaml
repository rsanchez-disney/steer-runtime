# --- Known Issues ---
known_issues:
  - id: "KI-001"
    title: "DRS high response time causing booking failures"
    category: "alert-based"
    severity: "high"
    affected_component: "drs-book-dine-provider"
    source_link: "https://disney.service-now.com/nav_to.do?uri=incident.do?sysparm_query=number=INC26813635"
    description: "AppDynamics alert DLP_BT_BOOKDINE_SALES-DRS-BOOK-DINE-PROVIDER_RESPONSE_TIME_ERROR fires when DRS system experiences degradation. High 500 error rate in Splunk. Guests cannot book/cancel reservations. Escalate to POS team (app-frdlp-support-pos)."

  - id: "KI-002"
    title: "DRS availability synchronization errors"
    category: "incident-based"
    severity: "high"
    affected_component: "drs-book-dine-provider"
    source_link: "https://disney.service-now.com/nav_to.do?uri=incident.do?sysparm_query=number=INC28094764"
    description: "Availability shown in app does not match actual restaurant availability due to DRS inventory sync issues or Bio Schedules data mismatch. Multiple P3/P4 incidents in 2025."

  - id: "KI-003"
    title: "QSLWebBooking.asmx endpoint unavailability"
    category: "performance-degradation"
    severity: "critical"
    affected_component: "drs-book-dine-provider"
    source_link: ""  # TODO: No specific INC — known from troubleshooting documentation
    description: "When DRS QSLWebBooking.asmx endpoint is completely down, all booking operations fail. Full DRS infrastructure issue requiring immediate escalation to app-frdlp-support-pos."

  - id: "KI-004"
    title: "Publisher batch failure — reservation reminder emails not sent"
    category: "alert-based"
    severity: "medium"
    affected_component: "drs-book-dine-publisher"
    source_link: ""  # TODO: Source link pending — identified from troubleshooting.md
    description: "Book Dine Publisher batch may fail to send reservation reminder emails. Root causes include publisher batch execution failure, Notification Service being down, or Sparkpost/Airship issues."

  - id: "KI-005"
    title: "NullReferenceException errors when no availability (expected behavior)"
    category: "alert-based"
    severity: "low"
    affected_component: "drs-book-dine-provider"
    source_link: "https://mywiki.disney.com/spaces/SBH/pages/962561428"
    description: "Object reference not set to an instance of an object errors appear when there is no restaurant availability. This is EXPECTED behavior — can be safely ignored. Documented to prevent false escalations."

