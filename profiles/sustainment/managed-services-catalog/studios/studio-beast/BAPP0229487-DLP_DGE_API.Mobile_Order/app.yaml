# --- Identity ---
bapp_id: "BAPP0229487"
app_name: "dlp-dge-apimobile-order"
full_name: "DLP DGE API.Mobile Order"
description: "Click and Collect Service (aka Mobile Order) available on Disneyland Paris Mobile App. Uses Agilysys for web views and allows guests to order food items, pick a restaurant, a timeslot, and their items. They provide personal information, proceed to payment, and receive a confirmation to collect their order at the restaurant."

# --- Ownership ---
support_studio: "Beast"
escalation_channel: "DLP ITOC"
escalation_contacts:
  - name: "William Nguyen"
    role: "APM"
    contact: ""
  - name: "Nicolas Miel"
    role: "TL Back"
    contact: ""
  - name: "Alexandre Bessa"
    role: "TL Front"
    contact: ""
  - name: "Yoann Leon"
    role: "PO"
    contact: ""
  - name: "Yuliia Soury"
    role: "PO"
    contact: ""
# --- ServiceNow ---
servicenow:
  configuration_items:
    - "DLP DGE API.MobileOrder"
    - "DLP DGE API.MobileOrder - AWS Latest"
    - "DLP DGE API.MobileOrder - AWS Load Test"
    - "DLP DGE API.MobileOrder - AWS Production"
    - "DLP DGE API.MobileOrder - AWS Staging"
  assignment_group: "app-frdlp-digital-ext-support"
  business_service: "DLP DGE API.Mobile Order"

# --- Documentation ---
documentation:
  runbook: "https://mywiki.disney.com/spaces/SBH/pages/943235659/DLP+DGE+API.Mobile+Order+BAPP0229487"
  wiki: "https://mywiki.disney.com/spaces/SBH/pages/943235659/DLP+DGE+API.Mobile+Order+BAPP0229487"
  architecture_diagram: "https://confluence.disney.com/x/Fz0qIw"
  known_issues: "https://mywiki.disney.com/spaces/SBH/pages/962561425/KI+DLP+DGE+API.Mobile+Order+BAPP0229487"
  flows: "https://mywiki.disney.com/spaces/SBH/pages/1022364237/BF+Mobile+Order+Click+Collect"
  swagger: "https://stage.dlpis-digital.wdprapps.disney.com/WDPR-DLP-IS/wdpr-dlp-is-sales-iod-food-order-provider/swagger-ui.html"

# --- Companion Docs (Markdown) ---
docs:
  troubleshooting: "troubleshooting.md"
  business_rules: "business-rules.md"
  runbook: "runbook.md"

  # --- Technologies ---
technologies:
  - name: "Java"
    version: "21"
  - name: "Spring Boot"

# --- Components ---
components:

  - component_name: "iod-food-order-provider"
    component_type: "api"
    description: "Backend API handling food order placement, payment orchestration with MPG/WorldPay, and order confirmation for Click & Collect service."

    # -- Source Code & CI/CD --
    repository:
      url: "https://github.disney.com/WDPR-DLP-IS/wdpr-dlp-is-sales-iod-food-order-provider"
      branch: "develop"
      path: "/"

    cicd:
      platform: "harness"
      pipeline_url: "https://disney.harness.io/ng/account/1-wFe3qRQv2mUh1s9244Eg/all/orgs/Disneyland_Paris/projects/DLP_DGE_API_MobileOrder/overview"
      deploy_target: "ECS"

    # -- Health Check --
    health_check:
      url: "https://prod.dlpis-digital.wdprapps.disney.com/WDPR-DLP-IS/wdpr-dlp-is-sales-iod-food-order-provider/health"
      expected_status: 200

    # -- Splunk --
    splunk:
      index: "wdpr_dlp_digital"
      base_spl: >-
        index=wdpr_dlp_digital "Identifiers.App-Name"=wdpr-dlp-is-sales-iod-food-order-provider
      dashboards:
        - "wdpr-dlp-is-sales-iod-food-order-provider_INBOUND"
        - "wdpr-dlp-is-sales-iod-food-order-provider_OUTBOUND"
        - "wdpr-dlp-is-sales-iod-food-order-provider_ERRORS"
        - "DLP_MOBILE_ORDER_FULFFILMENT_ISSUES_AND_MPG-PAYMENTS"
        - "DLP_MOBILE_ORDER_FULFFILMENT_ISSUES"
        - "DLP_MOBILE_ORDER_FUNCTIONAL"

    # -- AppDynamics --
    appdynamics:
      app_name: "prod_dlp-is_food"
      tier: "wdpr-dlp-is-sales-iod-food-order-provider"
      dashboards:
        - "PROD_DLP_PAAP_wdpr-dlp-is-sales-iod-food-order-provider"
        - "PROD_DLP_MOBILE_ORDER_BAPP0229487"
        - "prod_dlp-is_food (Application Dashboard)"
        - "prod_dlp-is_revelation (IG Web Server)"

    # -- Grafana --
    grafana:
      dashboards:
        - "DLP Digital - PROD - Mobile Back-End API Gateway Global Dashboard"
        - "DLP Digital - PROD - Mobile Back-End Services - Nodes/Memory/CPU"
        - "AWS Digital Cluster Metrics"

    # -- Cloud Infrastructure --
    cloud:
      provider: "AWS"
      region: "eu-west-1"
      infra_type: "ECS"
      cluster_id: "dlp-apps-S0001481-euw1"
      service_name: "iod-food-order-provider-prod-live"

      cloudwatch:
        dashboards:
          - "API Gateway Food Order"
          - "ElastiCache Redis"

      services:
        - type: "elasticache"
          name: "Redis - used as database (no forced cache clear needed)"

    # -- Configuration --
    vault:
      non_secret: "non_secret/apps/is/eu-west-1/{env}/sales/iod-food-order-provider/1.0.0"
      secret: "secret/apps/is/eu-west-1/{env}/sales/iod-food-order-provider/1.0.0/secret"

    # -- Rundeck --
    rundeck:
      url: "https://rundeck.wdprapps.disney.com/project/wdpr-dlp-is-sales-iod-food-order-provider_aws"

    # -- Key Endpoints --
    endpoints:
      - path: "/guest-form/"
        description: "Save guest info in cache"
      - path: "/payment-preparation/"
        description: "Makes handoff with MPG, sends the data chart"
      - path: "/payment-confirmation/"
        description: "UI redirects from MPG/WorldPay back to DLP app, sends confirmation email (most critical endpoint)"
      - path: "/payment-notification/"
        description: "Notification from MPG to Mobile Order via RabbitMQ queue (~15 min later, non-critical)"

    # -- Other Environments --
    other_environments:

      stage:
        cloud:
          cluster_id: "dlp-apps-S0001481-euw1-stg"
          service_name: "iod-food-order-provider-stage-live"
        appdynamics:
          dashboards:
            - "STAGE_DLP_PAAP_wdpr-dlp-is-sales-iod-food-order-provider"
            - "STAGE_DLP_MOBILE_ORDER_BAPP0229487"
            - "stage_dlp-is_food (Application Dashboard)"
            - "stage_dlp-is_revelation (IG Web Server)"

      load:
        cloud:
          cluster_id: "dlp-apps-S0001481-euw1-lod"
          service_name: "iod-food-order-provider-load-live"
        appdynamics:
          dashboards:
            - "LOAD_DLP_PAAP_wdpr-dlp-is-sales-iod-food-order-provider"
            - "LOAD_DLP_MOBILE_ORDER_BAPP0229487"
            - "load_dlp-is_food (Application Dashboard)"

      latest:
        cloud:
          cluster_id: "dlp-apps-S0001481-euw1-lst"
          service_name: "iod-food-order-provider-latest-live"
        splunk:
          dashboards:
            - "wdpr-dlp-is-sales-iod-food-order-provider_INBOUND"
            - "wdpr-dlp-is-sales-iod-food-order-provider_OUTBOUND"
            - "wdpr-dlp-is-sales-iod-food-order-provider_ERRORS"
            - "DLP_MOBILE_ORDER_FULFFILMENT_ISSUES_AND_MPG-PAYMENTS"
            - "DLP_MOBILE_ORDER_FUNCTIONAL"

  - component_name: "Agilysys OnDemand"
    component_type: "gateway"
    description: "External component (not owned by DLP). Backend handling anonymous food orders, pushing them into the existing sales system. Manages timeslots, menus, and everything displayed in the Agilysys part of the funnel. Includes reverse proxy at KMTC and dedicated IG Web Server."
    external: true
    escalation_group: "app-frdlp-support-pos"

  - component_name: "MPG / WorldPay"
    component_type: "gateway"
    description: "Payment gateway communicating with WorldPay to handle payment processing. Migrated from OnPaie to WorldPay in December 2024."
    external: true
    escalation_group: "app-frdlp-spid-monetique"

  - component_name: "Redis"
    component_type: "cache"
    description: "Used as a database for order/session data. No forced cache clear needed."

  - component_name: "roz-file-repository"
    component_type: "frontend"
    description: "HTML/Thymeleaf templates for web views"
    repository:
      url: "https://gitlab.disney.com/DLP/digital/roz-file-repository"
