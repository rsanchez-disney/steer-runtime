      secret: "/secret/apps/is/eu-west-1/{env}/operations/bio-wait-times-provider/1.0.0/secret"

    swagger: "https://dlp-microservice-stage.emea.wdpr.disney.com:8443/WDPR-DLP-IS/wdpr-dlp-is-operations-bio-wait-times-provider/swagger-ui/index.html#/"

    postman: "DGE Workspace: wdpr-dlp-is-operations-bio-wait-times-provider"

    other_environments:
