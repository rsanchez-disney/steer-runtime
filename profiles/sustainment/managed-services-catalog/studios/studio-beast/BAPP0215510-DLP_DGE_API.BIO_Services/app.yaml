# --- Components ---
components:

  - component_name: "bio-schedules-park-provider"
    component_type: "api"
    description: "Manages and exposes the opening schedules of activities across both Disneyland Park and Walt Disney Studios Park. Informs guests about when an activity will be available."

    repository:
      url: "https://github.disney.com/WDPR-DLP-IS/wdpr-dlp-is-operations-bio-schedules-park-provider"
      branch: "develop"
      path: "/"

    cicd:
      platform: "harness"
      pipeline_url: "https://disney.harness.io/ng/account/1-wFe3qRQv2mUh1s9244Eg/module/ci/orgs/Disneyland_Paris/projects/DLP_DGE_API_BIO_Services/overview"
      deploy_target: "on-prem (DLP Genie Datacenter)"

    health_check:
      url: ""
      expected_status: 200
      deep_health_check: ""

    splunk:
      index: "wdpr_dlpis"
      base_spl: >-
        index=wdpr_dlpis host IN (vl-frmv-rhe734,vl-frmv-rhe735,vl-frmv-rhe775) "Identifiers.App-Name"=wdpr-dlp-is-operations-bio-*
      dashboards:
        - "wdpr-dlp-is-operations-bio-schedules-park-provider"

    appdynamics:
      app_name: "operations_bio_schedules_park_provider"
      dashboards:
        - "PROD_DLP_PAAP_wdpr-dlp-is-operations-bio-schedules-park-provider"
        - "operations_bio_schedules_park_provider (Application Dashboard)"
        - "DLP_PROD_BIO_GENIE (Application Database)"

    grafana:
      dashboards:
        - "DLP Digital - PROD - Mobile Back-End API Gateway Global Dashboard"

    cloud:
      provider: "on-prem"
      region: ""
      infra_type: "DLP Genie Datacenter"

      cloudwatch:
        dashboards:
          - "dlp-apps-B0215510-euw1-prd-schedules-provider"

    vault:
      non_secret: "/non_secret/apps/is/eu-west-1/{env}/operations/bio-schedules-park-provider/1.0.0"
      secret: "/secret/apps/is/eu-west-1/{env}/operations/bio-schedules-park-provider/1.0.0/secret"

    swagger: "https://dlp-microservice-stage.emea.wdpr.disney.com:8443/WDPR-DLP-IS/wdpr-dlp-is-operations-bio-schedules-park-provider/swagger-ui/index.html#/"

    postman: "DGE Workspace: wdpr-dlp-is-operations-bio-schedules-park-provider"

    other_environments:
      stage:
        appdynamics:
          dashboards:
            - "STAGE_DLP_PAAP_wdpr-dlp-is-operations-bio-schedules-park-provider"
            - "operations_bio_schedules_park_provider (Application Dashboard)"
        cloudwatch:
          dashboards:
            - "dlp-apps-B0215510-euw1-stg-schedules-provider"
      load:
        appdynamics:
          dashboards:
            - "LOAD_DLP_PAAP_wdpr-dlp-is-operations-bio-schedules-park-provider"
            - "operations_bio_schedules_park_provider (Application Dashboard)"
        cloudwatch:
          dashboards:
            - "dlp-apps-B0215510-euw1-lod-schedules-provider"

  - component_name: "bio-wait-times-provider"
    component_type: "api"
    description: "Calculates and publishes estimated waiting times for attractions in both parks. V1 provides standard wait times; V2 provides preferential wait times for Disney Premiere Access (DPA) guests."

    repository:
      url: "https://github.disney.com/WDPR-DLP-IS/wdpr-dlp-is-operations-bio-wait-times-provider"
      branch: "develop"
      path: "/"

    cicd:
      platform: "harness"
      pipeline_url: "https://disney.harness.io/ng/account/1-wFe3qRQv2mUh1s9244Eg/module/ci/orgs/Disneyland_Paris/projects/DLP_DGE_API_BIO_Services/overview"
      deploy_target: "on-prem (DLP Genie Datacenter)"

    health_check:
      url: ""
      expected_status: 200
      deep_health_check: ""

    splunk:
      index: "wdpr_dlpis"
      base_spl: >-
        index=wdpr_dlpis host IN (vl-frmv-rhe734,vl-frmv-rhe735,vl-frmv-rhe775) "Identifiers.App-Name"=wdpr-dlp-is-operations-bio-*
      dashboards:
        - "wdpr-dlp-is-operations-bio-wait-times-provider"

    appdynamics:
      app_name: "operations_bio_wait_times_provider"
      dashboards:
        - "PROD_DLP_PAAP_wdpr-dlp-is-operations-bio-wait-times-provider"
        - "operations_bio_wait_times_provider (Application Dashboard)"
        - "DLP_PROD_BIO_GENIE (Application Database)"

    grafana:
      dashboards:
