      load:
        appdynamics:
          dashboards:
            - "LOAD_DLP_PAAP_wdpr-dlp-is-operations-bio-wait-times-provider"
            - "operations_bio_wait_times_provider (Application Dashboard)"
        cloudwatch:
          dashboards:
            - "dlp-apps-B090262-euw1-lod-waitime"

  - component_name: "bio-attractions-downtime-publisher"
    component_type: "worker"
    description: "Tracks and communicates downtime periods of attractions (refurbishment, maintenance, temporary closures). Uses a cron job to pull events. Organizationally part of DPA ONE BAPP. Depends on EA System (from Orion Services)."

    repository:
      url: "https://github.disney.com/WDPR-DLP-IS/wdpr-dlp-is-operations-bio-attractions-downtime-publisher"
      branch: "develop"
      path: "/"

    cicd:
      platform: "harness"
      pipeline_url: "https://disney.harness.io/ng/account/1-wFe3qRQv2mUh1s9244Eg/module/ci/orgs/Disneyland_Paris/projects/DLP_DGE_API_BIO_Services/overview"
      deploy_target: "on-prem (DLP Genie Datacenter)"

    health_check:
      url: "https://dlp-microservice-stage.emea.wdpr.disney.com:8443/WDPR-DLP-IS/wdpr-dlp-is-operations-bio-attractions-downtime-publisher/healthcheck/deep"
      expected_status: 200

    splunk:
      index: "wdpr_dlpis"
      base_spl: >-
        index=wdpr_dlpis host IN (vl-frmv-rhe734,vl-frmv-rhe735,vl-frmv-rhe775) "Identifiers.App-Name"=wdpr-dlp-is-operations-bio-*
      dashboards:
        - "wdpr-dlp-is-operations-bio-attractions-downtime-publisher"

    appdynamics:
      app_name: "operations_bio-attractions-downtime-publisher"
      dashboards:
        - "PROD_DLP_PAAP_wdpr-dlp-is-operations-bio-attractions-downtime-publisher"
        - "operations_bio-attractions-downtime-publisher (Application Dashboard)"
        - "DLP_PROD_BIO_GENIE (Application Database)"

    cloud:
      provider: "on-prem"
      region: ""
      infra_type: "DLP Genie Datacenter"

    vault:
      non_secret: "/non_secret/apps/is/eu-west-1/prod/operations/bio-attractions-downtime-publisher/1.0.0/"
      secret: "/secret/apps/is/eu-west-1/{env}/operations/bio-wait-times-provider/1.0.0/secret"

    other_environments:
      stage:
        appdynamics:
          dashboards:
            - "STAGE_DLP_PAAP_wdpr-dlp-is-operations-bio-attractions-downtime-publisher"
            - "operations_bio-attractions-downtime-publisher (Application Dashboard)"
      load:
        appdynamics:
          dashboards:
            - "LOAD_DLP_PAAP_wdpr-dlp-is-operations-bio-attractions-downtime-publisher"
            - "operations_bio-attractions-downtime-publisher (Application Dashboard)"

  - component_name: "BIO Database"
    component_type: "database"
    description: "External database component shared by all BIO Services. Known issue: occasional connectivity intermittence."
    external: true

  - component_name: "BIO GUI Admin"
    component_type: "frontend"
    description: "External admin GUI for managing BIO data (schedules, wait times, downtime)."
    external: true

# --- Guest Impact ---
guest_impact:
  bio_schedules: "Guests might not visualize accurate opening hours for parks and activities, neither availability for attractions, shows, shops, book dine restaurants, and Meet & Greet experiences (except for HTC experience)."
  bio_wait_times: "Guests wouldn't get accurate wait time to access attractions, causing inconvenience and frustration."
  bio_downtime: "Guests might want to attend an attraction that's unavailable, which is translated into loss of time and a negative park experience."

# --- Notes ---
notes:
  - "All three BIO Services are hosted on-premises in the DLP Genie Data Center (NOT ECS)"
  - "Wait Time Provider API has two versions: V1 (standard guests) and V2 (DPA guests with preferential wait times)"
  - "BIO Attractions Downtime Publisher is organizationally part of DPA ONE BAPP"
  - "BIO Downtime depends on EA System (from Orion Services)"
  - "Health check currently failing in Latest because service is intentionally disabled"
