# --- Components ---
components:

  - component_name: "Cast-operations-service"
    component_type: "api"               # api | worker | batch | frontend | database | queue | gateway | cache | mobile | sdk
    description: "microservice to handle cast main operations authentication and notifications"
    health_check:
      url: "https://smartpark.wdprapps.disney.com/smartpark-castops/healthcheck"
      expected_status: 200

    # -- Component-specific docs --
    docs:
      troubleshooting: "troubleshooting.md"
      runbook: "runbook.md"

    # -- Component-specific documentation links --
    documentation:
      wiki: "https://mywiki.disney.com/spaces/WSRS/pages/996544725/BAPP0246752+WDW+Show+Ready+cast+ops"
      architecture_diagram: ""

    # -- Source Code & CI/CD --
    repository:
      url: ""
      branch: ""
      path: ""

    cicd:
      platform: ""                   # harness | github-actions | jenkins | spinnaker
      pipeline_url: ""
      deploy_target: ""

    # -- Health Check --
    health_check:
      url: ""
      expected_status: 200

    # -- Splunk --
    splunk:
      index: "smartpark_svcs"
      source: "*castops*prd*"
      base_spl: >-
        index=smartpark_svcs  source="*castops*prd*"
      error_spl: >-
        index=smartpark_svcs source="*castops*prd*" level=ERROR
      latency_spl: >-
        index=smartpark_svcs source="*castops*prd*" "Outgoing Response"
        |rex field=Msg "URL : https://smartpark-ext.wdprapps.disney.com/smartpark-castops/api/v1/smartpark-castoperations-svc/*/(?<EndPoint>\S+)"
        |rex field=Msg "ResponseTime : (?<ResponseTime>[^\"]+)" 
        | stats avg(ResponseTime) as avg_rt p95(ResponseTime) as p95_rt by EndPoint

    # -- Cloud Infrastructure & Native Observability --
    cloud:
      provider: "AWS"                   # AWS | GCP | Azure | on-prem
      region: "us-east-1"
      account_id: "708687297489"
      infra_type: "ECS"                 # ECS | EKS | Lambda | GKE | EC2 | VM | Fargate | CloudRun | AppEngine
      cluster_id: "wdw-ticketing-S0016057-use1-prd" 
      service_name: "smartpark-castops-prod-live"

      services:
        - type: "sns"                   # sqs | sns | s3 | dynamodb | rds | elasticache | pubsub | firestore | bucket | cloud-sql | redis
          name: "wdw-ticketing-S0016057-use1-prd-smartpark-apns"
        - type: "dynamodb"
          name: "smartpark-castops-dynamodb-bapp0246752-prod-wdpr-sp-castops"

    # -- Other Environments (only fields that differ from production) --
    other_environments:

      stage:
        health_check:
          url: "https://stage.smartpark.wdprapps.disney.com/smartpark-castops/healthcheck"
        splunk:
          index: "smartpark_svcs"
          base_spl: >-
            index=smartpark_svcs sourcetype=kinesis:cloudwatchlogs source="*castops*Stg*"
        cloud:
          region: "us-east-1"
          service_name: "smartpark-castops-stage-live"

      latest:
        health_check:
          url: "https://latest.smartpark.wdprapps.disney.com/smartpark-castops/healthcheck"
        splunk:
          index: "smartpark_svcs"
          base_spl: >-
            index=smartpark_svcs sourcetype=kinesis:cloudwatchlogs source="*castops*lst*"
        cloud:
          region: "us-east-1"
          service_name: "smartpark-castops-latest-live"
    
          
