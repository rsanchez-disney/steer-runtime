bapp_id: "BAPP0255071"
app_name: "dlr-order-service"
full_name: "DLR Order Service"
description: >
  Core order processing — sits between Order VAS and PEOS in the UC path (DLR).
  Flows: uc-checkout.
  Keywords: consumer purchase, consumer ticket, UC, order service, Genie+, Lightning Lane, schedule activity,
  VO consumer, Room Only consumer, vacation package consumer, consumer mods, order processing, DLR.
