    projectKey: DPAY
    statuses:
      inProgress: "In Progress"
      review: "Code Review"
      done: "Done"
  github:
    org: SANCR225
    repo: wdpr-config-services

workspace:
  specsDir: docs/specs/
  useSpecs: false
